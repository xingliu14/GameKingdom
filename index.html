<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GameKingdom — a collection of small, fun browser games to kill time." />
  <title>GameKingdom 🎮</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">♛</span>
        <span class="logo-text">GameKingdom</span>
      </a>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search games…"
          autocomplete="off"
          aria-label="Search games"
        />
        <button class="search-clear" id="searchClear" aria-label="Clear search" hidden>✕</button>
      </div>
    </div>
  </header>

  <!-- ===== CATEGORY PILLS ===== -->
  <nav class="category-nav" aria-label="Filter by category">
    <div class="category-pills" id="categoryPills">
      <button class="pill active" data-cat="all">All</button>
      <button class="pill" data-cat="puzzle">🧩 Puzzle</button>
      <button class="pill" data-cat="action">⚡ Action</button>
      <button class="pill" data-cat="casual">🌸 Casual</button>
      <button class="pill" data-cat="word">📝 Word</button>
      <button class="pill" data-cat="strategy">♟️ Strategy</button>
      <button class="pill" data-cat="math">🔢 Math</button>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <p class="results-count" id="resultsCount"></p>

    <div class="game-grid" id="gameGrid">
      <!-- Cards injected by script.js -->
    </div>

    <div class="empty-state" id="emptyState" hidden>
      <p class="empty-icon">🕹️</p>
      <p>No games found. Try a different search or category.</p>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>
      GameKingdom &copy; 2026 &nbsp;·&nbsp;
      <a href="games/_template.html">Add a Game</a>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
