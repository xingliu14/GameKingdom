<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048 — GameKingdom</title>
  <meta name="description" content="Slide and merge tiles to reach 2048 in this classic number puzzle." />
  <script src="../sounds.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2e2e3e;
      --accent: #7c5cfc; --text: #e8e8f0; --text-dim: #888899;
      --radius: 12px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    a { color: var(--accent); }

    /* ---- nav bar ---- */
    .game-nav {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-link { font-size: .9rem; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .game-nav h1 { font-size: 1.1rem; font-weight: 700; }

    /* ---- game container ---- */
    #gameContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 16px;
    }

    /* ---- HUD row ---- */
    #hud {
      display: flex;
      align-items: center;
      gap: 12px;
      width: min(360px, 92vw);
      flex-wrap: wrap;
    }
    .score-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      text-align: center;
      min-width: 80px;
    }
    .score-box .label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .score-box .value {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      margin-top: 2px;
    }
    #newGameBtn {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    #newGameBtn:hover { opacity: 0.85; }

    /* ---- board ---- */
    #boardWrapper {
      position: relative;
      width: min(360px, 92vw);
      height: min(360px, 92vw);
    }

    #board {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
      background: #12121a;
      border: 3px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
    }

    /* empty cell background */
    .cell {
      background: #1e1e2e;
      border-radius: 8px;
    }

    /* ---- tile layer (absolute, sits on top of board) ---- */
    #tileLayer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: 800;
      user-select: none;
      transition: top 0.1s ease, left 0.1s ease;
      will-change: top, left;
    }

    /* tile value colors */
    .tile[data-val="2"]    { background: #2f2f46; color: #e8e8f0; }
    .tile[data-val="4"]    { background: #3a3058; color: #e8e8f0; }
    .tile[data-val="8"]    { background: #4a3a80; color: #fff; }
    .tile[data-val="16"]   { background: #5c3fa0; color: #fff; }
    .tile[data-val="32"]   { background: #7c44bf; color: #fff; }
    .tile[data-val="64"]   { background: #9b44c8; color: #fff; }
    .tile[data-val="128"]  { background: #c0389a; color: #fff; }
    .tile[data-val="256"]  { background: #d63068; color: #fff; }
    .tile[data-val="512"]  { background: #e8402a; color: #fff; }
    .tile[data-val="1024"] { background: #e86a10; color: #fff; }
    .tile[data-val="2048"] { background: linear-gradient(135deg, #f5c518 0%, #f09000 100%);
                              color: #1a1a00; box-shadow: 0 0 24px 6px rgba(245,197,24,0.45); }
    .tile[data-val="4096"] { background: linear-gradient(135deg, #fff 0%, #c8e8ff 100%);
                              color: #111; }
    .tile[data-val="8192"] { background: linear-gradient(135deg, #aaffee 0%, #00c8aa 100%);
                              color: #111; }

    /* new tile pop animation */
    @keyframes popIn {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .tile.new { animation: popIn 0.18s ease forwards; }

    /* merge pulse */
    @keyframes mergePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.22); }
      100% { transform: scale(1); }
    }
    .tile.merged { animation: mergePop 0.2s ease forwards; }

    /* ---- overlays ---- */
    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      background: rgba(15,15,19,0.82);
      backdrop-filter: blur(2px);
      text-align: center;
      padding: 24px;
      z-index: 10;
    }
    .overlay.visible { display: flex; }
    .overlay h2 { font-size: 2rem; font-weight: 800; }
    .overlay p  { color: var(--text-dim); font-size: 1rem; }
    #winOverlay h2  { color: #f5c518; }
    #loseOverlay h2 { color: var(--accent); }

    .overlay button {
      padding: 10px 28px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      pointer-events: all;
    }
    .overlay button:hover { opacity: 0.85; }

    /* continue link below win */
    #winOverlay .continue-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    /* ---- hint text ---- */
    #hint {
      color: var(--text-dim);
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav class="game-nav">
    <a href="../index.html" class="back-link">← GameKingdom</a>
    <h1>2048</h1>
  </nav>

  <div id="gameContainer">

    <!-- HUD -->
    <div id="hud">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="scoreDisplay">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="value" id="bestDisplay">0</div>
      </div>
      <button id="newGameBtn">New Game</button>
    </div>

    <!-- Board -->
    <div id="boardWrapper">
      <!-- empty cell grid (visual only) -->
      <div id="board">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
      <!-- tiles rendered here -->
      <div id="tileLayer"></div>
      <!-- overlays -->
      <div class="overlay" id="winOverlay">
        <h2>You Win!</h2>
        <p>You reached <strong>2048</strong>!</p>
        <button id="winNewBtn">New Game</button>
        <button class="continue-btn" id="winContinueBtn">Keep Going</button>
      </div>
      <div class="overlay" id="loseOverlay">
        <h2>Game Over</h2>
        <p id="loseMsg">No moves left.</p>
        <button id="loseNewBtn">Try Again</button>
      </div>
    </div>

    <p id="hint">Arrow keys or swipe to slide tiles</p>
  </div>

  <script>
    /* ===== Constants ===== */
    const SIZE = 4;
    const LS_BEST = '2048_best';

    /* ===== State ===== */
    let grid = [];      // 4x4 array of values (0 = empty)
    let score = 0;
    let best  = parseInt(localStorage.getItem(LS_BEST) || '0', 10);
    let won   = false;  // has player already seen the win screen?
    let gameOver = false;

    /* ===== DOM ===== */
    const tileLayer    = document.getElementById('tileLayer');
    const boardWrapper = document.getElementById('boardWrapper');
    const scoreEl      = document.getElementById('scoreDisplay');
    const bestEl       = document.getElementById('bestDisplay');
    const winOverlay   = document.getElementById('winOverlay');
    const loseOverlay  = document.getElementById('loseOverlay');
    const loseMsgEl    = document.getElementById('loseMsg');

    /* ===== Helpers ===== */
    function newGrid() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    }

    function emptyPositions(g) {
      const empties = [];
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (g[r][c] === 0) empties.push([r, c]);
      return empties;
    }

    function spawnTile(g) {
      const empties = emptyPositions(g);
      if (!empties.length) return null;
      const [r, c] = empties[Math.floor(Math.random() * empties.length)];
      g[r][c] = Math.random() < 0.9 ? 2 : 4;
      return [r, c];
    }

    function copyGrid(g) {
      return g.map(row => [...row]);
    }

    /* ===== Slide logic ===== */
    // Slide a single row left; return { row, gained, mergedIdx }
    function slideRowLeft(row) {
      let arr = row.filter(v => v !== 0);
      let gained = 0;
      const mergedIdx = [];
      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i + 1]) {
          arr[i] *= 2;
          gained += arr[i];
          mergedIdx.push(i);
          arr.splice(i + 1, 1);
        }
      }
      while (arr.length < SIZE) arr.push(0);
      return { row: arr, gained, mergedIdx };
    }

    // direction: 'left' | 'right' | 'up' | 'down'
    function applyMove(g, dir) {
      let ng = copyGrid(g);
      let totalGained = 0;
      const mergedPositions = [];
      let moved = false;

      if (dir === 'left') {
        for (let r = 0; r < SIZE; r++) {
          const { row: slid, gained, mergedIdx } = slideRowLeft(ng[r]);
          if (!ng[r].every((v, i) => v === slid[i])) moved = true;
          mergedIdx.forEach(ci => mergedPositions.push({ r, c: ci }));
          ng[r] = slid;
          totalGained += gained;
        }
      } else if (dir === 'right') {
        for (let r = 0; r < SIZE; r++) {
          const rev = [...ng[r]].reverse();
          const { row: slid, gained, mergedIdx } = slideRowLeft(rev);
          const unrev = slid.reverse();
          if (!ng[r].every((v, i) => v === unrev[i])) moved = true;
          mergedIdx.forEach(ci => mergedPositions.push({ r, c: SIZE - 1 - ci }));
          ng[r] = unrev;
          totalGained += gained;
        }
      } else if (dir === 'up') {
        for (let c = 0; c < SIZE; c++) {
          const col = ng.map(row => row[c]);
          const { row: slid, gained, mergedIdx } = slideRowLeft(col);
          if (!col.every((v, i) => v === slid[i])) moved = true;
          slid.forEach((v, r) => { ng[r][c] = v; });
          mergedIdx.forEach(ri => mergedPositions.push({ r: ri, c }));
          totalGained += gained;
        }
      } else if (dir === 'down') {
        for (let c = 0; c < SIZE; c++) {
          const col = ng.map(row => row[c]).reverse();
          const { row: slid, gained, mergedIdx } = slideRowLeft(col);
          const unrev = slid.reverse();
          const origCol = ng.map(row => row[c]);
          if (!origCol.every((v, i) => v === unrev[i])) moved = true;
          unrev.forEach((v, r) => { ng[r][c] = v; });
          mergedIdx.forEach(ri => mergedPositions.push({ r: SIZE - 1 - ri, c }));
          totalGained += gained;
        }
      }

      return { newGrid: ng, gained: totalGained, mergedPositions, moved };
    }

    function hasMovesLeft(g) {
      if (emptyPositions(g).length > 0) return true;
      for (const dir of ['left', 'right', 'up', 'down']) {
        const { moved } = applyMove(g, dir);
        if (moved) return true;
      }
      return false;
    }

    function maxValue(g) {
      return Math.max(...g.flat());
    }

    /* ===== Rendering ===== */
    function getBoardMetrics() {
      const wrapW = boardWrapper.getBoundingClientRect().width;
      // border 3px each side = 6, padding 8px each side = 16
      const inner = wrapW - 6 - 16;
      // 4 cells + 3 gaps of 8px
      const sz = (inner - 8 * 3) / 4;
      const padding = 8;
      const gap = 8;
      return { sz, padding, gap };
    }

    function renderTiles(spawnedPos, mergedPositions) {
      tileLayer.innerHTML = '';
      const mergedSet = new Set(
        (mergedPositions || []).map(({ r, c }) => `${r},${c}`)
      );
      const spawnedKey = spawnedPos ? `${spawnedPos[0]},${spawnedPos[1]}` : null;
      const { sz, padding, gap } = getBoardMetrics();

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const val = grid[r][c];
          if (!val) continue;

          const div = document.createElement('div');
          div.className = 'tile';

          // clamp data-val for color lookup beyond 8192
          const colorVal = val > 8192 ? 8192 : val;
          div.setAttribute('data-val', colorVal);

          // font size scales with digit count and cell size
          const digits = String(val).length;
          const fontSize = digits <= 2 ? sz * 0.42
                         : digits === 3 ? sz * 0.34
                         : digits === 4 ? sz * 0.27
                         : sz * 0.21;
          div.style.fontSize = fontSize + 'px';

          div.style.top    = (padding + r * (sz + gap)) + 'px';
          div.style.left   = (padding + c * (sz + gap)) + 'px';
          div.style.width  = sz + 'px';
          div.style.height = sz + 'px';
          div.textContent  = val;

          const key = `${r},${c}`;
          if (key === spawnedKey) div.classList.add('new');
          else if (mergedSet.has(key)) div.classList.add('merged');

          tileLayer.appendChild(div);
        }
      }
    }

    function updateHud() {
      scoreEl.textContent = score;
      bestEl.textContent  = best;
    }

    /* ===== Game flow ===== */
    function startGame() {
      grid     = newGrid();
      score    = 0;
      won      = false;
      gameOver = false;
      winOverlay.classList.remove('visible');
      loseOverlay.classList.remove('visible');
      spawnTile(grid);
      spawnTile(grid);
      updateHud();
      renderTiles(null, []);
    }

    function handleMove(dir) {
      if (gameOver) return;
      const { newGrid: ng, gained, mergedPositions, moved } = applyMove(grid, dir);
      if (!moved) return;

      SFX.play('move');
      if (mergedPositions.length > 0) SFX.play('score');

      grid   = ng;
      score += gained;
      if (score > best) {
        best = score;
        localStorage.setItem(LS_BEST, best);
      }
      updateHud();

      const spawnedPos = spawnTile(grid);
      renderTiles(spawnedPos, mergedPositions);

      // Show win screen once when 2048 is reached
      if (!won && maxValue(grid) >= 2048) {
        won = true;
        SFX.play('win');
        setTimeout(() => winOverlay.classList.add('visible'), 250);
        return;
      }

      // Check loss
      if (!hasMovesLeft(grid)) {
        gameOver = true;
        SFX.play('lose');
        loseMsgEl.textContent = 'Final score: ' + score.toLocaleString();
        setTimeout(() => loseOverlay.classList.add('visible'), 250);
        window.dispatchEvent(new CustomEvent('gameOver', {
          detail: { game: '2048', score }
        }));
      }
    }

    /* ===== Keyboard ===== */
    const KEY_MAP = {
      ArrowLeft:  'left',
      ArrowRight: 'right',
      ArrowUp:    'up',
      ArrowDown:  'down',
    };

    document.addEventListener('keydown', e => {
      const dir = KEY_MAP[e.key];
      if (!dir) return;
      e.preventDefault();
      handleMove(dir);
    });

    /* ===== Touch / Swipe ===== */
    let touchStartX = 0;
    let touchStartY = 0;
    const SWIPE_THRESHOLD = 30;

    boardWrapper.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    boardWrapper.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < SWIPE_THRESHOLD) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        handleMove(dx > 0 ? 'right' : 'left');
      } else {
        handleMove(dy > 0 ? 'down' : 'up');
      }
    }, { passive: true });

    /* ===== Button handlers ===== */
    document.getElementById('newGameBtn').addEventListener('click', startGame);
    document.getElementById('winNewBtn').addEventListener('click', startGame);
    document.getElementById('loseNewBtn').addEventListener('click', startGame);
    document.getElementById('winContinueBtn').addEventListener('click', () => {
      winOverlay.classList.remove('visible');
    });

    /* ===== Resize: recalculate tile positions ===== */
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => renderTiles(null, []), 100);
    });

    /* ===== Kick off ===== */
    bestEl.textContent = best;
    startGame();
  </script>

</body>
</html>
