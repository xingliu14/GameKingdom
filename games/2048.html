<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048 — GameKingdom</title>
  <meta name="description" content="Slide and merge tiles to reach the 2048 tile!" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2e2e3e;
      --accent: #7c5cfc; --text: #e8e8f0; --text-dim: #888899;
      --radius: 12px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    a { color: var(--accent); }

    /* ---- nav bar ---- */
    .game-nav {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-link { font-size: .9rem; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .game-nav h1 { font-size: 1.1rem; font-weight: 700; }

    /* ---- game container ---- */
    #gameContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px 32px;
      gap: 16px;
    }

    /* ---- header row (scores + new game) ---- */
    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(440px, 96vw);
      gap: 12px;
    }

    .scores {
      display: flex;
      gap: 10px;
    }
    .score-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      text-align: center;
      min-width: 72px;
    }
    .score-box .label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .score-box .value {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
    }

    button.new-game-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    button.new-game-btn:hover { opacity: 0.85; }

    /* ---- game board ---- */
    .board-wrap {
      position: relative;
      width: min(440px, 96vw);
      height: min(440px, 96vw);
    }

    #board {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: clamp(6px, 1.5vw, 10px);
      background: #13131c;
      border-radius: var(--radius);
      padding: clamp(6px, 1.5vw, 10px);
      border: 2px solid var(--border);
    }

    /* empty cell background */
    .cell-bg {
      background: #1e1e2e;
      border-radius: 6px;
    }

    /* tile layer rendered absolutely on top */
    #tileLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-weight: 900;
      user-select: none;
      transition: top 0.1s ease, left 0.1s ease, transform 0.1s ease;
      will-change: top, left, transform;
    }

    .tile.tile-new {
      animation: popIn 0.12s ease both;
    }
    .tile.tile-merged {
      animation: mergePop 0.15s ease both;
    }

    @keyframes popIn {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    @keyframes mergePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* ---- tile colors by value ---- */
    .t2    { background: #3a3a50; color: #e8e8f0; }
    .t4    { background: #44435e; color: #e8e8f0; }
    .t8    { background: #5a3f7a; color: #f0e8ff; }
    .t16   { background: #6b3f8a; color: #f4eaff; }
    .t32   { background: #7c4fa0; color: #fff; }
    .t64   { background: #9256b4; color: #fff; }
    .t128  { background: #5c7fc8; color: #fff; }
    .t256  { background: #4a8fd8; color: #fff; }
    .t512  { background: #3a9fe8; color: #fff; }
    .t1024 { background: #28b0e0; color: #fff; }
    .t2048 { background: linear-gradient(135deg, #f7c948 0%, #e8a020 50%, #d46800 100%); color: #1a0f00; text-shadow: 0 1px 2px rgba(255,255,255,0.3); }
    .t-high { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%); color: #fff; }

    /* ---- overlay messages ---- */
    .overlay {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 20;
      text-align: center;
      padding: 16px;
    }
    .overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .overlay-game-over {
      background: rgba(15, 15, 19, 0.88);
    }
    .overlay-win {
      background: rgba(15, 10, 5, 0.82);
    }
    .overlay h2 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 900;
    }
    .overlay-game-over h2 { color: #ff6b6b; }
    .overlay-win h2 { color: #f7c948; }
    .overlay p { color: var(--text-dim); font-size: 0.95rem; }

    .overlay-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .overlay button {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .overlay button:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--border); color: var(--text); }

    /* ---- instructions ---- */
    .instructions {
      color: var(--text-dim);
      font-size: 0.8rem;
      text-align: center;
      max-width: 360px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <nav class="game-nav">
    <a href="../index.html" class="back-link">← GameKingdom</a>
    <h1>2048</h1>
  </nav>

  <div id="gameContainer">
    <div class="game-header">
      <div class="scores">
        <div class="score-box">
          <div class="label">Score</div>
          <div class="value" id="scoreDisplay">0</div>
        </div>
        <div class="score-box">
          <div class="label">Best</div>
          <div class="value" id="bestDisplay">0</div>
        </div>
      </div>
      <button class="new-game-btn" id="newGameBtn">New Game</button>
    </div>

    <div class="board-wrap" id="boardWrap">
      <div id="board">
        <!-- 16 empty cell backgrounds -->
        <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
        <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
        <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
        <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      </div>
      <div id="tileLayer"></div>

      <div class="overlay overlay-win" id="winOverlay">
        <h2>You reached 2048!</h2>
        <p>Amazing! Keep going to beat your high score.</p>
        <div class="overlay-btns">
          <button class="btn-primary" id="keepGoingBtn">Keep Going</button>
          <button class="btn-secondary" id="winNewGameBtn">New Game</button>
        </div>
      </div>

      <div class="overlay overlay-game-over" id="gameOverOverlay">
        <h2>Game Over</h2>
        <p id="gameOverScore"></p>
        <div class="overlay-btns">
          <button class="btn-primary" id="retryBtn">Try Again</button>
        </div>
      </div>
    </div>

    <p class="instructions">Use arrow keys or swipe to slide tiles. Matching tiles merge!</p>
  </div>

  <script>
  (function () {
    'use strict';

    /* ====================================================
       State
    ==================================================== */
    const SIZE = 4;
    let grid = [];          // 4x4 flat array of numbers (0 = empty)
    let currentScore = 0;
    let bestScore = parseInt(localStorage.getItem('2048_best') || '0', 10);
    let gameOver = false;
    let won = false;
    let keepGoing = false;  // after reaching 2048, user chose to continue

    /* DOM refs */
    const scoreDisplay    = document.getElementById('scoreDisplay');
    const bestDisplay     = document.getElementById('bestDisplay');
    const newGameBtn      = document.getElementById('newGameBtn');
    const keepGoingBtn    = document.getElementById('keepGoingBtn');
    const winNewGameBtn   = document.getElementById('winNewGameBtn');
    const retryBtn        = document.getElementById('retryBtn');
    const winOverlay      = document.getElementById('winOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const gameOverScore   = document.getElementById('gameOverScore');
    const tileLayer       = document.getElementById('tileLayer');
    const boardEl         = document.getElementById('board');

    /* ====================================================
       Tile geometry helper
    ==================================================== */
    function getTileSizeAndGap() {
      const boardRect = boardEl.getBoundingClientRect();
      const boardSize = boardRect.width;
      const gap = Math.max(6, Math.floor(boardSize * 0.022));
      const padding = gap;
      const tileSize = (boardSize - padding * 2 - gap * 3) / 4;
      return { tileSize, gap, padding };
    }

    function tilePos(row, col) {
      const { tileSize, gap, padding } = getTileSizeAndGap();
      return {
        top:  padding + row * (tileSize + gap),
        left: padding + col * (tileSize + gap),
        size: tileSize,
      };
    }

    /* ====================================================
       Grid helpers
    ==================================================== */
    function idx(r, c) { return r * SIZE + c; }

    function emptyTiles() {
      const cells = [];
      for (let i = 0; i < SIZE * SIZE; i++) {
        if (grid[i] === 0) cells.push(i);
      }
      return cells;
    }

    function spawnTile() {
      const empties = emptyTiles();
      if (empties.length === 0) return null;
      const pos = empties[Math.floor(Math.random() * empties.length)];
      const val = Math.random() < 0.9 ? 2 : 4;
      grid[pos] = val;
      return pos;
    }

    /* ====================================================
       Move logic
       Returns { moved: bool, score: number, mergedIndices: Set, newPos: number }
    ==================================================== */
    function slide(line) {
      // line is array of 4 values; returns { line, score, mergedAt }
      const nonZero = line.filter(v => v !== 0);
      let score = 0;
      const merged = [];
      const result = [];
      let i = 0;
      while (i < nonZero.length) {
        if (i + 1 < nonZero.length && nonZero[i] === nonZero[i + 1]) {
          const val = nonZero[i] * 2;
          result.push(val);
          merged.push(result.length - 1);
          score += val;
          i += 2;
        } else {
          result.push(nonZero[i]);
          i++;
        }
      }
      while (result.length < SIZE) result.push(0);
      return { line: result, score, merged };
    }

    function applyMove(direction) {
      let totalScore = 0;
      let moved = false;
      const newGrid = [...grid];
      const mergedPositions = new Set();

      // directions: 0=up, 1=down, 2=left, 3=right
      const isVertical = direction === 0 || direction === 1;
      const reverse    = direction === 1 || direction === 3;

      for (let lineIdx = 0; lineIdx < SIZE; lineIdx++) {
        // extract line
        const line = [];
        for (let pos = 0; pos < SIZE; pos++) {
          const [r, c] = isVertical
            ? [pos, lineIdx]
            : [lineIdx, pos];
          line.push(grid[idx(r, c)]);
        }

        // reverse if needed (so we always slide "toward index 0")
        if (reverse) line.reverse();

        const { line: slid, score, merged } = slide(line);
        totalScore += score;

        // un-reverse
        if (reverse) {
          slid.reverse();
          // adjust merged indices
          const adjMerged = merged.map(m => SIZE - 1 - m);
          adjMerged.forEach(m => {
            const [r, c] = isVertical ? [m, lineIdx] : [lineIdx, m];
            mergedPositions.add(idx(r, c));
          });
        } else {
          merged.forEach(m => {
            const [r, c] = isVertical ? [m, lineIdx] : [lineIdx, m];
            mergedPositions.add(idx(r, c));
          });
        }

        // write back
        for (let pos = 0; pos < SIZE; pos++) {
          const [r, c] = isVertical
            ? [pos, lineIdx]
            : [lineIdx, pos];
          const flatIdx = idx(r, c);
          if (newGrid[flatIdx] !== slid[pos]) moved = true;
          newGrid[flatIdx] = slid[pos];
        }
      }

      return { newGrid, moved, totalScore, mergedPositions };
    }

    function hasMoves() {
      // any empty cell?
      if (emptyTiles().length > 0) return true;
      // any adjacent equal pair?
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const v = grid[idx(r, c)];
          if (c + 1 < SIZE && grid[idx(r, c + 1)] === v) return true;
          if (r + 1 < SIZE && grid[idx(r + 1, c)] === v) return true;
        }
      }
      return false;
    }

    /* ====================================================
       Rendering
    ==================================================== */
    function tileClass(val) {
      if (val <= 2048) return 't' + val;
      return 't-high';
    }

    function fontSize(val, tileSize) {
      const digits = String(val).length;
      if (digits <= 2)      return tileSize * 0.45 + 'px';
      if (digits === 3)     return tileSize * 0.38 + 'px';
      if (digits === 4)     return tileSize * 0.30 + 'px';
      return tileSize * 0.24 + 'px';
    }

    function renderTiles(animNewPos, animMergedSet) {
      tileLayer.innerHTML = '';
      for (let i = 0; i < SIZE * SIZE; i++) {
        if (grid[i] === 0) continue;
        const r = Math.floor(i / SIZE);
        const c = i % SIZE;
        const { top, left, size } = tilePos(r, c);
        const div = document.createElement('div');
        div.className = 'tile ' + tileClass(grid[i]);
        if (animNewPos === i) div.classList.add('tile-new');
        if (animMergedSet && animMergedSet.has(i)) div.classList.add('tile-merged');
        div.style.cssText = `
          top: ${top}px;
          left: ${left}px;
          width: ${size}px;
          height: ${size}px;
          font-size: ${fontSize(grid[i], size)};
        `;
        div.textContent = grid[i];
        tileLayer.appendChild(div);
      }
    }

    function updateScore() {
      scoreDisplay.textContent = currentScore;
      if (currentScore > bestScore) {
        bestScore = currentScore;
        localStorage.setItem('2048_best', bestScore);
      }
      bestDisplay.textContent = bestScore;
    }

    /* ====================================================
       Game flow
    ==================================================== */
    function startGame() {
      grid = new Array(SIZE * SIZE).fill(0);
      currentScore = 0;
      gameOver = false;
      won = false;
      keepGoing = false;
      winOverlay.classList.remove('visible');
      gameOverOverlay.classList.remove('visible');
      spawnTile();
      spawnTile();
      updateScore();
      renderTiles(null, null);
    }

    function processMove(direction) {
      if (gameOver) return;

      const { newGrid, moved, totalScore, mergedPositions } = applyMove(direction);
      if (!moved) return;

      grid = newGrid;
      currentScore += totalScore;
      updateScore();

      const newPos = spawnTile();
      renderTiles(newPos, mergedPositions);

      // Check win (2048 reached for the first time)
      if (!won && !keepGoing && grid.some(v => v === 2048)) {
        won = true;
        winOverlay.classList.add('visible');
        return;
      }

      // Check game over
      if (!hasMoves()) {
        gameOver = true;
        gameOverScore.textContent = `Final score: ${currentScore}`;
        gameOverOverlay.classList.add('visible');
        window.dispatchEvent(new CustomEvent('gameOver', {
          detail: { game: '2048', score: currentScore }
        }));
      }
    }

    /* ====================================================
       Input: keyboard
    ==================================================== */
    const KEY_DIR = {
      ArrowUp: 0, ArrowDown: 1, ArrowLeft: 2, ArrowRight: 3,
      w: 0, s: 1, a: 2, d: 3,
      W: 0, S: 1, A: 2, D: 3,
    };

    document.addEventListener('keydown', e => {
      if (e.key in KEY_DIR) {
        e.preventDefault();
        processMove(KEY_DIR[e.key]);
      }
    });

    /* ====================================================
       Input: touch swipe
    ==================================================== */
    let touchStartX = null;
    let touchStartY = null;

    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);
      if (Math.max(absDx, absDy) < 20) return; // too short
      if (absDx > absDy) {
        processMove(dx > 0 ? 3 : 2); // right / left
      } else {
        processMove(dy > 0 ? 1 : 0); // down / up
      }
      touchStartX = null;
      touchStartY = null;
    }, { passive: true });

    /* ====================================================
       Button handlers
    ==================================================== */
    newGameBtn.addEventListener('click', startGame);
    retryBtn.addEventListener('click', startGame);
    winNewGameBtn.addEventListener('click', startGame);
    keepGoingBtn.addEventListener('click', () => {
      keepGoing = true;
      winOverlay.classList.remove('visible');
    });

    /* ====================================================
       Re-render on resize (tile positions are absolute px)
    ==================================================== */
    window.addEventListener('resize', () => {
      renderTiles(null, null);
    });

    /* ====================================================
       Boot
    ==================================================== */
    bestDisplay.textContent = bestScore;
    startGame();

  })();
  </script>

</body>
</html>
