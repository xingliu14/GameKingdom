<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brick Blaster — GameKingdom</title>
  <meta name="description" content="Break bricks, collect power-ups, and blast through 5 challenging levels!" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --accent: #7c5cfc;
      --text: #e8e8f0;
      --border: #2e2e3e;
      --text-dim: #888899;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--accent); }

    .game-nav {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-link { font-size: .9rem; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .game-nav h1 { font-size: 1.1rem; font-weight: 700; }

    #gameContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 12px;
    }

    canvas {
      display: block;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: none;
    }

    #instructions {
      color: var(--text-dim);
      font-size: 0.82rem;
      text-align: center;
      max-width: 480px;
    }
  </style>
</head>
<body>

  <nav class="game-nav">
    <a href="../index.html" class="back-link">&#8592; GameKingdom</a>
    <h1>Brick Blaster</h1>
  </nav>

  <div id="gameContainer">
    <canvas id="gameCanvas" width="480" height="560" tabindex="0"></canvas>
    <p id="instructions">Mouse or Arrow keys to move paddle &nbsp;|&nbsp; Space / Click to launch ball &nbsp;|&nbsp; Space fires laser when active</p>
  </div>

<script>
'use strict';

// ── Canvas Setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width;   // 480
const H = canvas.height;  // 560

canvas.focus();

// ── Constants ─────────────────────────────────────────────────────────────────
const PADDLE_W       = 80;
const PADDLE_H       = 12;
const PADDLE_Y       = H - 36;
const BALL_R         = 8;
const BRICK_W        = 44;
const BRICK_H        = 18;
const BRICK_GAP      = 2;
const BRICK_COLS     = 10;
const BRICK_OFFSET_X = (W - (BRICK_COLS * (BRICK_W + BRICK_GAP) - BRICK_GAP)) / 2;
const BRICK_OFFSET_Y = 56;

// Brick type constants
const B_EMPTY = 0;
const B_1HIT  = 1;
const B_2HIT  = 2;
const B_3HIT  = 3;
const B_INDES = 4;
const B_EXPL  = 5;

// Power-up type constants
const PU_WIDE   = 'wide';
const PU_MULTI  = 'multi';
const PU_SLOW   = 'slow';
const PU_LASER  = 'laser';
const PU_SHIELD = 'shield';
const PU_LIFE   = 'life';

const POWERUP_TYPES = [PU_WIDE, PU_MULTI, PU_SLOW, PU_LASER, PU_SHIELD, PU_LIFE];

const POWERUP_COLORS = {
  [PU_WIDE]:   '#4488ff',
  [PU_MULTI]:  '#ff4444',
  [PU_SLOW]:   '#44cc44',
  [PU_LASER]:  '#ffcc00',
  [PU_SHIELD]: '#aaaacc',
  [PU_LIFE]:   '#ff6688',
};

const POWERUP_ICONS = {
  [PU_WIDE]:   '\uD83D\uDD35',   // 🔵
  [PU_MULTI]:  '\uD83D\uDD34',   // 🔴
  [PU_SLOW]:   '\uD83D\uDFE2',   // 🟢
  [PU_LASER]:  '\uD83D\uDFE1',   // 🟡
  [PU_SHIELD]: '\u26AA',         // ⚪
  [PU_LIFE]:   '\u2764\uFE0F',   // ❤️
};

// Rainbow colors for 1-hit bricks (per column)
const BRICK_COLORS_1HIT = [
  '#ff4b6e','#ff7c44','#ffd644','#7fff6e','#44c8ff',
  '#7c5cfc','#ff44d4','#44ffb8','#ff9944','#aaffaa',
];
const BRICK_COLOR_2HIT  = '#8888cc';
const BRICK_COLOR_3HIT  = '#445566';
const BRICK_COLOR_INDES = '#778899';
const BRICK_COLOR_EXPL  = '#ff8833';

// Base ball speeds per level
const LEVEL_SPEEDS = [3.2, 3.6, 4.0, 4.4, 4.8];

// ── Level Layouts ─────────────────────────────────────────────────────────────
const E = B_EMPTY, H1 = B_1HIT, H2 = B_2HIT, H3 = B_3HIT, IN = B_INDES, EX = B_EXPL;

const LEVEL_DATA = [
  // Level 1 — 6 rows of 1-hit bricks
  [
    [H1,H1,H1,H1,H1,H1,H1,H1,H1,H1],
    [H1,H1,H1,H1,H1,H1,H1,H1,H1,H1],
    [H1,H1,H1,H1,H1,H1,H1,H1,H1,H1],
    [H1,H1,H1,H1,H1,H1,H1,H1,H1,H1],
    [H1,H1,H1,H1,H1,H1,H1,H1,H1,H1],
    [H1,H1,H1,H1,H1,H1,H1,H1,H1,H1],
  ],
  // Level 2 — mix of 1-hit and 2-hit with gaps
  [
    [H2,H2,H2,H2,H2,H2,H2,H2,H2,H2],
    [H2,H1,H1,H1,H2,H2,H1,H1,H1,H2],
    [H1,H1, E,H1,H1,H1,H1, E,H1,H1],
    [H2, E,H1,H2, E, E,H2,H1, E,H2],
    [H1,H1,H1, E,H2,H2, E,H1,H1,H1],
    [H2,H1, E,H1,H1,H1,H1, E,H1,H2],
    [ E,H2,H2,H2, E, E,H2,H2,H2, E],
  ],
  // Level 3 — diamond with 3-hit bricks
  [
    [ E, E, E, E,H3,H3, E, E, E, E],
    [ E, E, E,H3,H2,H2,H3, E, E, E],
    [ E, E,H3,H2,H1,H1,H2,H3, E, E],
    [ E,H3,H2,H1,H2,H2,H1,H2,H3, E],
    [H3,H2,H1,H2,H3,H3,H2,H1,H2,H3],
    [ E,H3,H2,H1,H2,H2,H1,H2,H3, E],
    [ E, E,H3,H2,H1,H1,H2,H3, E, E],
    [ E, E, E,H3,H2,H2,H3, E, E, E],
  ],
  // Level 4 — diamond with indestructible obstacles and explosions
  [
    [H2,H2,H2,H2,IN,IN,H2,H2,H2,H2],
    [H2,H1,H1,IN,H2,H2,IN,H1,H1,H2],
    [H1,H1,IN,H2,H3,H3,H2,IN,H1,H1],
    [EX,IN,H2,H3,H2,H2,H3,H2,IN,EX],
    [H1,H1,IN,H2,H3,H3,H2,IN,H1,H1],
    [H2,H1,H1,IN,H2,H2,IN,H1,H1,H2],
    [IN,H2,H2,H2,EX,EX,H2,H2,H2,IN],
    [H2,IN,H1,H1,H2,H2,H1,H1,IN,H2],
  ],
  // Level 5 — dense grid with all brick types
  [
    [H3,H3,H3,H3,H3,H3,H3,H3,H3,H3],
    [H3,EX,H2,IN,H3,H3,IN,H2,EX,H3],
    [H3,H2,IN,H2,EX,EX,H2,IN,H2,H3],
    [EX,IN,H2,H3,H2,H2,H3,H2,IN,EX],
    [H3,H2,EX,H2,IN,IN,H2,EX,H2,H3],
    [H3,H3,H2,IN,H3,H3,IN,H2,H3,H3],
    [IN,EX,H3,H2,H3,H3,H2,H3,EX,IN],
    [H3,H3,H3,H3,EX,EX,H3,H3,H3,H3],
    [H2,IN,H3,EX,H2,H2,EX,H3,IN,H2],
  ],
];

// ── Game State ────────────────────────────────────────────────────────────────
let gameState = 'start';  // start | playing | levelcomplete | gameover | win
let score     = 0;
let lives     = 3;
let level     = 1;
let perfectLevel = true;
let finalScore   = 0;

let paddle = { x: W / 2 - PADDLE_W / 2, y: PADDLE_Y, w: PADDLE_W, h: PADDLE_H };
let balls        = [];
let bricks       = [];
let powerups     = [];
let lasers       = [];
let activeEffects = {};   // { [type]: { endTime } }
let shieldActive = false;
let mouseX       = W / 2;
let keysDown     = {};
let laserCooldown = 0;
let lastTime      = 0;
let spaceWasDown  = false;   // to detect leading edge of space for laser

// ── Utility ───────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function brickPixelX(col) { return BRICK_OFFSET_X + col * (BRICK_W + BRICK_GAP); }
function brickPixelY(row) { return BRICK_OFFSET_Y + row * (BRICK_H + BRICK_GAP); }

function getPaddleWidth()  { return activeEffects[PU_WIDE] ? PADDLE_W * 1.5 : PADDLE_W; }
function getBaseSpeed()    { return LEVEL_SPEEDS[Math.min(level - 1, LEVEL_SPEEDS.length - 1)]; }
function getTargetSpeed()  { return activeEffects[PU_SLOW] ? getBaseSpeed() * 0.75 : getBaseSpeed(); }
function getMultiplier()   { return balls.length > 1 ? 2 : 1; }

// ── Init / Reset ──────────────────────────────────────────────────────────────
function initLevel() {
  const layout = LEVEL_DATA[level - 1];
  bricks = [];
  for (let r = 0; r < layout.length; r++) {
    for (let c = 0; c < layout[r].length; c++) {
      const type = layout[r][c];
      if (type === B_EMPTY) continue;
      bricks.push({ x: brickPixelX(c), y: brickPixelY(r), w: BRICK_W, h: BRICK_H, type, hits: 0, row: r, col: c, alive: true });
    }
  }
  powerups      = [];
  lasers        = [];
  activeEffects = {};
  shieldActive  = false;
  laserCooldown = 0;
  perfectLevel  = true;
  resetBall();
}

function resetBall() {
  const pw = getPaddleWidth();
  balls = [{ x: paddle.x + pw / 2, y: PADDLE_Y - BALL_R - 1, vx: 0, vy: 0, onPaddle: true }];
}

function launchBall(ball) {
  const speed = getTargetSpeed();
  const spread = 0.6;
  ball.vx = (Math.random() * 2 - 1) * speed * spread;
  ball.vy = -Math.sqrt(Math.max(0.1, speed * speed - ball.vx * ball.vx));
  ball.onPaddle = false;
}

// ── Brick helpers ─────────────────────────────────────────────────────────────
function brickColor(brick) {
  switch (brick.type) {
    case B_1HIT:  return BRICK_COLORS_1HIT[brick.col % BRICK_COLORS_1HIT.length];
    case B_2HIT:  return BRICK_COLOR_2HIT;
    case B_3HIT:  return BRICK_COLOR_3HIT;
    case B_INDES: return BRICK_COLOR_INDES;
    case B_EXPL:  return BRICK_COLOR_EXPL;
    default:      return '#ffffff';
  }
}

function brickHitsToKill(type) {
  if (type === B_1HIT)  return 1;
  if (type === B_2HIT)  return 2;
  if (type === B_3HIT)  return 3;
  if (type === B_EXPL)  return 1;
  if (type === B_INDES) return Infinity;
  return 1;
}

function brickPoints(type) {
  if (type === B_1HIT)  return 10;
  if (type === B_2HIT)  return 15;
  if (type === B_3HIT)  return 25;
  if (type === B_EXPL)  return 20;
  return 0;
}

// ── Power-up spawn ────────────────────────────────────────────────────────────
function spawnPowerup(brick) {
  if (Math.random() > 0.25) return;
  const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  powerups.push({ x: brick.x + brick.w / 2 - 14, y: brick.y, w: 28, h: 28, type, vy: 1.8 });
}

function collectPowerup(pu) {
  switch (pu.type) {
    case PU_WIDE:
      activeEffects[PU_WIDE] = { endTime: Date.now() + 15000 };
      break;
    case PU_MULTI: {
      const extras = [];
      for (const b of balls) {
        const speed = getTargetSpeed();
        for (let i = 0; i < 2; i++) {
          const angle = Math.PI * (-0.75 + i * 0.5);
          extras.push({ x: b.x, y: b.y, vx: Math.sin(angle) * speed, vy: -Math.cos(angle) * speed, onPaddle: false });
        }
      }
      balls.push(...extras);
      break;
    }
    case PU_SLOW:
      activeEffects[PU_SLOW] = { endTime: Date.now() + 15000 };
      rescaleAllBalls();
      break;
    case PU_LASER:
      activeEffects[PU_LASER] = { endTime: Date.now() + 10000 };
      break;
    case PU_SHIELD:
      shieldActive = true;
      break;
    case PU_LIFE:
      lives = Math.min(lives + 1, 9);
      break;
  }
}

function rescaleAllBalls() {
  const tgt = getTargetSpeed();
  for (const b of balls) {
    if (b.onPaddle) continue;
    const spd = Math.hypot(b.vx, b.vy);
    if (spd > 0) { b.vx = b.vx / spd * tgt; b.vy = b.vy / spd * tgt; }
  }
}

// ── Explosion ──────────────────────────────────────────────────────────────────
function triggerExplosion(brick) {
  const { row, col } = brick;
  for (const b of bricks) {
    if (!b.alive || b === brick) continue;
    if (Math.abs(b.row - row) <= 1 && Math.abs(b.col - col) <= 1) {
      if (b.type === B_INDES) continue;
      score += brickPoints(b.type) * getMultiplier();
      spawnPowerup(b);
      b.alive = false;
      // chain explosions are handled next frame naturally (alive=false already)
    }
  }
}

// ── Collision ─────────────────────────────────────────────────────────────────
function rectCircleOverlap(rx, ry, rw, rh, cx, cy, cr) {
  const nearX = clamp(cx, rx, rx + rw);
  const nearY = clamp(cy, ry, ry + rh);
  const dx = cx - nearX, dy = cy - nearY;
  return dx * dx + dy * dy < cr * cr;
}

function bounceCircleRect(ball, rx, ry, rw, rh) {
  const nearX = clamp(ball.x, rx, rx + rw);
  const nearY = clamp(ball.y, ry, ry + rh);
  const dx = ball.x - nearX;
  const dy = ball.y - nearY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist === 0) { ball.vy = -Math.abs(ball.vy); return; }

  const nx = dx / dist, ny = dy / dist;
  const dot = ball.vx * nx + ball.vy * ny;
  if (dot < 0) { ball.vx -= 2 * dot * nx; ball.vy -= 2 * dot * ny; }
  const overlap = BALL_R - dist;
  if (overlap > 0) { ball.x += nx * overlap; ball.y += ny * overlap; }
}

function handlePaddleBounce(ball) {
  const pw = getPaddleWidth();
  if (!rectCircleOverlap(paddle.x, paddle.y, pw, PADDLE_H, ball.x, ball.y, BALL_R)) return false;
  if (ball.vy < 0) return false;

  const rel = (ball.x - (paddle.x + pw / 2)) / (pw / 2); // -1 to 1
  const maxAngle = Math.PI / 3;
  const angle = clamp(rel, -1, 1) * maxAngle;
  const speed = Math.hypot(ball.vx, ball.vy);
  ball.vx = Math.sin(angle) * speed;
  ball.vy = -Math.abs(Math.cos(angle) * speed);
  ball.y  = paddle.y - BALL_R - 0.5;
  return true;
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  const now = Date.now();

  // expire power-up effects
  for (const k of Object.keys(activeEffects)) {
    if (now > activeEffects[k].endTime) delete activeEffects[k];
  }

  // paddle position
  const pw = getPaddleWidth();
  paddle.w = pw;
  if (keysDown['ArrowLeft'])  mouseX = clamp(mouseX - 5, pw / 2, W - pw / 2);
  if (keysDown['ArrowRight']) mouseX = clamp(mouseX + 5, pw / 2, W - pw / 2);
  paddle.x = clamp(mouseX - pw / 2, 0, W - pw);

  // update balls
  const removeBalls = [];
  for (const ball of balls) {
    if (ball.onPaddle) {
      ball.x = paddle.x + pw / 2;
      ball.y = PADDLE_Y - BALL_R - 1;
      continue;
    }

    // enforce minimum vertical speed to prevent horizontal trapped balls
    if (Math.abs(ball.vy) < 1.0) ball.vy = ball.vy >= 0 ? 1.2 : -1.2;

    ball.x += ball.vx;
    ball.y += ball.vy;

    // wall bounces
    if (ball.x - BALL_R < 0)  { ball.x = BALL_R;     ball.vx =  Math.abs(ball.vx); }
    if (ball.x + BALL_R > W)  { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
    if (ball.y - BALL_R < 0)  { ball.y = BALL_R;     ball.vy =  Math.abs(ball.vy); }

    // shield bounce
    if (shieldActive && ball.y + BALL_R > H - 6 && ball.vy > 0) {
      ball.vy = -Math.abs(ball.vy);
      ball.y  = H - 6 - BALL_R;
    }

    // paddle
    handlePaddleBounce(ball);

    // brick collisions (process at most one brick per ball per frame to avoid clip-through jitter)
    for (const brick of bricks) {
      if (!brick.alive) continue;
      if (!rectCircleOverlap(brick.x, brick.y, brick.w, brick.h, ball.x, ball.y, BALL_R)) continue;

      if (brick.type !== B_INDES) {
        brick.hits++;
        score += brickPoints(brick.type) * getMultiplier();
        if (brick.hits >= brickHitsToKill(brick.type)) {
          brick.alive = false;
          spawnPowerup(brick);
          if (brick.type === B_EXPL) triggerExplosion(brick);
        }
      }

      bounceCircleRect(ball, brick.x, brick.y, brick.w, brick.h);
      break;
    }

    // ball exits bottom
    if (ball.y - BALL_R > H) removeBalls.push(ball);
  }

  for (const b of removeBalls) balls.splice(balls.indexOf(b), 1);

  // all balls lost
  if (balls.length === 0) {
    lives--;
    perfectLevel = false;
    shieldActive = false;
    if (lives <= 0) {
      finalScore = score;
      gameState  = 'gameover';
      window.dispatchEvent(new CustomEvent('gameOver', { detail: { game: 'brick-blaster', score: finalScore } }));
      return;
    }
    resetBall();
  }

  // falling power-ups
  const removePUs = [];
  for (const pu of powerups) {
    pu.y += pu.vy;
    const curPW = getPaddleWidth();
    if (pu.x + pu.w > paddle.x && pu.x < paddle.x + curPW &&
        pu.y + pu.h > paddle.y && pu.y < paddle.y + PADDLE_H) {
      collectPowerup(pu);
      removePUs.push(pu);
    } else if (pu.y > H + 40) {
      removePUs.push(pu);
    }
  }
  for (const pu of removePUs) { const i = powerups.indexOf(pu); if (i !== -1) powerups.splice(i, 1); }

  // laser fire
  if (activeEffects[PU_LASER]) {
    laserCooldown = Math.max(0, laserCooldown - 1);
    const spaceDown = keysDown[' '];
    if (spaceDown && !spaceWasDown && laserCooldown === 0) {
      const curPW = getPaddleWidth();
      lasers.push({ x: paddle.x + curPW * 0.22, y: paddle.y - 2, vy: -9 });
      lasers.push({ x: paddle.x + curPW * 0.78, y: paddle.y - 2, vy: -9 });
      laserCooldown = 16;
    }
    spaceWasDown = spaceDown;
  } else {
    spaceWasDown = false;
  }

  // move lasers
  const removeLasers = [];
  for (const laser of lasers) {
    laser.y += laser.vy;
    let hit = false;
    for (const brick of bricks) {
      if (!brick.alive) continue;
      if (laser.x >= brick.x && laser.x <= brick.x + brick.w &&
          laser.y >= brick.y && laser.y <= brick.y + brick.h) {
        if (brick.type !== B_INDES) {
          brick.hits++;
          score += brickPoints(brick.type) * getMultiplier();
          if (brick.hits >= brickHitsToKill(brick.type)) {
            brick.alive = false;
            spawnPowerup(brick);
            if (brick.type === B_EXPL) triggerExplosion(brick);
          }
        }
        hit = true;
        break;
      }
    }
    if (hit || laser.y < 0) removeLasers.push(laser);
  }
  for (const l of removeLasers) { const i = lasers.indexOf(l); if (i !== -1) lasers.splice(i, 1); }

  // check level complete (all destroyable bricks gone)
  const remaining = bricks.filter(b => b.alive && b.type !== B_INDES);
  if (remaining.length === 0) {
    if (perfectLevel) score += 500;
    if (level >= 5) {
      finalScore = score;
      gameState  = 'win';
      window.dispatchEvent(new CustomEvent('gameOver', { detail: { game: 'brick-blaster', score: finalScore } }));
    } else {
      gameState = 'levelcomplete';
    }
  }
}

// ── Draw helpers ───────────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Draw brick ────────────────────────────────────────────────────────────────
function drawBrick(brick) {
  const { x, y, w, h, type, hits } = brick;
  const col = brickColor(brick);
  ctx.save();

  // glow
  ctx.shadowColor = col;
  ctx.shadowBlur  = 5;

  // body — darken on each hit
  ctx.globalAlpha = Math.max(0.5, 1 - hits * 0.18);
  ctx.fillStyle   = col;
  roundRect(x, y, w, h, 3);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.shadowBlur  = 0;

  // top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  roundRect(x + 2, y + 2, w - 4, 4, 2);
  ctx.fill();

  // damage cracks
  if (type === B_2HIT && hits >= 1) {
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + w * 0.3, y + 2); ctx.lineTo(x + w * 0.5, y + h / 2); ctx.lineTo(x + w * 0.7, y + h - 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 4, y + h * 0.4); ctx.lineTo(x + w * 0.5, y + h / 2); ctx.lineTo(x + w - 4, y + h * 0.6);
    ctx.stroke();
  }
  if (type === B_3HIT && hits >= 1) {
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < Math.min(hits, 3); i++) {
      const ox = x + 5 + i * 12;
      ctx.beginPath();
      ctx.moveTo(ox, y + 3); ctx.lineTo(ox + 8, y + h - 3);
      ctx.moveTo(ox + 8, y + 3); ctx.lineTo(ox, y + h - 3);
      ctx.stroke();
    }
  }

  // explosion icon
  if (type === B_EXPL) {
    ctx.font = '11px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\uD83D\uDCA5', x + w / 2, y + h / 2);  // 💥
  }

  // indestructible sheen stripes
  if (type === B_INDES) {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(x + 3 + i * (w / 3), y + 2, 2, h - 4);
    }
  }

  ctx.restore();
}

// ── Draw UI bar ───────────────────────────────────────────────────────────────
function drawUI() {
  ctx.save();
  ctx.fillStyle = 'rgba(15,15,19,0.78)';
  ctx.fillRect(0, 0, W, 50);
  ctx.strokeStyle = 'rgba(46,46,62,0.9)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, 50); ctx.lineTo(W, 50); ctx.stroke();

  ctx.font = 'bold 13px Segoe UI, system-ui, sans-serif';
  ctx.textBaseline = 'middle';

  // score
  ctx.fillStyle  = '#e8e8f0';
  ctx.textAlign  = 'left';
  ctx.fillText('Score: ' + score, 10, 16);

  // level
  ctx.textAlign = 'center';
  ctx.fillText('Level ' + level + ' / 5', W / 2, 16);

  // lives
  ctx.fillStyle = '#ff6688';
  ctx.textAlign = 'right';
  let hearts = '';
  for (let i = 0; i < lives; i++) hearts += '\u2665 ';
  ctx.fillText(hearts.trim(), W - 10, 16);

  // power-up timer bars
  const now = Date.now();
  let barX = 8;
  const barY = 32;
  const barH = 8;
  const barW = 52;

  for (const [type, eff] of Object.entries(activeEffects)) {
    const total  = type === PU_LASER ? 10000 : 15000;
    const frac   = Math.max(0, (eff.endTime - now) / total);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    roundRect(barX, barY, barW, barH, 4); ctx.fill();
    ctx.fillStyle = POWERUP_COLORS[type];
    if (frac > 0) { roundRect(barX, barY, barW * frac, barH, 4); ctx.fill(); }
    ctx.font = '10px serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#e8e8f0';
    ctx.fillText(POWERUP_ICONS[type], barX + barW + 2, barY + 6);
    barX += barW + 18;
    if (barX > W - 70) break;
  }

  if (shieldActive) {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    roundRect(barX, barY, 32, barH, 4); ctx.fill();
    ctx.fillStyle = '#aaaacc';
    roundRect(barX, barY, 32, barH, 4); ctx.fill();
    ctx.font = '10px serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#e8e8f0';
    ctx.fillText('\u26AA', barX + 34, barY + 6);
  }

  ctx.restore();
}

// ── Overlay helpers ───────────────────────────────────────────────────────────
function drawDimOverlay() {
  ctx.fillStyle = 'rgba(10,10,18,0.84)';
  ctx.fillRect(0, 0, W, H);
}

function drawPulsingBtn(cx, cy, label) {
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 380);
  ctx.save();
  ctx.shadowColor = '#7c5cfc';
  ctx.shadowBlur  = 6 + 10 * pulse;
  ctx.fillStyle   = 'rgba(124,92,252,' + (0.82 + 0.18 * pulse) + ')';
  roundRect(cx - 150, cy - 19, 300, 38, 9);
  ctx.fill();
  ctx.shadowBlur   = 0;
  ctx.fillStyle    = '#ffffff';
  ctx.font         = 'bold 13px Segoe UI, system-ui, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, cy);
  ctx.restore();
}

function drawStartScreen() {
  drawDimOverlay();
  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'alphabetic';

  ctx.shadowColor = '#7c5cfc';
  ctx.shadowBlur  = 22;
  ctx.fillStyle   = '#7c5cfc';
  ctx.font        = 'bold 40px Segoe UI, system-ui, sans-serif';
  ctx.fillText('BRICK BLASTER', W / 2, H / 2 - 65);
  ctx.shadowBlur  = 0;

  ctx.fillStyle = '#e8e8f0';
  ctx.font      = '16px Segoe UI, system-ui, sans-serif';
  ctx.fillText('Break all bricks to advance levels', W / 2, H / 2 - 20);

  ctx.fillStyle = '#888899';
  ctx.font      = '13px Segoe UI, system-ui, sans-serif';
  ctx.fillText('Mouse or \u2190 \u2192 to move paddle', W / 2, H / 2 + 10);
  ctx.fillText('Space or Click to launch ball', W / 2, H / 2 + 30);
  ctx.fillText('Catch power-ups \u2022 5 levels \u2022 3 lives', W / 2, H / 2 + 52);

  drawPulsingBtn(W / 2, H / 2 + 95, 'PRESS SPACE OR CLICK TO PLAY');
  ctx.restore();
}

function drawLevelComplete() {
  drawDimOverlay();
  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'alphabetic';

  ctx.shadowColor = '#7c5cfc';
  ctx.shadowBlur  = 16;
  ctx.fillStyle   = '#7c5cfc';
  ctx.font        = 'bold 30px Segoe UI, system-ui, sans-serif';
  ctx.fillText('LEVEL COMPLETE!', W / 2, H / 2 - 55);
  ctx.shadowBlur  = 0;

  if (perfectLevel) {
    ctx.fillStyle = '#ffd644';
    ctx.font      = 'bold 15px Segoe UI, system-ui, sans-serif';
    ctx.fillText('PERFECT CLEAR \u2014 +500 bonus!', W / 2, H / 2 - 18);
  }

  ctx.fillStyle = '#e8e8f0';
  ctx.font      = '17px Segoe UI, system-ui, sans-serif';
  ctx.fillText('Score: ' + score, W / 2, H / 2 + 14);

  ctx.fillStyle = '#888899';
  ctx.font      = '13px Segoe UI, system-ui, sans-serif';
  ctx.fillText('Level ' + level + ' of 5 complete', W / 2, H / 2 + 38);

  drawPulsingBtn(W / 2, H / 2 + 88, 'SPACE OR CLICK TO CONTINUE');
  ctx.restore();
}

function drawGameOver() {
  drawDimOverlay();
  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'alphabetic';

  ctx.shadowColor = '#ff4b6e';
  ctx.shadowBlur  = 18;
  ctx.fillStyle   = '#ff4b6e';
  ctx.font        = 'bold 34px Segoe UI, system-ui, sans-serif';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 58);
  ctx.shadowBlur  = 0;

  ctx.fillStyle = '#e8e8f0';
  ctx.font      = '18px Segoe UI, system-ui, sans-serif';
  ctx.fillText('Final Score: ' + finalScore, W / 2, H / 2 - 14);

  ctx.fillStyle = '#888899';
  ctx.font      = '13px Segoe UI, system-ui, sans-serif';
  ctx.fillText('Level reached: ' + level, W / 2, H / 2 + 12);

  drawPulsingBtn(W / 2, H / 2 + 78, 'PLAY AGAIN');
  ctx.restore();
}

function drawWin() {
  drawDimOverlay();
  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'alphabetic';

  ctx.shadowColor = '#ffd644';
  ctx.shadowBlur  = 22;
  ctx.fillStyle   = '#ffd644';
  ctx.font        = 'bold 32px Segoe UI, system-ui, sans-serif';
  ctx.fillText('YOU WIN! \uD83C\uDF89', W / 2, H / 2 - 66);   // 🎉
  ctx.shadowBlur  = 0;

  ctx.fillStyle = '#7c5cfc';
  ctx.font      = 'bold 18px Segoe UI, system-ui, sans-serif';
  ctx.fillText('All 5 levels cleared!', W / 2, H / 2 - 22);

  ctx.fillStyle = '#e8e8f0';
  ctx.font      = '18px Segoe UI, system-ui, sans-serif';
  ctx.fillText('Final Score: ' + finalScore, W / 2, H / 2 + 12);

  drawPulsingBtn(W / 2, H / 2 + 78, 'PLAY AGAIN');
  ctx.restore();
}

// ── Main draw ─────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // subtle dot-grid background
  ctx.fillStyle = 'rgba(255,255,255,0.022)';
  for (let x = 10; x < W; x += 22) {
    for (let y = 10; y < H; y += 22) {
      ctx.fillRect(x, y, 1, 1);
    }
  }

  // bricks
  for (const brick of bricks) { if (brick.alive) drawBrick(brick); }

  // falling power-ups
  for (const pu of powerups) {
    ctx.save();
    ctx.shadowColor = POWERUP_COLORS[pu.type];
    ctx.shadowBlur  = 10;
    ctx.fillStyle   = POWERUP_COLORS[pu.type];
    ctx.beginPath();
    ctx.arc(pu.x + pu.w / 2, pu.y + pu.h / 2, pu.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.font = '13px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(POWERUP_ICONS[pu.type], pu.x + pu.w / 2, pu.y + pu.h / 2);
    ctx.restore();
  }

  // lasers
  for (const laser of lasers) {
    ctx.save();
    ctx.strokeStyle = '#ffff44';
    ctx.shadowColor = '#ffff44';
    ctx.shadowBlur  = 8;
    ctx.lineWidth   = 2.5;
    ctx.beginPath();
    ctx.moveTo(laser.x, laser.y);
    ctx.lineTo(laser.x, laser.y + 16);
    ctx.stroke();
    ctx.restore();
  }

  // shield bar
  if (shieldActive) {
    ctx.save();
    ctx.strokeStyle = 'rgba(180,200,255,0.75)';
    ctx.shadowColor = '#8899ff';
    ctx.shadowBlur  = 14;
    ctx.lineWidth   = 4;
    ctx.beginPath(); ctx.moveTo(0, H - 5); ctx.lineTo(W, H - 5); ctx.stroke();
    ctx.restore();
  }

  // paddle
  const pw = getPaddleWidth();
  ctx.save();
  ctx.shadowColor = '#7c5cfc';
  ctx.shadowBlur  = 14;
  const padGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + PADDLE_H);
  padGrad.addColorStop(0, '#9d80ff');
  padGrad.addColorStop(1, '#5a3ccc');
  ctx.fillStyle = padGrad;
  roundRect(paddle.x, paddle.y, pw, PADDLE_H, 6);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle  = 'rgba(255,255,255,0.22)';
  roundRect(paddle.x + 4, paddle.y + 2, pw - 8, 3, 2);
  ctx.fill();
  ctx.restore();

  // balls
  for (const ball of balls) {
    ctx.save();
    ctx.shadowColor = '#ccbbff';
    ctx.shadowBlur  = 12;
    const bg = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, BALL_R);
    bg.addColorStop(0, '#ffffff');
    bg.addColorStop(0.5, '#c8b8ff');
    bg.addColorStop(1, '#7c5cfc');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  drawUI();

  // overlays
  if      (gameState === 'start')         drawStartScreen();
  else if (gameState === 'levelcomplete') drawLevelComplete();
  else if (gameState === 'gameover')      drawGameOver();
  else if (gameState === 'win')           drawWin();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  lastTime = ts;
  if (gameState === 'playing') update();
  draw();
  requestAnimationFrame(loop);
}

// ── Actions ───────────────────────────────────────────────────────────────────
function handleAction() {
  if (gameState === 'start') {
    startGame();
  } else if (gameState === 'playing') {
    const onPaddle = balls.some(b => b.onPaddle);
    if (onPaddle) balls.forEach(b => { if (b.onPaddle) launchBall(b); });
  } else if (gameState === 'levelcomplete') {
    level++;
    gameState = 'playing';
    initLevel();
  } else if (gameState === 'gameover' || gameState === 'win') {
    restartGame();
  }
}

function startGame() {
  score     = 0;
  lives     = 3;
  level     = 1;
  gameState = 'playing';
  initLevel();
}

function restartGame() {
  score     = 0;
  lives     = 3;
  level     = 1;
  gameState = 'playing';
  initLevel();
}

// ── Input listeners ───────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
});

canvas.addEventListener('click', () => handleAction());

window.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') { e.preventDefault(); }
  if (!keysDown[e.key]) {
    keysDown[e.key] = true;
    if (e.key === ' ') {
      // launch ball or trigger action on leading edge of space
      if (gameState === 'playing') {
        const onPaddle = balls.some(b => b.onPaddle);
        if (onPaddle) balls.forEach(b => { if (b.onPaddle) launchBall(b); });
        // laser handled in update via spaceWasDown edge detection
      } else {
        handleAction();
      }
    }
  }
});

window.addEventListener('keyup', e => { keysDown[e.key] = false; });

// ── Boot ──────────────────────────────────────────────────────────────────────
gameState = 'start';
requestAnimationFrame(loop);
</script>
</body>
