<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whack-a-Mole — GameKingdom</title>
  <meta name="description" content="Smash the moles as fast as you can before time runs out! Watch out for the bombs." />
  <script src="../sounds.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f;
      --border: #2e2e3e; --accent: #7c5cfc;
      --text: #e8e8f0; --text-dim: #888899;
      --radius: 10px;
      --hole-color: #12121a;
      --hole-rim: #1e1e2e;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
      user-select: none;
    }
    a { color: var(--accent); }

    /* ---- Nav ---- */
    .game-nav {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .back-link { font-size: .9rem; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .game-nav h1 { font-size: 1.1rem; font-weight: 700; }

    /* ---- Shared container ---- */
    #gameContainer {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 16px; gap: 20px;
    }

    /* ---- Buttons ---- */
    .btn {
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      padding: 12px 32px; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; transition: filter 0.15s, transform 0.1s;
      touch-action: manipulation;
    }
    .btn:hover { filter: brightness(1.15); }
    .btn:active { transform: scale(0.96); }
    .btn-ghost {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
    }
    .btn-ghost:hover { background: var(--accent); color: #fff; }

    /* ---- Start Screen ---- */
    #startScreen {
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      text-align: center; max-width: 420px; width: 100%;
    }
    .start-hero { font-size: clamp(3.5rem, 14vw, 5rem); line-height: 1; }
    .start-title { font-size: clamp(1.6rem, 5vw, 2.2rem); font-weight: 800; }
    .start-instructions {
      color: var(--text-dim); font-size: .92rem; line-height: 1.6;
      background: var(--surface); border-radius: var(--radius);
      padding: 14px 18px; width: 100%;
    }
    .start-instructions span { color: var(--text); }

    .difficulty-group {
      display: flex; gap: 10px; width: 100%;
    }
    .diff-btn {
      flex: 1; padding: 10px 8px;
      background: var(--surface2); color: var(--text-dim);
      border: 2px solid var(--border); border-radius: var(--radius);
      font-size: .9rem; font-weight: 700; cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      touch-action: manipulation;
    }
    .diff-btn:hover { border-color: var(--accent); color: var(--text); }
    .diff-btn.selected {
      border-color: var(--accent); background: var(--accent);
      color: #fff;
    }

    /* ---- Game Screen ---- */
    #gameScreen {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px; width: 100%;
    }
    #gameScreen[hidden] { display: none; }

    /* HUD */
    .hud {
      display: flex; gap: 16px; align-items: center; justify-content: center;
    }
    .hud-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 24px; text-align: center; min-width: 110px;
    }
    .hud-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-dim); margin-bottom: 4px;
    }
    .hud-value {
      font-size: 1.7rem; font-weight: 800; line-height: 1;
    }
    #timerDisplay { color: var(--accent); }
    #timerDisplay.urgent { color: #ff4466; animation: timerPulse 0.5s ease-in-out infinite alternate; }
    @keyframes timerPulse {
      from { transform: scale(1); }
      to   { transform: scale(1.12); }
    }

    /* ---- Grid ---- */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 2.5vw, 18px);
      width: min(420px, 92vw);
    }

    .hole {
      aspect-ratio: 1;
      background: var(--hole-color);
      border-radius: 50%;
      border: 3px solid var(--hole-rim);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      touch-action: manipulation;
      transition: box-shadow 0.15s;
      box-shadow: inset 0 4px 14px rgba(0,0,0,0.7);
    }
    .hole:hover { box-shadow: inset 0 4px 14px rgba(0,0,0,0.7), 0 0 0 2px var(--accent); }

    .hole.bomb-flash {
      animation: bombFlash 0.45s ease-out forwards;
    }
    @keyframes bombFlash {
      0%   { box-shadow: inset 0 4px 14px rgba(0,0,0,0.7), 0 0 0 5px #ff2244, 0 0 24px #ff2244; background: #3a0012; }
      100% { box-shadow: inset 0 4px 14px rgba(0,0,0,0.7); background: var(--hole-color); }
    }

    .hole.miss-flash {
      animation: missFlash 0.35s ease-out forwards;
    }
    @keyframes missFlash {
      0%   { background: #22110a; }
      100% { background: var(--hole-color); }
    }

    /* ---- Mole ---- */
    .mole {
      position: absolute;
      bottom: 0; left: 0; right: 0; top: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(2rem, 8vw, 3rem);
      transform: translateY(110%);
      pointer-events: none;
      will-change: transform;
    }
    .mole.up {
      transform: translateY(0);
      transition: transform 0.14s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .mole.squish {
      animation: moleSquish 0.28s ease-in forwards;
    }
    @keyframes moleSquish {
      0%   { transform: translateY(0)    scaleX(1)   scaleY(1); }
      35%  { transform: translateY(6%)   scaleX(1.3) scaleY(0.55); }
      100% { transform: translateY(110%) scaleX(1)   scaleY(1); }
    }
    .mole.miss-drop {
      animation: moleDrop 0.22s ease-in forwards;
    }
    @keyframes moleDrop {
      0%   { transform: translateY(0); }
      100% { transform: translateY(110%); }
    }

    /* ---- Game Over Screen ---- */
    #gameOverScreen {
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      text-align: center; max-width: 380px; width: 100%;
    }
    #gameOverScreen[hidden] { display: none; }
    .gameover-title { font-size: clamp(2rem, 7vw, 2.8rem); font-weight: 800; }
    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 32px; width: 100%;
    }
    .score-row {
      display: flex; justify-content: space-between;
      align-items: center; padding: 8px 0;
    }
    .score-row + .score-row { border-top: 1px solid var(--border); }
    .score-label { color: var(--text-dim); font-size: .9rem; font-weight: 600; }
    .score-val { font-size: 1.5rem; font-weight: 800; }
    .score-val.highlight { color: var(--accent); }
    .new-record {
      color: #ffd700; font-size: .8rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; margin-top: 4px;
    }
    .gameover-btns { display: flex; gap: 12px; }
  </style>
</head>
<body>

<nav class="game-nav">
  <a href="../index.html" class="back-link">← GameKingdom</a>
  <h1>Whack-a-Mole</h1>
</nav>

<div id="gameContainer">

  <!-- ===== Start Screen ===== -->
  <div id="startScreen">
    <div class="start-hero">🔨</div>
    <div class="start-title">Whack-a-Mole</div>
    <div class="start-instructions">
      <span>🐭 Mole</span> = +10 pts &nbsp;|&nbsp;
      <span>💣 Bomb</span> = −20 pts &nbsp;|&nbsp;
      Miss = −5 pts<br><br>
      Tap moles before they vanish — they get faster as time passes!
    </div>
    <div class="difficulty-group">
      <button class="diff-btn" data-diff="easy">Easy</button>
      <button class="diff-btn selected" data-diff="normal">Normal</button>
      <button class="diff-btn" data-diff="hard">Hard</button>
    </div>
    <button class="btn" id="startBtn">Start Game</button>
  </div>

  <!-- ===== Game Screen ===== -->
  <div id="gameScreen" hidden>
    <div class="hud">
      <div class="hud-panel">
        <div class="hud-label">Score</div>
        <div class="hud-value" id="scoreDisplay">0</div>
      </div>
      <div class="hud-panel">
        <div class="hud-label">Time</div>
        <div class="hud-value" id="timerDisplay">60</div>
      </div>
    </div>

    <div class="grid" id="grid">
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
    </div>
  </div>

  <!-- ===== Game Over Screen ===== -->
  <div id="gameOverScreen" hidden>
    <div class="gameover-title">⏱ Time's Up!</div>
    <div class="score-card">
      <div class="score-row">
        <span class="score-label">Final Score</span>
        <span class="score-val highlight" id="finalScore">0</span>
      </div>
      <div class="score-row">
        <span class="score-label">Best Score</span>
        <span class="score-val" id="bestScore">0</span>
      </div>
      <div id="newRecord" class="new-record" hidden>★ New Record!</div>
    </div>
    <div class="gameover-btns">
      <button class="btn btn-ghost" id="menuBtn">Menu</button>
      <button class="btn" id="playAgainBtn">Play Again</button>
    </div>
  </div>

</div><!-- #gameContainer -->

<script>
'use strict';

// ---- Difficulty presets: spawn interval + visible duration, with progression floor ----
const DIFFS = {
  easy:   { spawn: 1300, visible: 2300, minSpawn: 800,  minVisible: 1300 },
  normal: { spawn: 950,  visible: 1700, minSpawn: 520,  minVisible: 850  },
  hard:   { spawn: 650,  visible: 1150, minSpawn: 360,  minVisible: 580  },
};

// ---- State ----
let currentDiff    = 'normal';
let score          = 0;
let timeLeft       = 60;
let gameRunning    = false;
let spawnMs        = 950;
let visibleMs      = 1700;
let spawnTimer     = null;
let countdownTimer = null;
let progressTimer  = null;
const holeActive   = new Array(9).fill(false);
const holeBomb     = new Array(9).fill(false);
const moleTimers   = new Array(9).fill(null);

// ---- DOM ----
const startScreen    = document.getElementById('startScreen');
const gameScreen     = document.getElementById('gameScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const scoreDisplay   = document.getElementById('scoreDisplay');
const timerDisplay   = document.getElementById('timerDisplay');
const finalScoreEl   = document.getElementById('finalScore');
const bestScoreEl    = document.getElementById('bestScore');
const newRecordEl    = document.getElementById('newRecord');
const grid           = document.getElementById('grid');
const holes          = Array.from(grid.querySelectorAll('.hole'));
const moles          = Array.from(grid.querySelectorAll('.mole'));

// ---- Difficulty buttons ----
const diffBtns = document.querySelectorAll('.diff-btn');
diffBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    diffBtns.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentDiff = btn.dataset.diff;
  });
});

// ---- Navigation buttons ----
document.getElementById('startBtn').addEventListener('click', () => startGame(currentDiff));
document.getElementById('playAgainBtn').addEventListener('click', () => startGame(currentDiff));
document.getElementById('menuBtn').addEventListener('click', () => {
  gameOverScreen.hidden = true;
  startScreen.hidden    = false;
});

// ---- Hole click / tap handlers ----
holes.forEach((hole, idx) => {
  function handleWhack(e) {
    e.preventDefault();
    if (!gameRunning || !holeActive[idx]) return;

    const bomb = holeBomb[idx];
    clearTimeout(moleTimers[idx]);
    moleTimers[idx] = null;
    holeActive[idx] = false;

    if (bomb) {
      updateScore(-20);
      moles[idx].classList.remove('up', 'squish', 'miss-drop');
      hole.classList.remove('bomb-flash');
      void hole.offsetWidth; // reflow to restart animation
      hole.classList.add('bomb-flash');
      SFX.play('wrong');
    } else {
      updateScore(10);
      moles[idx].classList.remove('miss-drop');
      moles[idx].classList.add('squish');
      setTimeout(() => moles[idx].classList.remove('up', 'squish'), 300);
      SFX.play('hit');
    }
  }
  hole.addEventListener('click', handleWhack);
  hole.addEventListener('touchstart', handleWhack, { passive: false });
});

// ---- Game start ----
function startGame(diff) {
  currentDiff = diff;
  const preset = DIFFS[diff];
  spawnMs   = preset.spawn;
  visibleMs = preset.visible;

  score    = 0;
  timeLeft = 60;
  holeActive.fill(false);
  holeBomb.fill(false);
  moleTimers.fill(null);

  moles.forEach(m => { m.className = 'mole'; m.textContent = ''; });
  holes.forEach(h => { h.className = 'hole'; });

  scoreDisplay.textContent = '0';
  timerDisplay.textContent = '60';
  timerDisplay.classList.remove('urgent');

  startScreen.hidden    = true;
  gameOverScreen.hidden = true;
  gameScreen.hidden     = false;

  gameRunning = true;
  scheduleNextSpawn();

  countdownTimer = setInterval(() => {
    timeLeft--;
    timerDisplay.textContent = timeLeft;
    if (timeLeft <= 10) timerDisplay.classList.add('urgent');
    if (timeLeft <= 0)  endGame();
  }, 1000);

  // Ramp up difficulty every 10 seconds
  progressTimer = setInterval(() => {
    const p = DIFFS[currentDiff];
    spawnMs   = Math.max(p.minSpawn,   spawnMs   - 80);
    visibleMs = Math.max(p.minVisible, visibleMs - 120);
  }, 10000);
}

// ---- Mole spawning ----
function scheduleNextSpawn() {
  if (!gameRunning) return;
  const jitter = (Math.random() - 0.5) * 200;
  spawnTimer = setTimeout(() => {
    if (gameRunning) {
      activateMole();
      scheduleNextSpawn();
    }
  }, Math.max(200, spawnMs + jitter));
}

function activateMole() {
  const inactive = holeActive.reduce((acc, a, i) => (a ? acc : [...acc, i]), []);
  if (inactive.length === 0) return;

  const idx  = inactive[Math.floor(Math.random() * inactive.length)];
  const bomb = Math.random() < 0.13;

  holeActive[idx] = true;
  holeBomb[idx]   = bomb;

  const mole = moles[idx];
  mole.className   = 'mole';
  mole.textContent = bomb ? '💣' : '🐭';
  void mole.offsetWidth; // reflow
  mole.classList.add('up');

  moleTimers[idx] = setTimeout(() => {
    if (!holeActive[idx]) return; // already whacked
    holeActive[idx] = false;

    if (!bomb) {
      updateScore(-5);
      SFX.play('move');
      holes[idx].classList.remove('miss-flash');
      void holes[idx].offsetWidth;
      holes[idx].classList.add('miss-flash');
    }

    mole.classList.remove('up');
    mole.classList.add('miss-drop');
    setTimeout(() => mole.classList.remove('miss-drop'), 250);
  }, visibleMs);
}

// ---- Score update ----
function updateScore(delta) {
  score = Math.max(-999, score + delta);
  scoreDisplay.textContent = score;
}

// ---- End game ----
function endGame() {
  if (!gameRunning) return;
  gameRunning = false;
  clearTimeout(spawnTimer);
  clearInterval(countdownTimer);
  clearInterval(progressTimer);

  holes.forEach((h, i) => {
    clearTimeout(moleTimers[i]);
    moleTimers[i] = null;
    if (holeActive[i]) {
      moles[i].classList.remove('up');
      holeActive[i] = false;
    }
  });

  const key      = `wam-hs-${currentDiff}`;
  const prev     = parseInt(localStorage.getItem(key) || '-Infinity', 10);
  const isRecord = score > prev;
  if (isRecord) localStorage.setItem(key, score);
  const best = isRecord ? score : Math.max(prev, score);

  finalScoreEl.textContent = score;
  bestScoreEl.textContent  = isNaN(best) || best === -Infinity ? score : best;
  newRecordEl.hidden        = !isRecord;

  timerDisplay.classList.remove('urgent');
  gameScreen.hidden    = true;
  gameOverScreen.hidden = false;

  SFX.play(score > 0 ? 'win' : 'lose');

  window.dispatchEvent(new CustomEvent('gameOver', {
    detail: { game: 'whack-a-mole', score }
  }));
}
</script>

</body>
</html>
