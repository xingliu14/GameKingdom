<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Runner — GameKingdom</title>
  <meta name="description" content="Endless side-scrolling runner — jump, duck, and dodge your way to a high score!">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2e2e3e;
      --accent: #7c5cfc; --text: #e8e8f0; --text-dim: #888899;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    a { color: var(--accent); }

    .game-nav {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .back-link { font-size: .9rem; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .game-nav h1 { font-size: 1.1rem; font-weight: 700; }

    #gameContainer {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px; gap: 12px;
    }

    #canvasWrapper { position: relative; width: 100%; max-width: 600px; }

    canvas {
      display: block; width: 100%;
      border-radius: 10px; border: 2px solid var(--border);
      image-rendering: pixelated; image-rendering: crisp-edges;
      touch-action: none;
    }

    #controls-hint {
      font-size: .82rem; color: var(--text-dim); text-align: center;
    }
    #controls-hint kbd {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px;
      font-family: monospace; color: var(--text);
    }
  </style>
</head>
<body>

  <nav class="game-nav">
    <a href="../index.html" class="back-link">← GameKingdom</a>
    <h1>Pixel Runner</h1>
  </nav>

  <div id="gameContainer">
    <div id="canvasWrapper">
      <canvas id="gameCanvas" width="600" height="300"></canvas>
    </div>
    <p id="controls-hint">
      <kbd>Space</kbd> / <kbd>↑</kbd> Jump &nbsp;|&nbsp;
      <kbd>↓</kbd> Duck &nbsp;|&nbsp; Double-jump allowed &nbsp;|&nbsp; Tap: top = jump, bottom = duck
    </p>
  </div>

<script>
(function () {
  'use strict';

  // ── Canvas ────────────────────────────────────────────────────────────────
  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');
  const W = 600, H = 300;
  const GROUND_Y = 186;   // y at which feet rest (≈62% down)

  // ── Pixel unit (1 logical px = PX screen px → chunky retro look) ─────────
  const PX = 3;

  // ── Colour palette ────────────────────────────────────────────────────────
  const C = {
    // sky
    sky0: '#0d0d28', sky1: '#1a1040', sky2: '#251850',
    // character
    chBody: '#e83c3c', chHead: '#f5a623', chEye: '#fff', chPupil: '#222',
    chLeg:  '#3c6ee8', chShoe: '#111',
    chInvA: '#ffee00', chInvB: '#ff8800',
    // ground
    gnTop:  '#4a7c3f', gnMid:  '#3a5c2f',
    gnDrt:  '#7a5230', gnDrk:  '#5a3d20',
    // pit
    pitBg:  '#060610', pitEdge:'#7a5230',
    // cactus
    ctGrn:  '#2ecc71', ctLit:  '#55e895', ctDrk:  '#1a7a44',
    // bird
    bdBody: '#e0b848', bdWing: '#c8a030', bdBeak: '#e0a030',
    // rock
    rkFill: '#7a6a8a', rkLit:  '#aa9ab8', rkDrk:  '#4a3a5a',
    // ball
    blFill: '#ff4444', blLit:  '#ff9999', blDrk:  '#aa2222',
    // coins / stars
    cnYel:  '#ffd700', cnLit:  '#fff8a0', cnEdge: '#b8960a',
    stFill: '#ffe044', stLit:  '#fff0a0',
    // UI
    uiTxt:  '#e8e8f0', uiDim:  '#888899', uiAcc:  '#7c5cfc',
    over:   'rgba(10,10,20,0.82)',
  };

  // ── Helpers ───────────────────────────────────────────────────────────────
  function pxRect(x, y, w, h, col) {
    ctx.fillStyle = col;
    ctx.fillRect(Math.round(x), Math.round(y), w * PX, h * PX);
  }
  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // ── Game state ────────────────────────────────────────────────────────────
  let state    = 'start';   // 'start' | 'running' | 'gameover'
  let score    = 0;
  let coins    = 0;
  let highScore = parseInt(localStorage.getItem('pxrun_hs') || '0', 10);
  let speed    = 3;         // px per tick
  let distance = 0;
  let level    = 1;
  let lastTs   = 0;
  let rafId    = null;

  let nextObsTick     = 100;
  let nextCoinTick    = 60;
  let obsInterval     = 120;

  // ── Character constants ───────────────────────────────────────────────────
  const CHAR_X  = 72;
  const STAND_H = 30;   // real px
  const STAND_W = 18;
  const SLIDE_H = 15;
  const SLIDE_W = 24;
  const GRAVITY = 0.55;
  const JUMP_V  = -10.5;

  // ── Character object ──────────────────────────────────────────────────────
  const ch = {
    x: CHAR_X,
    y: GROUND_Y,       // bottom of feet
    vy: 0,
    onGnd: true,
    jumps: 0,          // 0..2
    sliding: false,
    slideTick: 0,
    frame: 0,
    ftick: 0,
    inv: false,
    invTick: 0,
    flash: false,
    get w()  { return this.sliding ? SLIDE_W : STAND_W; },
    get h()  { return this.sliding ? SLIDE_H : STAND_H; },
    hb()     {                             // hitbox (inset margin)
      const m = 4;
      return { x: this.x + m, y: this.y - this.h + m,
               w: this.w - m * 2, h: this.h - m * 2 };
    }
  };

  function charJump() {
    if (ch.jumps >= 2) return;
    ch.vy      = JUMP_V * (ch.jumps === 1 ? 0.78 : 1);
    ch.onGnd   = false;
    ch.jumps++;
    ch.sliding = false;
    ch.slideTick = 0;
  }

  function charSlide() {
    if (!ch.onGnd || ch.sliding) return;
    ch.sliding   = true;
    ch.slideTick = 42;   // ~0.7 s @ 60fps
  }

  function updateChar() {
    if (!ch.onGnd) {
      ch.vy += GRAVITY;
      ch.y  += ch.vy;
      if (ch.y >= GROUND_Y) {
        ch.y = GROUND_Y; ch.vy = 0;
        ch.onGnd = true; ch.jumps = 0;
      }
    }
    if (ch.sliding) { if (--ch.slideTick <= 0) ch.sliding = false; }
    if (ch.inv) {
      ch.invTick--;
      ch.ftick++;
      if (ch.ftick % 4 === 0) ch.flash = !ch.flash;
      if (ch.invTick <= 0) { ch.inv = false; ch.flash = false; }
    } else if (ch.onGnd && !ch.sliding) {
      if (++ch.ftick >= 8) { ch.ftick = 0; ch.frame = (ch.frame + 1) % 4; }
    }
  }

  // ── Draw character ────────────────────────────────────────────────────────
  function drawChar() {
    const bc = ch.inv ? (ch.flash ? C.chInvA : C.chInvB) : C.chBody;
    const hc = ch.inv ? (ch.flash ? C.chInvB : C.chInvA) : C.chHead;
    if (ch.sliding) drawSlide(ch.x, ch.y, bc, hc);
    else            drawStand(ch.x, ch.y, ch.frame, bc, hc);
  }

  // Standing sprite: 6 wide × 10 tall (logical px)
  function drawStand(cx, cy, f, bc, hc) {
    // head (rows 0-1)
    pxRect(cx + PX, cy - 10 * PX, 4, 2, hc);
    ctx.fillStyle = C.chEye;
    ctx.fillRect(cx + 4 * PX, cy - 10 * PX + PX, PX, PX);
    ctx.fillStyle = C.chPupil;
    ctx.fillRect(cx + 4 * PX + 1, cy - 10 * PX + PX + 1, 2, 2);

    // body (rows 2-5)
    pxRect(cx + PX, cy - 8 * PX, 4, 4, bc);

    // arms swing opposite to legs
    const aSwing = [0, -PX, 0, PX][f];
    pxRect(cx,         cy - 8 * PX + aSwing, 1, 3, bc);  // left
    pxRect(cx + 5 * PX, cy - 8 * PX - aSwing, 1, 3, bc); // right

    // legs (rows 6-9) – 4 frame cycle
    const legs = [
      [0, 0, 0, 0], [-PX, PX, PX, -PX],
      [0, 0, 0, 0], [PX, -PX, -PX, PX],
    ][f];
    // left leg
    pxRect(cx + PX,          cy - 4 * PX + legs[1], 2, 3, C.chLeg);
    pxRect(cx + PX + legs[0], cy - PX,              2, 1, C.chShoe);
    // right leg
    pxRect(cx + 3 * PX,          cy - 4 * PX + legs[3], 2, 3, C.chLeg);
    pxRect(cx + 3 * PX + legs[2], cy - PX,              2, 1, C.chShoe);
  }

  // Slide sprite: 8 wide × 5 tall
  function drawSlide(cx, cy, bc, hc) {
    pxRect(cx,         cy - 5 * PX, 6, 3, bc);
    pxRect(cx + 6 * PX, cy - 5 * PX, 2, 2, hc);
    ctx.fillStyle = C.chEye;
    ctx.fillRect(cx + 7 * PX + 1, cy - 5 * PX + 2, PX - 1, PX - 1);
    pxRect(cx,         cy - 2 * PX, 3, 2, C.chLeg);
    pxRect(cx + 3 * PX, cy - 2 * PX, 3, 2, C.chLeg);
  }

  // ── Obstacles ─────────────────────────────────────────────────────────────
  let obstacles = [];
  let pits      = [];

  function spawnObstacle() {
    let pool = ['cactus1', 'cactus1', 'cactus2', 'cactus3'];
    if (level >= 2) pool.push('bird', 'bird', 'rock');
    if (level >= 3) pool.push('pit', 'ball');
    if (level >= 4) pool.push('ball', 'bird', 'pit');

    const type = pool[Math.floor(Math.random() * pool.length)];

    if (type === 'pit') {
      pits.push({ x: W + 16, w: 48 + Math.random() * 28 });
      return;
    }

    const ob = { type, x: W + 16 };

    if (type === 'cactus1') { ob.w = 3;  ob.h = 8; ob.y = GROUND_Y; }
    else if (type === 'cactus2') { ob.w = 7;  ob.h = 8; ob.y = GROUND_Y; }
    else if (type === 'cactus3') { ob.w = 10; ob.h = 9; ob.y = GROUND_Y; }
    else if (type === 'rock')    { ob.w = 6;  ob.h = 5; ob.y = GROUND_Y; }
    else if (type === 'bird') {
      // Fly high enough that player must duck
      const fy = GROUND_Y - STAND_H - 4 - Math.floor(Math.random() * 22);
      ob.w = 7; ob.h = 4;
      ob.y = fy + ob.h * PX;
      ob.wf = 0; ob.wtick = 0;
    } else if (type === 'ball') {
      ob.w = 4; ob.h = 4;
      ob.baseY = GROUND_Y - ob.h * PX / 2;
      ob.phase = 0;
      ob.y = ob.baseY;
      ob.amp   = 30 + Math.random() * 22;
      ob.bspd  = 0.08 + Math.random() * 0.04;
    }

    obstacles.push(ob);
  }

  function updateObstacles() {
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const ob = obstacles[i];
      ob.x -= speed;
      if (ob.type === 'ball') {
        ob.phase += ob.bspd;
        ob.y = ob.baseY - Math.abs(Math.sin(ob.phase)) * ob.amp;
      }
      if (ob.type === 'bird') {
        if (++ob.wtick >= 8) { ob.wtick = 0; ob.wf ^= 1; }
      }
      if (ob.x + ob.w * PX < 0) obstacles.splice(i, 1);
    }
    for (let i = pits.length - 1; i >= 0; i--) {
      pits[i].x -= speed;
      if (pits[i].x + pits[i].w < 0) pits.splice(i, 1);
    }
  }

  function drawObstacles() {
    for (const ob of obstacles) {
      if      (ob.type === 'cactus1') drawCactus(ob.x, ob.y, 1);
      else if (ob.type === 'cactus2') drawCactus(ob.x, ob.y, 2);
      else if (ob.type === 'cactus3') drawCactus(ob.x, ob.y, 3);
      else if (ob.type === 'bird')    drawBird(ob.x, ob.y, ob.wf);
      else if (ob.type === 'rock')    drawRock(ob.x, ob.y);
      else if (ob.type === 'ball')    drawBall(ob.x, ob.y);
    }
  }

  // Each cactus spike = 3 logical-px wide, 8 logical-px tall
  function drawCactus(x, y, spikes) {
    for (let i = 0; i < spikes; i++) {
      const sx = x + i * 3 * PX;
      pxRect(sx + PX, y - 8 * PX, 1, 7, C.ctGrn);
      pxRect(sx,      y - 8 * PX, 1, 1, C.ctLit);      // tip
      // arm on left side (skip last spike if multi)
      if (spikes === 1 || i < spikes - 1) {
        pxRect(sx,      y - 6 * PX, 2, 1, C.ctGrn);
        pxRect(sx,      y - 7 * PX, 1, 2, C.ctGrn);
      }
      pxRect(sx + 2 * PX, y - 7 * PX, 1, 5, C.ctDrk);  // shadow
    }
  }

  function drawBird(x, y, wf) {
    pxRect(x + 2 * PX, y - 4 * PX, 3, 2, C.bdBody);
    pxRect(x + 5 * PX, y - 3 * PX, 1, 1, C.bdBeak);
    ctx.fillStyle = '#333';
    ctx.fillRect(x + 4 * PX + 1, y - 4 * PX + 1, 2, 2);
    if (wf === 0) {
      pxRect(x,          y - 4 * PX, 2, 2, C.bdWing);
      pxRect(x + 5 * PX,  y - 4 * PX, 2, 2, C.bdWing);
    } else {
      pxRect(x,          y - 2 * PX, 2, 2, C.bdWing);
      pxRect(x + 5 * PX,  y - 2 * PX, 2, 2, C.bdWing);
    }
  }

  function drawRock(x, y) {
    pxRect(x + PX,    y - 5 * PX, 4, 1, C.rkLit);
    pxRect(x,         y - 4 * PX, 6, 3, C.rkFill);
    pxRect(x,         y - 4 * PX, 1, 3, C.rkLit);
    pxRect(x + 5 * PX, y - 4 * PX, 1, 3, C.rkDrk);
    pxRect(x,         y - PX,     6, 1, C.rkDrk);
  }

  function drawBall(x, y) {
    pxRect(x + PX,    y - 4 * PX, 2, 1, C.blLit);
    pxRect(x,         y - 3 * PX, 4, 2, C.blFill);
    pxRect(x + 3 * PX, y - 3 * PX, 1, 2, C.blDrk);
    pxRect(x,         y - PX,     4, 1, C.blDrk);
  }

  // ── Collision detection ───────────────────────────────────────────────────
  function checkHit() {
    if (ch.inv) return false;
    const hb = ch.hb();

    for (const ob of obstacles) {
      const oy = ob.y - ob.h * PX;
      if (rectsOverlap(hb.x, hb.y, hb.w, hb.h, ob.x, oy, ob.w * PX, ob.h * PX)) return true;
    }
    if (ch.onGnd) {
      for (const pt of pits) {
        if (ch.x + ch.w > pt.x && ch.x < pt.x + pt.w) return true;
      }
    }
    return false;
  }

  // ── Collectibles ──────────────────────────────────────────────────────────
  let collectibles = [];

  function spawnCoin() {
    const isStar = Math.random() < 0.06;
    const sky    = Math.random() < 0.5;
    const baseY  = sky
      ? GROUND_Y - PX * 8 - Math.floor(Math.random() * PX * 7)
      : GROUND_Y - PX * 4;
    collectibles.push({
      type: isStar ? 'star' : 'coin',
      x: W + 16, y: baseY,
      w: isStar ? 4 : 3, h: isStar ? 4 : 3,
      tick: Math.floor(Math.random() * 60),
      on: true,
    });
  }

  function updateCollectibles() {
    for (let i = collectibles.length - 1; i >= 0; i--) {
      const c = collectibles[i];
      c.x -= speed;
      c.tick++;
      if (!c.on || c.x + c.w * PX < 0) collectibles.splice(i, 1);
    }
  }

  function checkCollectibles() {
    const hb = ch.hb();
    for (const c of collectibles) {
      if (!c.on) continue;
      const bob = Math.sin(c.tick * 0.1) * PX;
      const cy  = c.y + bob - c.h * PX;
      if (rectsOverlap(hb.x, hb.y, hb.w, hb.h, c.x, cy, c.w * PX, c.h * PX)) {
        c.on = false;
        if (c.type === 'coin') { coins++; score += 10; }
        else { ch.inv = true; ch.invTick = 120; ch.ftick = 0; }
      }
    }
  }

  function drawCollectibles() {
    for (const c of collectibles) {
      if (!c.on) continue;
      const bob = Math.sin(c.tick * 0.1) * PX;
      const dy  = c.y + bob;
      if (c.type === 'coin') {
        pxRect(c.x + PX,    dy - 3 * PX, 1, 1, C.cnLit);
        pxRect(c.x,         dy - 2 * PX, 3, 2, C.cnYel);
        pxRect(c.x,         dy - 2 * PX, 1, 2, C.cnLit);
        pxRect(c.x + 2 * PX, dy - 2 * PX, 1, 2, C.cnEdge);
        pxRect(c.x,         dy,          3, 1, C.cnEdge);
      } else {
        const sc = (c.tick % 20 < 10) ? C.stFill : C.stLit;
        pxRect(c.x + PX,   dy - 4 * PX, 2, 1, sc);
        pxRect(c.x,        dy - 3 * PX, 4, 2, sc);
        pxRect(c.x + PX,   dy - PX,     2, 1, sc);
        pxRect(c.x + PX,   dy - 2 * PX, 2, 1, sc);
        ctx.fillStyle = '#fff';
        ctx.fillRect(c.x + PX + 1, dy - 3 * PX + PX, 2, 2);
      }
    }
  }

  // ── Background ────────────────────────────────────────────────────────────
  // Parallax clouds (3 layers)
  const clouds = [];
  (function initClouds() {
    for (let layer = 0; layer < 3; layer++) {
      for (let i = 0; i < 4 + layer; i++) {
        clouds.push({
          layer,
          x: Math.random() * W,
          y: 14 + layer * 22 + Math.random() * 18,
          w: 20 + Math.random() * 28,
          spd: 0.28 + layer * 0.26,
        });
      }
    }
  }());

  function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    g.addColorStop(0,   C.sky0);
    g.addColorStop(0.6, C.sky1);
    g.addColorStop(1,   C.sky2);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // Pixel stars (deterministic)
    ctx.fillStyle = 'rgba(255,255,255,0.48)';
    for (let i = 0; i < 40; i++) {
      const sx = (i * 47 + 13) % W;
      const sy = (i * 31 + 7)  % (GROUND_Y - 22);
      ctx.fillRect(sx, sy, i % 3 ? 1 : 2, i % 5 ? 1 : 2);
    }
  }

  function updateClouds(mult) {
    for (const cl of clouds) {
      cl.x -= cl.spd * mult;
      if (cl.x + (cl.w + 20) * PX < 0) cl.x = W + 10 + Math.random() * 80;
    }
  }

  function drawClouds() {
    for (const cl of clouds) {
      const a = 0.11 + cl.layer * 0.09;
      ctx.fillStyle = `rgba(160,160,220,${a})`;
      const bw = Math.max(5, Math.floor(cl.w / 2));
      const bh = 4 + cl.layer * 2;
      ctx.fillRect(cl.x,             cl.y + bh, bw * 2, bh * 2);
      ctx.fillRect(cl.x + bw * 0.4,  cl.y,      bw * 1.5, bh * 1.5);
    }
  }

  let gndScroll = 0;
  function drawGround() {
    gndScroll = (gndScroll + speed) % (8 * PX);
    const TILE = 8 * PX;
    const gTop = GROUND_Y;

    // Grass
    ctx.fillStyle = C.gnTop;  ctx.fillRect(0, gTop, W, PX * 2);
    ctx.fillStyle = C.gnMid;  ctx.fillRect(0, gTop + PX * 2, W, PX * 2);

    // Dirt tiles
    for (let tx = -gndScroll; tx < W; tx += TILE) {
      for (let ty = gTop + PX * 4; ty < H; ty += TILE) {
        ctx.fillStyle =
          ((Math.floor(tx / TILE) + Math.floor(ty / TILE)) % 2 === 0) ? C.gnDrt : C.gnDrk;
        ctx.fillRect(tx, ty, TILE, TILE);
      }
    }

    // Pit gaps (erase ground, show void)
    for (const pt of pits) {
      ctx.fillStyle = C.pitBg;
      ctx.fillRect(pt.x, gTop, pt.w, H - gTop);
      // Cap edges
      ctx.fillStyle = C.pitEdge;
      ctx.fillRect(pt.x - PX,          gTop, PX * 2, PX * 2);
      ctx.fillRect(pt.x + pt.w - PX,   gTop, PX * 2, PX * 2);
    }
  }

  // ── HUD ───────────────────────────────────────────────────────────────────
  function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, 28);

    ctx.font = 'bold 13px monospace';
    ctx.textBaseline = 'top';

    ctx.fillStyle = C.uiTxt;
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE: ${score}`, 8, 7);

    ctx.textAlign = 'right';
    ctx.fillText(`BEST: ${highScore}`, W - 8, 7);

    ctx.textAlign = 'center';
    ctx.fillStyle = C.uiAcc;
    ctx.fillText(`LV ${level}`, W / 2, 7);

    ctx.fillStyle = C.cnYel;
    ctx.textAlign = 'left';
    ctx.fillText(`\u2605 ${coins}`, W / 2 + 42, 7);

    // Invincibility bar
    if (ch.inv) {
      const p = ch.invTick / 120;
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(8, 24, (W - 16) * p, 3);
      ctx.strokeStyle = '#b8960a';
      ctx.lineWidth = 1;
      ctx.strokeRect(8, 24, W - 16, 3);
    }

    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }

  // ── Overlay screens ────────────────────────────────────────────────────────
  function drawStartScreen() {
    ctx.fillStyle = C.over;
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.fillStyle = C.uiAcc;
    ctx.font = 'bold 30px monospace';
    ctx.fillText('PIXEL RUNNER', W / 2, H / 2 - 52);

    ctx.fillStyle = C.uiTxt;
    ctx.font = '14px monospace';
    ctx.fillText('Press  SPACE  or  \u2191  to start', W / 2, H / 2 - 10);
    ctx.fillText('SPACE / \u2191 = Jump    \u2193 = Duck', W / 2, H / 2 + 14);
    ctx.fillText('Double-jump allowed!', W / 2, H / 2 + 38);

    if (highScore > 0) {
      ctx.fillStyle = C.uiDim;
      ctx.font = '12px monospace';
      ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 66);
    }
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }

  // Restart button rect (set when drawn)
  const BTN = { x: 0, y: 0, w: 140, h: 32 };

  function drawGameOver() {
    ctx.fillStyle = C.over;
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 28px monospace';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 56);

    ctx.fillStyle = C.uiTxt;
    ctx.font = '15px monospace';
    ctx.fillText(`Score: ${score}`, W / 2, H / 2 - 24);
    ctx.fillText(`Coins: ${coins}`, W / 2, H / 2 - 2);

    if (score > 0 && score >= highScore) {
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('\u2605 NEW HIGH SCORE! \u2605', W / 2, H / 2 + 24);
    } else {
      ctx.fillStyle = C.uiDim;
      ctx.font = '13px monospace';
      ctx.fillText(`Best: ${highScore}`, W / 2, H / 2 + 24);
    }

    BTN.x = W / 2 - 70; BTN.y = H / 2 + 46;
    ctx.fillStyle = C.uiAcc;
    ctx.beginPath();
    ctx.roundRect(BTN.x, BTN.y, BTN.w, BTN.h, 6);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('PLAY AGAIN', W / 2, BTN.y + BTN.h / 2);

    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }

  // ── Input ─────────────────────────────────────────────────────────────────
  const keys = {};
  window.addEventListener('keydown', e => {
    if (keys[e.code]) return;
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();

    if (state === 'start') {
      if (e.code === 'Space' || e.code === 'ArrowUp') startGame();
    } else if (state === 'gameover') {
      if (e.code === 'Space' || e.code === 'Enter') startGame();
    } else if (state === 'running') {
      if (e.code === 'Space' || e.code === 'ArrowUp') charJump();
      if (e.code === 'ArrowDown') charSlide();
    }
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const r = canvas.getBoundingClientRect();
    if (state === 'running') {
      if ((t.clientY - r.top) / r.height > 0.65) charSlide();
      else charJump();
    } else startGame();
  }, { passive: false });

  canvas.addEventListener('click', e => {
    if (state === 'start') { startGame(); return; }
    if (state === 'gameover') {
      const r  = canvas.getBoundingClientRect();
      const sx = W / r.width, sy = H / r.height;
      const mx = (e.clientX - r.left) * sx;
      const my = (e.clientY - r.top)  * sy;
      if (mx >= BTN.x && mx <= BTN.x + BTN.w && my >= BTN.y && my <= BTN.y + BTN.h)
        startGame();
    }
  });

  // ── Game flow ─────────────────────────────────────────────────────────────
  function startGame() {
    score = 0; coins = 0; distance = 0;
    speed = 3; level = 1;
    nextObsTick = 100; nextCoinTick = 60; obsInterval = 120;
    obstacles = []; pits = []; collectibles = [];
    gndScroll = 0;

    Object.assign(ch, {
      x: CHAR_X, y: GROUND_Y, vy: 0,
      onGnd: true, jumps: 0,
      sliding: false, slideTick: 0,
      frame: 0, ftick: 0,
      inv: false, invTick: 0, flash: false,
    });

    state  = 'running';
    lastTs = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function endGame() {
    state = 'gameover';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('pxrun_hs', highScore);
    }
    window.dispatchEvent(new CustomEvent('gameOver', {
      detail: { game: 'pixel-runner', score }
    }));
  }

  // ── Fixed-timestep game loop ───────────────────────────────────────────────
  const STEP_MS = 1000 / 60;
  let   accum   = 0;

  function loop(ts) {
    const dt = Math.min(ts - lastTs, 100);
    lastTs  = ts;
    accum  += dt;

    while (accum >= STEP_MS) { tick(); accum -= STEP_MS; }
    render();

    if (state !== 'gameover') rafId = requestAnimationFrame(loop);
    else render();   // final frame with overlay
  }

  function tick() {
    if (state !== 'running') return;

    distance += speed;
    score = Math.floor(distance / 10) + coins * 10;

    // Scaling every 500 pts
    const newLv = 1 + Math.floor(score / 500);
    if (newLv > level && speed < 9) {
      level = newLv;
      speed = Math.min(3 + (level - 1) * 0.65, 9);
      obsInterval = Math.max(50, 120 - (level - 1) * 12);
    }

    if (--nextObsTick <= 0) {
      spawnObstacle();
      nextObsTick = obsInterval + Math.floor(Math.random() * 44);
    }
    if (--nextCoinTick <= 0) {
      spawnCoin();
      nextCoinTick = 40 + Math.floor(Math.random() * 60);
    }

    updateChar();
    updateObstacles();
    updateCollectibles();
    checkCollectibles();

    if (checkHit()) endGame();
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawSky();

    if (state === 'running' || state === 'gameover') {
      updateClouds(1);
      drawClouds();
      drawGround();
      drawCollectibles();
      drawObstacles();
      drawChar();
      drawHUD();
      if (state === 'gameover') drawGameOver();
    } else {
      // Idle start screen
      updateClouds(0.35);
      drawClouds();
      drawGround();
      // Slow idle animation
      if (++ch.ftick >= 20) { ch.ftick = 0; ch.frame = (ch.frame + 1) % 4; }
      drawChar();
      drawStartScreen();
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  state = 'start';
  (function idleLoop() {
    if (state !== 'start') return;
    render();
    requestAnimationFrame(idleLoop);
  }());

}());
</script>

</body>
