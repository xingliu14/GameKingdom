<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Four — GameKingdom</title>
  <meta name="description" content="Drop discs to get four in a row before your opponent. Play against a friend or the AI!" />
  <script src="../sounds.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2e2e3e;
      --accent: #7c5cfc; --text: #e8e8f0; --text-dim: #888899;
      --p1: #ef4444;
      --p2: #fbbf24;
      --cell-bg: #0c0c14;
      --cell-hover: #16162a;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    a { color: var(--accent); }

    /* nav */
    .game-nav {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .back-link { font-size: .9rem; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .game-nav h1 { font-size: 1.1rem; font-weight: 700; }

    /* container */
    #gameContainer {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px 40px;
      gap: 16px;
    }

    /* mode bar */
    .mode-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .mode-btn {
      padding: 7px 20px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-dim); font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: background .15s, color .15s, border-color .15s;
    }
    .mode-btn:hover { color: var(--text); background: #222232; }
    .mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* scoreboard */
    .scoreboard { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .score-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 20px; text-align: center; min-width: 72px;
    }
    .score-label {
      font-size: .72rem; font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; color: var(--text-dim);
    }
    .score-label.p1 { color: var(--p1); }
    .score-label.p2 { color: var(--p2); }
    .score-value { font-size: 1.6rem; font-weight: 800; line-height: 1.2; }

    /* status */
    .status-msg {
      font-size: 1.05rem; font-weight: 700; min-height: 1.5rem; text-align: center;
    }
    .status-msg.win-p1 { color: var(--p1); }
    .status-msg.win-p2 { color: var(--p2); }
    .status-msg.draw   { color: var(--text-dim); }

    /* board wrapper */
    .board-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px;
      user-select: none; -webkit-user-select: none;
    }

    /* column hover buttons */
    .col-targets {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 5px; margin-bottom: 5px;
    }
    .col-btn {
      aspect-ratio: 1; border-radius: 50%;
      border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; opacity: 0; transition: opacity .12s;
    }
    .col-btn:hover { opacity: 1; }
    .col-btn.p1-next { color: var(--p1); }
    .col-btn.p2-next { color: var(--p2); }
    .col-btn:disabled { cursor: default; opacity: 0 !important; }

    /* grid */
    #board {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .cell {
      width: clamp(36px, 10vw, 52px);
      height: clamp(36px, 10vw, 52px);
      border-radius: 50%;
      background: var(--cell-bg);
      border: 1px solid var(--border);
      transition: background .15s, box-shadow .15s;
    }
    .cell.p1 { background: var(--p1); border-color: var(--p1); }
    .cell.p2 { background: var(--p2); border-color: var(--p2); }
    .cell.winner.p1 { box-shadow: 0 0 12px 4px rgba(239,68,68,.55); }
    .cell.winner.p2 { box-shadow: 0 0 12px 4px rgba(251,191,36,.55); }

    /* drop animation */
    @keyframes dropIn {
      from { transform: translateY(-300%); opacity: .5; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    .cell.drop { animation: dropIn .18s ease-out; }

    /* buttons */
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .action-btn {
      padding: 8px 22px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: .88rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .action-btn:hover { background: #222232; }
    .action-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .action-btn.primary:hover { background: #6a4de0; }

    @media (max-width: 400px) {
      .score-card { min-width: 60px; padding: 6px 12px; }
      .col-btn { font-size: .9rem; }
    }
  </style>
</head>
<body>

  <nav class="game-nav">
    <a href="../index.html" class="back-link">← GameKingdom</a>
    <h1>Connect Four</h1>
  </nav>

  <div id="gameContainer">

    <div class="mode-bar">
      <button class="mode-btn active" data-mode="ai">vs AI</button>
      <button class="mode-btn" data-mode="friend">vs Friend</button>
    </div>

    <div class="scoreboard">
      <div class="score-card">
        <div class="score-label p1" id="p1Label">You</div>
        <div class="score-value" id="scoreP1">0</div>
      </div>
      <div class="score-card">
        <div class="score-label">Draws</div>
        <div class="score-value" id="scoreD">0</div>
      </div>
      <div class="score-card">
        <div class="score-label p2" id="p2Label">AI</div>
        <div class="score-value" id="scoreP2">0</div>
      </div>
    </div>

    <div class="status-msg" id="statusMsg">Your turn — 🔴</div>

    <div class="board-wrap">
      <div class="col-targets" id="colTargets"></div>
      <div id="board"></div>
    </div>

    <div class="btn-row">
      <button class="action-btn primary" id="newRoundBtn">New Round</button>
      <button class="action-btn" id="resetBtn">Reset Scores</button>
    </div>

  </div>

  <script>
    const ROWS = 6, COLS = 7;

    // ── State ─────────────────────────────────────────────────────────────────
    let mode       = 'ai';
    let board      = [];      // board[row][col] = 0|1|2
    let current    = 1;       // 1 = red (human/P1), 2 = yellow (AI/P2)
    let gameActive = true;
    let aiThinking = false;
    let scores     = { p1: 0, p2: 0, d: 0 };

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const boardEl      = document.getElementById('board');
    const colTargetsEl = document.getElementById('colTargets');
    const statusEl     = document.getElementById('statusMsg');
    const scoreP1El    = document.getElementById('scoreP1');
    const scoreP2El    = document.getElementById('scoreP2');
    const scoreDEl     = document.getElementById('scoreD');
    const p1LabelEl    = document.getElementById('p1Label');
    const p2LabelEl    = document.getElementById('p2Label');

    // ── Board helpers ─────────────────────────────────────────────────────────
    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function dropDisc(b, col, player) {
      for (let r = ROWS - 1; r >= 0; r--) {
        if (b[r][col] === 0) { b[r][col] = player; return r; }
      }
      return -1;
    }

    function getValidCols(b) {
      return Array.from({ length: COLS }, (_, c) => c).filter(c => b[0][c] === 0);
    }

    function isFull(b) { return getValidCols(b).length === 0; }

    function checkWin(b, row, col, player) {
      const dirs = [[0,1],[1,0],[1,1],[1,-1]];
      for (const [dr, dc] of dirs) {
        let cells = [[row, col]];
        for (let s = 1; s <= 3; s++) {
          const r = row + dr*s, c = col + dc*s;
          if (r < 0 || r >= ROWS || c < 0 || c >= COLS || b[r][c] !== player) break;
          cells.push([r, c]);
        }
        for (let s = 1; s <= 3; s++) {
          const r = row - dr*s, c = col - dc*s;
          if (r < 0 || r >= ROWS || c < 0 || c >= COLS || b[r][c] !== player) break;
          cells.push([r, c]);
        }
        if (cells.length >= 4) return cells.slice(0, 4);
      }
      return null;
    }

    // ── AI — minimax with alpha-beta ──────────────────────────────────────────
    function scoreWindow(win, player) {
      const opp = player === 1 ? 2 : 1;
      const p = win.filter(v => v === player).length;
      const e = win.filter(v => v === 0).length;
      const o = win.filter(v => v === opp).length;
      if (p === 4) return 100;
      if (p === 3 && e === 1) return 5;
      if (p === 2 && e === 2) return 2;
      if (o === 3 && e === 1) return -4;
      return 0;
    }

    function scorePosition(b, player) {
      let s = 0;
      // Center preference
      for (let r = 0; r < ROWS; r++) if (b[r][3] === player) s += 3;
      // Horizontal
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c <= COLS-4; c++)
          s += scoreWindow([b[r][c],b[r][c+1],b[r][c+2],b[r][c+3]], player);
      // Vertical
      for (let c = 0; c < COLS; c++)
        for (let r = 0; r <= ROWS-4; r++)
          s += scoreWindow([b[r][c],b[r+1][c],b[r+2][c],b[r+3][c]], player);
      // Diagonal /
      for (let r = 3; r < ROWS; r++)
        for (let c = 0; c <= COLS-4; c++)
          s += scoreWindow([b[r][c],b[r-1][c+1],b[r-2][c+2],b[r-3][c+3]], player);
      // Diagonal \
      for (let r = 0; r <= ROWS-4; r++)
        for (let c = 0; c <= COLS-4; c++)
          s += scoreWindow([b[r][c],b[r+1][c+1],b[r+2][c+2],b[r+3][c+3]], player);
      return s;
    }

    function isTerminal(b) {
      if (isFull(b)) return true;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (b[r][c] !== 0 && checkWin(b, r, c, b[r][c])) return true;
      return false;
    }

    function terminalScore(b) {
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (b[r][c] === 2 && checkWin(b, r, c, 2)) return  10000000;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (b[r][c] === 1 && checkWin(b, r, c, 1)) return -10000000;
      return 0;
    }

    function minimax(b, depth, alpha, beta, maximizing) {
      if (depth === 0 || isTerminal(b)) {
        if (isTerminal(b)) return terminalScore(b);
        return scorePosition(b, 2);
      }
      const cols = getValidCols(b);
      if (maximizing) {
        let val = -Infinity;
        for (const col of cols) {
          const copy = b.map(r => [...r]);
          dropDisc(copy, col, 2);
          val = Math.max(val, minimax(copy, depth-1, alpha, beta, false));
          alpha = Math.max(alpha, val);
          if (alpha >= beta) break;
        }
        return val;
      } else {
        let val = Infinity;
        for (const col of cols) {
          const copy = b.map(r => [...r]);
          dropDisc(copy, col, 1);
          val = Math.min(val, minimax(copy, depth-1, alpha, beta, true));
          beta = Math.min(beta, val);
          if (alpha >= beta) break;
        }
        return val;
      }
    }

    function bestAiMove(b) {
      const cols = getValidCols(b);
      let best = -Infinity, bestCol = cols[Math.floor(Math.random() * cols.length)];
      for (const col of cols) {
        const copy = b.map(r => [...r]);
        dropDisc(copy, col, 2);
        const val = minimax(copy, 5, -Infinity, Infinity, false);
        if (val > best) { best = val; bestCol = col; }
      }
      return bestCol;
    }

    // ── Rendering ─────────────────────────────────────────────────────────────
    function buildGrid() {
      // Column target buttons
      colTargetsEl.innerHTML = '';
      for (let c = 0; c < COLS; c++) {
        const btn = document.createElement('button');
        btn.className = 'col-btn ' + (current === 1 ? 'p1-next' : 'p2-next');
        btn.textContent = current === 1 ? '🔴' : '🟡';
        btn.dataset.col = c;
        colTargetsEl.appendChild(btn);
      }
      // Board cells
      boardEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const div = document.createElement('div');
          div.className = 'cell' + (board[r][c] === 1 ? ' p1' : board[r][c] === 2 ? ' p2' : '');
          div.dataset.r = r; div.dataset.c = c;
          boardEl.appendChild(div);
        }
      }
      updateColBtns();
    }

    function updateCell(row, col, player, animate) {
      const el = boardEl.children[row * COLS + col];
      el.className = 'cell ' + (player === 1 ? 'p1' : 'p2') + (animate ? ' drop' : '');
      if (animate) el.addEventListener('animationend', () => el.classList.remove('drop'), { once: true });
    }

    function highlightWinners(cells) {
      cells.forEach(([r, c]) => {
        boardEl.children[r * COLS + c].classList.add('winner');
      });
    }

    function updateColBtns() {
      const btns = colTargetsEl.children;
      const cls = current === 1 ? 'p1-next' : 'p2-next';
      const disc = current === 1 ? '🔴' : '🟡';
      for (let c = 0; c < COLS; c++) {
        btns[c].className = `col-btn ${cls}`;
        btns[c].textContent = disc;
        btns[c].disabled = !gameActive || board[0][c] !== 0 || aiThinking;
      }
    }

    function updateScores() {
      scoreP1El.textContent = scores.p1;
      scoreP2El.textContent = scores.p2;
      scoreDEl.textContent  = scores.d;
    }

    function updateLabels() {
      if (mode === 'ai') {
        p1LabelEl.textContent = 'You';
        p2LabelEl.textContent = 'AI';
      } else {
        p1LabelEl.textContent = 'P1';
        p2LabelEl.textContent = 'P2';
      }
    }

    function setStatus(text, cls = '') {
      statusEl.textContent = text;
      statusEl.className = 'status-msg' + (cls ? ' ' + cls : '');
    }

    function turnLabel() {
      if (mode === 'ai') {
        return current === 1 ? 'Your turn — 🔴' : 'AI is thinking… 🟡';
      }
      return current === 1 ? 'Player 1 — 🔴' : 'Player 2 — 🟡';
    }

    // ── Game logic ────────────────────────────────────────────────────────────
    function placeMove(col) {
      if (!gameActive || board[0][col] !== 0 || aiThinking) return;
      const row = dropDisc(board, col, current);
      SFX.play('click');
      updateCell(row, col, current, true);

      const winCells = checkWin(board, row, col, current);
      if (winCells) { endRound(current, winCells); return; }
      if (isFull(board)) { endRound(0, null); return; }

      current = current === 1 ? 2 : 1;
      setStatus(turnLabel());
      updateColBtns();

      if (mode === 'ai' && current === 2) {
        aiThinking = true;
        updateColBtns();
        setTimeout(doAiMove, 320);
      }
    }

    function doAiMove() {
      const col = bestAiMove(board);
      aiThinking = false;
      const row = dropDisc(board, col, 2);
      SFX.play('click');
      updateCell(row, col, 2, true);

      const winCells = checkWin(board, row, col, 2);
      if (winCells) { endRound(2, winCells); return; }
      if (isFull(board)) { endRound(0, null); return; }

      current = 1;
      setStatus(turnLabel());
      updateColBtns();
    }

    function endRound(winner, winCells) {
      gameActive = false;
      updateColBtns();
      if (winner === 1) {
        SFX.play('win');
        scores.p1++;
        updateScores();
        highlightWinners(winCells);
        setStatus(mode === 'ai' ? 'You win! 🎉' : 'Player 1 wins! 🎉', 'win-p1');
      } else if (winner === 2) {
        SFX.play('win');
        scores.p2++;
        updateScores();
        highlightWinners(winCells);
        setStatus(mode === 'ai' ? 'AI wins! 🤖' : 'Player 2 wins! 🎉', 'win-p2');
      } else {
        scores.d++;
        updateScores();
        setStatus("It's a draw!", 'draw');
      }
      window.dispatchEvent(new CustomEvent('gameOver', {
        detail: { game: 'connect-four', winner, mode }
      }));
    }

    function newRound() {
      board      = createBoard();
      current    = 1;
      gameActive = true;
      aiThinking = false;
      buildGrid();
      setStatus(turnLabel());
    }

    // ── Events ────────────────────────────────────────────────────────────────
    colTargetsEl.addEventListener('click', e => {
      const btn = e.target.closest('.col-btn');
      if (!btn) return;
      placeMove(parseInt(btn.dataset.col, 10));
    });

    boardEl.addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell) return;
      placeMove(parseInt(cell.dataset.c, 10));
    });

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        scores = { p1: 0, p2: 0, d: 0 };
        updateScores();
        updateLabels();
        newRound();
      });
    });

    document.getElementById('newRoundBtn').addEventListener('click', newRound);
    document.getElementById('resetBtn').addEventListener('click', () => {
      scores = { p1: 0, p2: 0, d: 0 };
      updateScores();
      newRound();
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    updateLabels();
    newRound();
  </script>

</body>
</html>
