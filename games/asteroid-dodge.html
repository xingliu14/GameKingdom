<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asteroid Dodge — GameKingdom</title>
  <meta name="description" content="Steer your ship and dodge falling asteroids as long as you can!" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2e2e3e;
      --accent: #7c5cfc; --text: #e8e8f0; --text-dim: #888899;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    a { color: var(--accent); }

    .game-nav {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-link { font-size: .9rem; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .game-nav h1 { font-size: 1.1rem; font-weight: 700; }

    #gameContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 12px;
    }

    #canvasWrapper {
      width: 100%;
      max-width: 480px;
    }

    canvas {
      display: block;
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      touch-action: none;
      cursor: default;
    }

    #scoreBar {
      font-size: .9rem;
      color: var(--text-dim);
      text-align: center;
    }
    #scoreBar span { color: var(--accent); font-weight: 700; }
  </style>
</head>
<body>

  <nav class="game-nav">
    <a href="../index.html" class="back-link">← GameKingdom</a>
    <h1>Asteroid Dodge</h1>
  </nav>

  <div id="gameContainer">
    <div id="canvasWrapper">
      <canvas id="gameCanvas"></canvas>
    </div>
    <div id="scoreBar">Time survived: <span id="scoreTxt">0</span>s</div>
  </div>

  <script>
    // ── Canvas setup ──────────────────────────────────────────────────────────
    const canvas   = document.getElementById('gameCanvas');
    const ctx      = canvas.getContext('2d');
    const scoreTxt = document.getElementById('scoreTxt');

    const W = 480, H = 640;
    canvas.width  = W;
    canvas.height = H;

    // ── Palette ───────────────────────────────────────────────────────────────
    const COL = {
      bg:       '#0a0a10',
      accent:   '#7c5cfc',
      text:     '#e8e8f0',
      dim:      '#888899',
      ship:     '#7c5cfc',
      shipLine: '#a88ffe',
      danger:   '#ef5350',
      sparks:   ['#ff6b6b','#ffd93d','#ff922b','#cc5de8','#74c0fc','#ffffff'],
    };

    // ── Static star field ─────────────────────────────────────────────────────
    const STARS = Array.from({ length: 90 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.3,
      a: Math.random() * 0.55 + 0.15,
    }));

    // ── Game state ────────────────────────────────────────────────────────────
    let phase   = 'start'; // 'start' | 'playing' | 'dead'
    let ship, asteroids, particles;
    let score, spawnClock, spawnInterval;
    let prevTs  = null;

    // ── Input ─────────────────────────────────────────────────────────────────
    const keys = {};
    let touchLeft  = false;
    let touchRight = false;

    // ── Helpers ───────────────────────────────────────────────────────────────
    function rnd(lo, hi) { return lo + Math.random() * (hi - lo); }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y,     x + w, y + r,     r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x,     y + h, x,     y + h - r, r);
      ctx.lineTo(x,     y + r);
      ctx.arcTo(x,     y,     x + r, y,         r);
      ctx.closePath();
    }

    // ── Factory functions ─────────────────────────────────────────────────────
    function mkShip() {
      return { x: W / 2, y: H - 80, w: 28, h: 36, speed: 290 };
    }

    function mkAsteroid() {
      const r     = rnd(14, 30);
      const sides = 6 + Math.floor(rnd(0, 5));
      const pts   = [];
      for (let i = 0; i < sides; i++) {
        const a = (i / sides) * Math.PI * 2;
        const d = r * rnd(0.68, 1.0);
        pts.push({ x: Math.cos(a) * d, y: Math.sin(a) * d });
      }
      const speed = 90 + score * 9 + rnd(0, 55);
      return {
        x: rnd(r, W - r),
        y: -r - 10,
        r, pts,
        angle: rnd(0, Math.PI * 2),
        spin:  rnd(-1.8, 1.8),
        vy:    speed,
        vx:    rnd(-55, 55),
      };
    }

    function mkBurst(x, y) {
      return Array.from({ length: 30 }, () => {
        const a = rnd(0, Math.PI * 2);
        const s = rnd(70, 240);
        return {
          x, y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s - rnd(0, 40),
          r:  rnd(2, 5),
          life: 1,
          decay: rnd(0.55, 1.1),
          color: COL.sparks[Math.floor(rnd(0, COL.sparks.length))],
        };
      });
    }

    // ── Init / restart ────────────────────────────────────────────────────────
    function startGame() {
      ship          = mkShip();
      asteroids     = [];
      particles     = [];
      score         = 0;
      spawnClock    = 0;
      spawnInterval = 1.15;
      prevTs        = null;
      phase         = 'playing';
      scoreTxt.textContent = '0';
    }

    // ── Update ────────────────────────────────────────────────────────────────
    function update(dt) {
      if (phase !== 'playing') return;

      score += dt;
      scoreTxt.textContent = Math.floor(score);

      // Ship movement
      let dir = 0;
      if (keys['ArrowLeft']  || keys['a'] || keys['A'] || touchLeft)  dir -= 1;
      if (keys['ArrowRight'] || keys['d'] || keys['D'] || touchRight) dir += 1;
      ship.x = Math.max(ship.w, Math.min(W - ship.w, ship.x + dir * ship.speed * dt));

      // Spawn asteroids
      spawnClock += dt;
      if (spawnClock >= spawnInterval) {
        spawnClock    -= spawnInterval;
        spawnInterval  = Math.max(0.28, 1.15 - score * 0.016);
        asteroids.push(mkAsteroid());
      }

      // Move asteroids + collision
      for (let i = asteroids.length - 1; i >= 0; i--) {
        const a = asteroids[i];
        a.x += a.vx * dt;
        a.y += a.vy * dt;
        a.angle += a.spin * dt;
        if (a.y > H + a.r + 20) { asteroids.splice(i, 1); continue; }

        // Circle vs circle (ship hitbox radius ~16)
        const dx = a.x - ship.x, dy = a.y - ship.y;
        if (dx * dx + dy * dy < (a.r + 16) * (a.r + 16)) {
          particles.push(...mkBurst(ship.x, ship.y));
          phase = 'dead';
          window.dispatchEvent(new CustomEvent('gameOver', {
            detail: { game: 'asteroid-dodge', score: Math.floor(score) },
          }));
          break;
        }
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x    += p.vx * dt;
        p.y    += p.vy * dt;
        p.vy   += 260 * dt;
        p.life -= p.decay * dt;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    // ── Draw helpers ──────────────────────────────────────────────────────────
    function drawStars() {
      STARS.forEach(s => {
        ctx.globalAlpha = s.a;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function drawShipAt(x, y) {
      ctx.save();
      ctx.translate(x, y);
      const sw = 28, sh = 36;

      // Thruster glow
      const grd = ctx.createRadialGradient(0, sh * 0.28, 0, 0, sh * 0.28, 18);
      grd.addColorStop(0, 'rgba(124,92,252,0.75)');
      grd.addColorStop(1, 'rgba(124,92,252,0)');
      ctx.beginPath();
      ctx.ellipse(0, sh * 0.28, 11, 7, 0, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      // Hull
      ctx.beginPath();
      ctx.moveTo(0,       -sh / 2);
      ctx.lineTo(-sw / 2,  sh / 2);
      ctx.lineTo(-sw / 6,  sh / 4);
      ctx.lineTo(0,        sh / 3);
      ctx.lineTo( sw / 6,  sh / 4);
      ctx.lineTo( sw / 2,  sh / 2);
      ctx.closePath();
      ctx.fillStyle   = COL.ship;
      ctx.fill();
      ctx.strokeStyle = COL.shipLine;
      ctx.lineWidth   = 1.5;
      ctx.stroke();

      // Cockpit
      ctx.beginPath();
      ctx.ellipse(0, -sh / 6, 5.5, 8, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(190,170,255,0.38)';
      ctx.fill();

      ctx.restore();
    }

    function drawAsteroid(a) {
      ctx.save();
      ctx.translate(a.x, a.y);
      ctx.rotate(a.angle);
      ctx.beginPath();
      ctx.moveTo(a.pts[0].x, a.pts[0].y);
      for (let i = 1; i < a.pts.length; i++) ctx.lineTo(a.pts[i].x, a.pts[i].y);
      ctx.closePath();
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, a.r);
      g.addColorStop(0, '#b0bfcc');
      g.addColorStop(1, '#3d5060');
      ctx.fillStyle   = g;
      ctx.fill();
      ctx.strokeStyle = '#8899aa';
      ctx.lineWidth   = 1.5;
      ctx.stroke();
      ctx.restore();
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.5, p.r * p.life), 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function drawHUD() {
      ctx.fillStyle = 'rgba(10,10,16,0.55)';
      roundRect(10, 10, 128, 34, 6);
      ctx.fill();
      ctx.fillStyle = COL.text;
      ctx.font      = '700 14px Segoe UI,system-ui,sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(`Time: ${Math.floor(score)}s`, 24, 33);
    }

    // ── Screens ───────────────────────────────────────────────────────────────
    let _restartBtn = null;

    function drawStartScreen() {
      ctx.fillStyle = COL.bg;
      ctx.fillRect(0, 0, W, H);
      drawStars();

      ctx.textAlign = 'center';

      // Title
      ctx.font      = '700 34px Segoe UI,system-ui,sans-serif';
      ctx.fillStyle = COL.accent;
      ctx.fillText('ASTEROID DODGE', W / 2, H / 2 - 110);

      // Ship preview
      drawShipAt(W / 2, H / 2 - 38);

      // Instructions
      ctx.font      = '15px Segoe UI,system-ui,sans-serif';
      ctx.fillStyle = COL.text;
      ctx.fillText('Dodge the falling asteroids!', W / 2, H / 2 + 42);

      ctx.font      = '13px Segoe UI,system-ui,sans-serif';
      ctx.fillStyle = COL.dim;
      ctx.fillText('Arrow keys or A / D to move', W / 2, H / 2 + 70);
      ctx.fillText('Touch left or right side of screen', W / 2, H / 2 + 90);

      // Pulsing CTA
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 420);
      ctx.globalAlpha = 0.55 + pulse * 0.45;
      ctx.font        = '700 14px Segoe UI,system-ui,sans-serif';
      ctx.fillStyle   = COL.accent;
      ctx.fillText('PRESS SPACE  or  TAP TO START', W / 2, H / 2 + 138);
      ctx.globalAlpha = 1;
    }

    function drawGameOverScreen() {
      // Dim overlay
      ctx.fillStyle = 'rgba(0,0,0,0.58)';
      ctx.fillRect(0, 0, W, H);

      // Panel
      const pw = 310, ph = 218;
      const px = (W - pw) / 2, py = (H - ph) / 2;
      ctx.fillStyle = '#1a1a24';
      roundRect(px, py, pw, ph, 14);
      ctx.fill();
      ctx.strokeStyle = '#2e2e3e';
      ctx.lineWidth   = 2;
      roundRect(px, py, pw, ph, 14);
      ctx.stroke();

      ctx.textAlign = 'center';

      ctx.font      = '700 28px Segoe UI,system-ui,sans-serif';
      ctx.fillStyle = COL.danger;
      ctx.fillText('GAME OVER', W / 2, py + 56);

      ctx.font      = '14px Segoe UI,system-ui,sans-serif';
      ctx.fillStyle = COL.dim;
      ctx.fillText('You survived', W / 2, py + 96);

      ctx.font      = '700 30px Segoe UI,system-ui,sans-serif';
      ctx.fillStyle = COL.accent;
      const secs = Math.floor(score);
      ctx.fillText(`${secs} second${secs === 1 ? '' : 's'}`, W / 2, py + 136);

      // Restart button
      const bw = 138, bh = 38;
      const bx = W / 2 - bw / 2, by = py + ph - 54;
      ctx.fillStyle = COL.accent;
      roundRect(bx, by, bw, bh, 8);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font      = '700 14px Segoe UI,system-ui,sans-serif';
      ctx.fillText('PLAY AGAIN', W / 2, by + 25);

      _restartBtn = { x: bx, y: by, w: bw, h: bh };
    }

    // ── Main render ───────────────────────────────────────────────────────────
    function render() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = COL.bg;
      ctx.fillRect(0, 0, W, H);

      if (phase === 'start') { drawStartScreen(); return; }

      drawStars();
      asteroids.forEach(drawAsteroid);
      if (phase === 'playing') drawShipAt(ship.x, ship.y);
      drawParticles();
      if (phase === 'playing') drawHUD();
      if (phase === 'dead')    drawGameOverScreen();
    }

    // ── Game loop ─────────────────────────────────────────────────────────────
    function loop(ts) {
      if (prevTs === null) prevTs = ts;
      const dt = Math.min((ts - prevTs) / 1000, 0.05);
      prevTs = ts;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    // ── Keyboard ──────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if ((e.key === ' ' || e.key === 'Enter') && phase !== 'playing') {
        e.preventDefault();
        startGame();
      }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    // ── Touch controls ────────────────────────────────────────────────────────
    function touchCanvasX(clientX) {
      const rect = canvas.getBoundingClientRect();
      return (clientX - rect.left) / rect.width * W;
    }

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (phase !== 'playing') { startGame(); return; }
      touchLeft = touchRight = false;
      for (const t of e.touches) {
        if (touchCanvasX(t.clientX) < W / 2) touchLeft  = true;
        else                                  touchRight = true;
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      touchLeft = touchRight = false;
      for (const t of e.touches) {
        if (touchCanvasX(t.clientX) < W / 2) touchLeft  = true;
        else                                  touchRight = true;
      }
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      touchLeft = touchRight = false;
      for (const t of e.touches) {
        if (touchCanvasX(t.clientX) < W / 2) touchLeft  = true;
        else                                  touchRight = true;
      }
    }, { passive: false });

    // ── Mouse click ───────────────────────────────────────────────────────────
    canvas.addEventListener('click', e => {
      const rect  = canvas.getBoundingClientRect();
      const cx = (e.clientX - rect.left) / rect.width  * W;
      const cy = (e.clientY - rect.top)  / rect.height * H;

      if (phase === 'start') { startGame(); return; }

      if (phase === 'dead' && _restartBtn) {
        const b = _restartBtn;
        if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
          startGame();
        }
      }
    });

    // ── Boot ──────────────────────────────────────────────────────────────────
    requestAnimationFrame(loop);
  </script>

</body>
</html>
