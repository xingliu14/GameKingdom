<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Shooter — GameKingdom</title>
  <meta name="description" content="Top-down space shooter with waves of enemies, power-ups, and epic boss battles!">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --accent: #7c5cfc;
      --text: #e8e8f0;
      --border: #2e2e3e;
      --text-dim: #888899;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--accent); }

    .game-nav {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-link { font-size: .9rem; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .game-nav h1 { font-size: 1.1rem; font-weight: 700; }

    #gameContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 12px;
    }

    #canvasWrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    #controls {
      font-size: .8rem;
      color: var(--text-dim);
      text-align: center;
      max-width: 480px;
    }
    #controls span { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>

  <nav class="game-nav">
    <a href="../index.html" class="back-link">← GameKingdom</a>
    <h1>Space Shooter</h1>
  </nav>

  <div id="gameContainer">
    <div id="canvasWrapper">
      <canvas id="gameCanvas" width="480" height="600"></canvas>
    </div>
    <div id="controls">
      <span>WASD / Arrows</span> Move &nbsp;|&nbsp;
      <span>Space</span> Hold to fire &nbsp;|&nbsp;
      <span>B</span> Bomb &nbsp;|&nbsp;
      <span>Enter</span> Start
    </div>
  </div>

<script>
(function() {
'use strict';

// ─── Canvas Setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 480, H = 600;

// ─── Constants ───────────────────────────────────────────────────────────────
const PLAYER_SPEED = 220;
const BULLET_SPEED = 520;
const ENEMY_BULLET_SPEED = 200;
const BOMB_BULLET_SPEED = 280;
const FIRE_RATE = 0.3;        // seconds between shots
const INVINCIBILITY_TIME = 2; // seconds
const MAX_LIVES = 3;
const POWERUP_DURATION_SHOOT = 15;
const POWERUP_DURATION_SPEED = 10;
const CANVAS_W = W;
const CANVAS_H = H;

// ─── State ───────────────────────────────────────────────────────────────────
let state = 'menu'; // menu | playing | waveClear | gameOver
let score = 0;
let highScore = 0;
let wave = 0;
let waveClearTimer = 0;
let noDamageWave = true;
let frameTime = 0;
let lastTime = 0;

// ─── Stars (parallax) ────────────────────────────────────────────────────────
const STAR_COUNT = 120;
let stars = [];

function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    const layer = i < STAR_COUNT * 0.6 ? 0 : 1; // 60% slow, 40% fast
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: layer === 0 ? Math.random() * 1.5 + 0.5 : Math.random() * 2.5 + 1,
      speed: layer === 0 ? 30 + Math.random() * 20 : 70 + Math.random() * 40,
      brightness: layer === 0 ? 0.3 + Math.random() * 0.4 : 0.6 + Math.random() * 0.4,
      layer
    });
  }
}

function updateStars(dt) {
  for (const s of stars) {
    s.y += s.speed * dt;
    if (s.y > H) {
      s.y = -2;
      s.x = Math.random() * W;
    }
  }
}

function drawStars() {
  for (const s of stars) {
    ctx.globalAlpha = s.brightness;
    ctx.fillStyle = s.layer === 0 ? '#aab8d0' : '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── Player ──────────────────────────────────────────────────────────────────
let player = null;

function createPlayer() {
  return {
    x: W / 2,
    y: H - 80,
    w: 28,
    h: 34,
    hitR: 10,
    lives: MAX_LIVES,
    shield: false,
    invincible: 0,        // countdown timer
    blinkOn: true,
    fireCooldown: 0,
    autoFire: false,
    powerups: {
      doubleShot: 0,
      tripleShot: 0,
      speedBoost: 0,
      bomb: 0            // count of bombs
    },
    engineFlare: 0
  };
}

function drawPlayer(p) {
  if (!p.blinkOn) return;

  const x = p.x, y = p.y;

  // Engine glow
  const engineFlare = 0.6 + Math.sin(frameTime * 12) * 0.4;
  const grad = ctx.createRadialGradient(x, y + p.h / 2 + 8, 0, x, y + p.h / 2 + 8, 20);
  grad.addColorStop(0, `rgba(120, 80, 255, ${engineFlare * 0.8})`);
  grad.addColorStop(0.4, `rgba(80, 40, 200, ${engineFlare * 0.4})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y + p.h / 2 + 8, 20, 0, Math.PI * 2);
  ctx.fill();

  // Thruster flames
  ctx.save();
  const flameLen = 12 + Math.random() * 8;
  const flamePosL = x - 8;
  const flamePosR = x + 8;
  const flameBase = y + p.h / 2;
  // Left thruster
  let g = ctx.createLinearGradient(flamePosL, flameBase, flamePosL, flameBase + flameLen);
  g.addColorStop(0, '#7c5cfc');
  g.addColorStop(0.5, '#00d4ff');
  g.addColorStop(1, 'rgba(0,212,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(flamePosL - 4, flameBase);
  ctx.lineTo(flamePosL + 4, flameBase);
  ctx.lineTo(flamePosL, flameBase + flameLen);
  ctx.closePath();
  ctx.fill();
  // Right thruster
  g = ctx.createLinearGradient(flamePosR, flameBase, flamePosR, flameBase + flameLen);
  g.addColorStop(0, '#7c5cfc');
  g.addColorStop(0.5, '#00d4ff');
  g.addColorStop(1, 'rgba(0,212,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(flamePosR - 4, flameBase);
  ctx.lineTo(flamePosR + 4, flameBase);
  ctx.lineTo(flamePosR, flameBase + flameLen);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Ship body
  ctx.save();
  // Hull gradient
  const hullGrad = ctx.createLinearGradient(x - p.w / 2, y, x + p.w / 2, y);
  hullGrad.addColorStop(0, '#9070ff');
  hullGrad.addColorStop(0.5, '#ffffff');
  hullGrad.addColorStop(1, '#9070ff');
  ctx.fillStyle = hullGrad;
  ctx.shadowColor = '#7c5cfc';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(x, y - p.h / 2);                  // nose tip
  ctx.lineTo(x + p.w / 2, y + p.h / 2);        // right wing tip
  ctx.lineTo(x + p.w / 4, y + p.h / 4);        // right inner
  ctx.lineTo(x - p.w / 4, y + p.h / 4);        // left inner
  ctx.lineTo(x - p.w / 2, y + p.h / 2);        // left wing tip
  ctx.closePath();
  ctx.fill();
  // Cockpit
  ctx.fillStyle = '#00d4ff';
  ctx.shadowColor = '#00d4ff';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.ellipse(x, y, 5, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Shield ring
  if (p.shield) {
    ctx.save();
    ctx.strokeStyle = '#ffe040';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffe040';
    ctx.shadowBlur = 16 + Math.sin(frameTime * 6) * 6;
    ctx.globalAlpha = 0.8 + Math.sin(frameTime * 6) * 0.2;
    ctx.beginPath();
    ctx.arc(x, y, p.hitR + 14, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ─── Bullets ─────────────────────────────────────────────────────────────────
let playerBullets = [];
let enemyBullets = [];

function firePlayerBullet() {
  const p = player;
  const hasDbl = p.powerups.doubleShot > 0;
  const hasTri = p.powerups.tripleShot > 0;

  if (hasTri) {
    // 3-way spread
    const angles = [-0.28, 0, 0.28];
    for (const a of angles) {
      playerBullets.push({
        x: p.x, y: p.y - p.h / 2,
        vx: Math.sin(a) * BULLET_SPEED,
        vy: -Math.cos(a) * BULLET_SPEED,
        r: 4, color: '#b060ff', glow: '#7c5cfc'
      });
    }
  } else if (hasDbl) {
    playerBullets.push({ x: p.x - 9, y: p.y - 10, vx: 0, vy: -BULLET_SPEED, r: 4, color: '#00d4ff', glow: '#00aaff' });
    playerBullets.push({ x: p.x + 9, y: p.y - 10, vx: 0, vy: -BULLET_SPEED, r: 4, color: '#00d4ff', glow: '#00aaff' });
  } else {
    playerBullets.push({ x: p.x, y: p.y - p.h / 2, vx: 0, vy: -BULLET_SPEED, r: 4, color: '#00d4ff', glow: '#00aaff' });
  }
}

function drawBullet(b, isEnemy) {
  ctx.save();
  ctx.shadowColor = b.glow || (isEnemy ? '#ff4400' : '#00d4ff');
  ctx.shadowBlur = 10;
  ctx.fillStyle = b.color || (isEnemy ? '#ff6622' : '#00d4ff');
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fill();
  // Core
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r * 0.45, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ─── Enemies ─────────────────────────────────────────────────────────────────
let enemies = [];
let spawnQueue = [];
let spawnTimer = 0;
let enemiesDefeated = 0;
let totalEnemiesInWave = 0;

const ENEMY_TYPES = {
  scout: {
    w: 28, h: 24, hp: 1, maxHp: 1, score: 10,
    color: '#ff4466', glow: '#ff2244',
    fireRate: 3.5, fireCooldown: 2
  },
  cruiser: {
    w: 38, h: 32, hp: 3, maxHp: 3, score: 30,
    color: '#ff8822', glow: '#ff6600',
    fireRate: 2.5, fireCooldown: 1.5
  },
  bomber: {
    w: 44, h: 36, hp: 5, maxHp: 5, score: 50,
    color: '#aa44ff', glow: '#8822dd',
    fireRate: 1.8, fireCooldown: 1.0, bombCooldown: 0
  },
  fighter: {
    w: 30, h: 26, hp: 2, maxHp: 2, score: 20,
    color: '#22ddff', glow: '#00bbee',
    fireRate: 4.0, fireCooldown: 2.5
  },
  boss: {
    w: 80, h: 70, hp: 50, maxHp: 50, score: 500,
    color: '#ff2266', glow: '#cc0044',
    fireRate: 1.0, fireCooldown: 0.5,
    phase: 1, phaseChanged: false
  },
  finalBoss: {
    w: 90, h: 80, hp: 80, maxHp: 80, score: 1000,
    color: '#ff0088', glow: '#cc0055',
    fireRate: 0.7, fireCooldown: 0.3,
    phase: 1, phaseChanged: false
  }
};

function createEnemy(type, x, y, extra) {
  const tmpl = ENEMY_TYPES[type];
  const e = {
    type,
    x: x !== undefined ? x : W / 2,
    y: y !== undefined ? y : -40,
    vx: 0, vy: 60,
    w: tmpl.w, h: tmpl.h,
    hp: tmpl.hp, maxHp: tmpl.maxHp,
    score: tmpl.score,
    color: tmpl.color, glow: tmpl.glow,
    fireRate: tmpl.fireRate,
    fireCooldown: tmpl.fireCooldown + Math.random(),
    age: 0,
    phase: 1, phaseChanged: false,
    ...extra
  };
  if (type === 'bomber') e.bombCooldown = 1.5 + Math.random();
  return e;
}

function spawnWave(waveNum) {
  spawnQueue = [];
  enemiesDefeated = 0;

  const isBossWave = (waveNum === 5 || waveNum === 10);

  if (isBossWave) {
    const bossType = waveNum === 10 ? 'finalBoss' : 'boss';
    const tmpl = ENEMY_TYPES[bossType];
    spawnQueue.push({
      type: bossType,
      x: W / 2, y: -60,
      delay: 0.5,
      extra: { hp: tmpl.hp, maxHp: tmpl.maxHp, score: tmpl.score }
    });
    totalEnemiesInWave = 1;
    return;
  }

  // Build list of enemy specs per wave
  const configs = {
    1: [{ t: 'scout', n: 6 }],
    2: [{ t: 'scout', n: 8 }],
    3: [{ t: 'scout', n: 5 }, { t: 'cruiser', n: 3 }],
    4: [{ t: 'scout', n: 6 }, { t: 'cruiser', n: 4 }],
    6: [{ t: 'cruiser', n: 4 }, { t: 'bomber', n: 3 }],
    7: [{ t: 'cruiser', n: 5 }, { t: 'bomber', n: 4 }],
    8: [{ t: 'scout', n: 4 }, { t: 'cruiser', n: 3 }, { t: 'bomber', n: 2 }, { t: 'fighter', n: 4 }],
    9: [{ t: 'scout', n: 5 }, { t: 'cruiser', n: 4 }, { t: 'bomber', n: 3 }, { t: 'fighter', n: 6 }]
  };

  const cfg = configs[waveNum] || [{ t: 'scout', n: 5 }];
  let delay = 0.5;
  let total = 0;

  for (const group of cfg) {
    for (let i = 0; i < group.n; i++) {
      const margin = 40;
      const x = margin + Math.random() * (W - margin * 2);
      const spec = {
        type: group.t,
        x, y: -40 - Math.random() * 80,
        delay,
        extra: {}
      };
      if (group.t === 'fighter') {
        // Fighters come in pairs from sides
        const fromLeft = (i % 2 === 0);
        spec.x = fromLeft ? -30 : W + 30;
        spec.y = 80 + Math.random() * 200;
        spec.extra.vx = fromLeft ? 120 : -120;
        spec.extra.vy = 80;
        spec.extra.swoopDir = fromLeft ? 1 : -1;
        spec.extra.swoopAge = 0;
      }
      spawnQueue.push(spec);
      delay += 0.4 + Math.random() * 0.3;
      total++;
    }
  }

  totalEnemiesInWave = total;
  spawnTimer = 0;
}

function updateSpawnQueue(dt) {
  spawnTimer += dt;
  const ready = spawnQueue.filter(s => s.delay <= spawnTimer);
  for (const s of ready) {
    const e = createEnemy(s.type, s.x, s.y, s.extra);
    enemies.push(e);
  }
  spawnQueue = spawnQueue.filter(s => s.delay > spawnTimer);
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.age += dt;

    if (e.type === 'scout') {
      e.vy = 80 + wave * 5;
      e.x += e.vx * dt;
      e.y += e.vy * dt;
    } else if (e.type === 'cruiser') {
      e.vy = 55;
      e.vx = Math.sin(e.age * 1.8) * 120;
      e.x += e.vx * dt;
      e.y += e.vy * dt;
    } else if (e.type === 'bomber') {
      e.vy = 45;
      e.x += (e.vx || 0) * dt;
      e.y += e.vy * dt;
    } else if (e.type === 'fighter') {
      e.swoopAge = (e.swoopAge || 0) + dt;
      const swoopPhase = Math.min(e.swoopAge / 1.5, 1);
      // Initial swoop toward center then down
      if (swoopPhase < 1) {
        const targetX = W / 2 + (Math.random() - 0.5) * 200;
        e.vx += (targetX - e.x) * 2 * dt;
        e.vx = Math.max(-200, Math.min(200, e.vx));
      } else {
        e.vx *= 0.97;
        e.vy = Math.min(e.vy + 60 * dt, 160);
      }
      e.x += e.vx * dt;
      e.y += e.vy * dt;
    } else if (e.type === 'boss' || e.type === 'finalBoss') {
      // Boss movement
      const targetY = 100;
      if (e.y < targetY) {
        e.y += 60 * dt;
      } else {
        e.y = targetY + Math.sin(e.age * 0.5) * 20;
      }
      e.x = W / 2 + Math.sin(e.age * 0.7) * 120;

      // Phase 2 at 50% HP
      if (!e.phaseChanged && e.hp <= e.maxHp * 0.5) {
        e.phase = 2;
        e.phaseChanged = true;
        spawnParticles(e.x, e.y, '#ff4466', 20);
      }
    }

    // Clamp enemies from going too far off sides (except fighters)
    if (e.type !== 'fighter') {
      if (e.x < e.w / 2) e.x = e.w / 2;
      if (e.x > W - e.w / 2) e.x = W - e.w / 2;
    }

    // Off-screen removal
    if (e.y > H + 60 || e.x < -100 || e.x > W + 100) {
      enemies.splice(i, 1);
      enemiesDefeated++;
      continue;
    }

    // Enemy fire
    e.fireCooldown -= dt;
    if (e.fireCooldown <= 0) {
      e.fireCooldown = e.fireRate + Math.random() * 0.5;
      enemyFire(e);
    }

    // Bomber bombs
    if (e.type === 'bomber') {
      e.bombCooldown -= dt;
      if (e.bombCooldown <= 0) {
        e.bombCooldown = 2.5 + Math.random();
        // Drop 5 bombs in spread
        for (let b = 0; b < 5; b++) {
          const angle = (b / 4) * Math.PI * 0.6 - Math.PI * 0.3;
          enemyBullets.push({
            x: e.x, y: e.y + e.h / 2,
            vx: Math.sin(angle) * BOMB_BULLET_SPEED * 0.5,
            vy: Math.cos(angle) * BOMB_BULLET_SPEED + 30,
            r: 6, color: '#aa44ff', glow: '#8800cc',
            isBomb: true
          });
        }
      }
    }
  }
}

function enemyFire(e) {
  if (e.type === 'scout') {
    enemyBullets.push({
      x: e.x, y: e.y + e.h / 2,
      vx: 0, vy: ENEMY_BULLET_SPEED,
      r: 4, color: '#ff4422', glow: '#ff2200'
    });
  } else if (e.type === 'cruiser') {
    // 3-way spread
    const angles = [-0.3, 0, 0.3];
    for (const a of angles) {
      enemyBullets.push({
        x: e.x, y: e.y + e.h / 2,
        vx: Math.sin(a) * ENEMY_BULLET_SPEED,
        vy: Math.cos(a) * ENEMY_BULLET_SPEED,
        r: 5, color: '#ff8822', glow: '#ff6600'
      });
    }
  } else if (e.type === 'fighter') {
    // Aimed at player
    if (player) {
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      enemyBullets.push({
        x: e.x, y: e.y,
        vx: (dx / dist) * ENEMY_BULLET_SPEED,
        vy: (dy / dist) * ENEMY_BULLET_SPEED,
        r: 4, color: '#22ddff', glow: '#00aacc'
      });
    }
  } else if (e.type === 'boss' || e.type === 'finalBoss') {
    bossFire(e);
  }
}

let bossPatternTimer = 0;
let bossPatternIndex = 0;

function bossFire(e) {
  bossPatternTimer += 0.05;
  const isFinal = e.type === 'finalBoss';
  const speedMult = isFinal ? 1.4 : 1;
  const phase = e.phase;

  // Pattern 1: spiral
  const spiralAngle = bossPatternTimer * 3;
  for (let i = 0; i < (phase === 2 ? 5 : 3); i++) {
    const a = spiralAngle + (i / (phase === 2 ? 5 : 3)) * Math.PI * 2;
    enemyBullets.push({
      x: e.x, y: e.y,
      vx: Math.cos(a) * ENEMY_BULLET_SPEED * 0.6 * speedMult,
      vy: Math.sin(a) * ENEMY_BULLET_SPEED * 0.6 * speedMult,
      r: 5, color: '#ff2266', glow: '#cc0044'
    });
  }

  // Phase 2: also aimed burst
  if (phase === 2 && player && Math.random() < 0.4) {
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    for (let i = -1; i <= 1; i++) {
      const a = Math.atan2(dy, dx) + i * 0.2;
      enemyBullets.push({
        x: e.x, y: e.y,
        vx: Math.cos(a) * ENEMY_BULLET_SPEED * speedMult,
        vy: Math.sin(a) * ENEMY_BULLET_SPEED * speedMult,
        r: 5, color: '#ffaa00', glow: '#ff7700'
      });
    }
  }
}

function drawEnemy(e) {
  ctx.save();
  const x = e.x, y = e.y;

  if (e.type === 'scout') {
    // Small triangular ship pointing down
    ctx.shadowColor = e.glow;
    ctx.shadowBlur = 10;
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.moveTo(x, y + e.h / 2);
    ctx.lineTo(x - e.w / 2, y - e.h / 2);
    ctx.lineTo(x + e.w / 2, y - e.h / 2);
    ctx.closePath();
    ctx.fill();
    // Cockpit
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.ellipse(x, y - 2, 4, 6, 0, 0, Math.PI * 2);
    ctx.fill();

  } else if (e.type === 'cruiser') {
    // Wider, more angular
    ctx.shadowColor = e.glow;
    ctx.shadowBlur = 12;
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.moveTo(x, y + e.h / 2);
    ctx.lineTo(x - e.w / 2, y);
    ctx.lineTo(x - e.w / 3, y - e.h / 2);
    ctx.lineTo(x + e.w / 3, y - e.h / 2);
    ctx.lineTo(x + e.w / 2, y);
    ctx.closePath();
    ctx.fill();
    // Wing accents
    ctx.fillStyle = '#ffcc44';
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.arc(x - e.w / 3, y - 2, 4, 0, Math.PI * 2);
    ctx.arc(x + e.w / 3, y - 2, 4, 0, Math.PI * 2);
    ctx.fill();

  } else if (e.type === 'bomber') {
    // Heavy, rounded
    ctx.shadowColor = e.glow;
    ctx.shadowBlur = 14;
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.ellipse(x, y, e.w / 2, e.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Hull lines
    ctx.strokeStyle = '#cc88ff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(x - e.w / 2 + 6, y);
    ctx.lineTo(x + e.w / 2 - 6, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y - e.h / 2 + 6);
    ctx.lineTo(x, y + e.h / 2 - 6);
    ctx.stroke();
    // Bomb bays
    ctx.fillStyle = '#220033';
    ctx.globalAlpha = 0.8;
    for (let b = -2; b <= 2; b++) {
      ctx.beginPath();
      ctx.arc(x + b * 8, y + e.h / 2 - 8, 3, 0, Math.PI * 2);
      ctx.fill();
    }

  } else if (e.type === 'fighter') {
    // Sleek, swept back
    const dir = e.swoopDir || 1;
    ctx.shadowColor = e.glow;
    ctx.shadowBlur = 10;
    ctx.fillStyle = e.color;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(dir, 1);
    ctx.beginPath();
    ctx.moveTo(0, e.h / 2);
    ctx.lineTo(-e.w / 2, -e.h / 4);
    ctx.lineTo(-e.w / 4, -e.h / 2);
    ctx.lineTo(e.w / 4, -e.h / 2);
    ctx.lineTo(e.w / 2, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

  } else if (e.type === 'boss' || e.type === 'finalBoss') {
    drawBoss(e);
    ctx.restore();
    return;
  }

  // HP bar for non-boss enemies with > 1 HP
  if (e.maxHp > 1) {
    const barW = e.w + 6;
    const barH = 4;
    const bx = x - barW / 2;
    const by = y - e.h / 2 - 8;
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#333';
    ctx.fillRect(bx, by, barW, barH);
    ctx.fillStyle = e.hp > e.maxHp * 0.5 ? '#44ff66' : '#ff4422';
    ctx.fillRect(bx, by, barW * (e.hp / e.maxHp), barH);
  }

  ctx.restore();
}

function drawBoss(e) {
  const x = e.x, y = e.y;
  const pulsate = 0.8 + Math.sin(frameTime * 4) * 0.2;
  const isFinal = e.type === 'finalBoss';
  const baseColor = isFinal ? '#ff0088' : '#ff2266';
  const glowColor = isFinal ? '#cc0055' : '#cc0044';

  ctx.save();
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 24 * pulsate;

  // Main body
  const bodyGrad = ctx.createRadialGradient(x, y - 10, 5, x, y, e.w / 2);
  bodyGrad.addColorStop(0, isFinal ? '#ff88cc' : '#ff6688');
  bodyGrad.addColorStop(0.5, baseColor);
  bodyGrad.addColorStop(1, glowColor);
  ctx.fillStyle = bodyGrad;

  // Hexagonal boss shape
  ctx.beginPath();
  ctx.moveTo(x, y - e.h / 2);
  ctx.lineTo(x + e.w * 0.4, y - e.h / 4);
  ctx.lineTo(x + e.w / 2, y + e.h / 6);
  ctx.lineTo(x + e.w * 0.3, y + e.h / 2);
  ctx.lineTo(x - e.w * 0.3, y + e.h / 2);
  ctx.lineTo(x - e.w / 2, y + e.h / 6);
  ctx.lineTo(x - e.w * 0.4, y - e.h / 4);
  ctx.closePath();
  ctx.fill();

  // Wing extensions
  ctx.fillStyle = isFinal ? '#ff44aa' : '#ff4466';
  ctx.beginPath();
  ctx.moveTo(x + e.w * 0.3, y - e.h / 6);
  ctx.lineTo(x + e.w * 0.85, y - e.h / 3);
  ctx.lineTo(x + e.w * 0.85, y + e.h / 4);
  ctx.lineTo(x + e.w * 0.3, y + e.h / 6);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x - e.w * 0.3, y - e.h / 6);
  ctx.lineTo(x - e.w * 0.85, y - e.h / 3);
  ctx.lineTo(x - e.w * 0.85, y + e.h / 4);
  ctx.lineTo(x - e.w * 0.3, y + e.h / 6);
  ctx.closePath();
  ctx.fill();

  // Core glow
  const coreGrad = ctx.createRadialGradient(x, y, 0, x, y, 20);
  coreGrad.addColorStop(0, '#ffffff');
  coreGrad.addColorStop(0.3, isFinal ? '#ff88ff' : '#ff8888');
  coreGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(x, y, 20, 0, Math.PI * 2);
  ctx.fill();

  // Gun ports
  ctx.fillStyle = '#220011';
  for (let gp = -2; gp <= 2; gp++) {
    ctx.beginPath();
    ctx.arc(x + gp * 14, y + e.h / 2 - 8, 4, 0, Math.PI * 2);
    ctx.fill();
    // Glow on gun ports
    ctx.fillStyle = isFinal ? 'rgba(255,0,136,0.6)' : 'rgba(255,50,100,0.6)';
    ctx.beginPath();
    ctx.arc(x + gp * 14, y + e.h / 2 - 8, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#220011';
  }

  // Phase 2 indicator
  if (e.phase === 2) {
    ctx.globalAlpha = 0.6 + Math.sin(frameTime * 8) * 0.4;
    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(x, y, e.w * 0.55, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();

  // Boss HP bar
  const barW = e.w * 2;
  const barH = 10;
  const bx = x - barW / 2;
  const by = y - e.h / 2 - 20;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(bx - 2, by - 2, barW + 4, barH + 4);
  ctx.fillStyle = '#333';
  ctx.fillRect(bx, by, barW, barH);
  const hpFrac = e.hp / e.maxHp;
  const barColor = hpFrac > 0.5 ? '#ff2266' : '#ffaa00';
  ctx.fillStyle = barColor;
  ctx.fillRect(bx, by, barW * hpFrac, barH);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${e.type === 'finalBoss' ? 'FINAL BOSS' : 'BOSS'} ${Math.ceil(e.hp)}/${e.maxHp}`, x, by - 4);
}

// ─── Power-ups ────────────────────────────────────────────────────────────────
let powerups = [];

const POWERUP_TYPES = ['double', 'triple', 'shield', 'bomb', 'speed'];
const POWERUP_COLORS = {
  double: '#3399ff', triple: '#aa44ff', shield: '#ffdd22', bomb: '#ff4422', speed: '#44ee44'
};
const POWERUP_LABELS = {
  double: '2X', triple: '3X', shield: 'SH', bomb: 'BM', speed: 'SP'
};

function maybeSpawnPowerup(x, y) {
  if (Math.random() < 0.20) {
    const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
    powerups.push({
      x, y, vy: 70,
      type,
      r: 12,
      age: 0
    });
  }
}

function updatePowerups(dt) {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy * dt;
    p.age += dt;
    if (p.y > H + 20) {
      powerups.splice(i, 1);
      continue;
    }
    // Pickup check
    if (player && circleOverlap(p.x, p.y, p.r, player.x, player.y, player.hitR + 10)) {
      applyPowerup(p.type);
      powerups.splice(i, 1);
    }
  }
}

function applyPowerup(type) {
  spawnParticles(player.x, player.y, POWERUP_COLORS[type], 10);
  if (type === 'double') {
    player.powerups.doubleShot = POWERUP_DURATION_SHOOT;
    player.powerups.tripleShot = 0;
  } else if (type === 'triple') {
    player.powerups.tripleShot = POWERUP_DURATION_SHOOT;
    player.powerups.doubleShot = 0;
  } else if (type === 'shield') {
    player.shield = true;
  } else if (type === 'bomb') {
    player.powerups.bomb = Math.min((player.powerups.bomb || 0) + 1, 3);
  } else if (type === 'speed') {
    player.powerups.speedBoost = POWERUP_DURATION_SPEED;
  }
}

function drawPowerups() {
  for (const p of powerups) {
    const pulse = 1 + Math.sin(p.age * 5) * 0.15;
    const color = POWERUP_COLORS[p.type];
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 16;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * pulse, 0, Math.PI * 2);
    ctx.fill();
    // Label
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 0;
    ctx.fillText(POWERUP_LABELS[p.type], p.x, p.y);
    ctx.restore();
  }
}

// ─── Particles ───────────────────────────────────────────────────────────────
let particles = [];

function spawnParticles(x, y, color, count, extra) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 160;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 1.5 + Math.random() * 3.5,
      life: 0.6 + Math.random() * 0.6,
      maxLife: 0,
      color,
      ...(extra || {})
    });
    particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
  }
}

function spawnExplosion(x, y, color, size) {
  // Core burst
  spawnParticles(x, y, color, 12, { r: 2 + size * 0.5 });
  // Sparks
  spawnParticles(x, y, '#ffffff', 6, { r: 1.5 });
  // Embers
  spawnParticles(x, y, '#ffaa22', 8, { r: 2 });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.93;
    p.vy *= 0.93;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
let bombPressed = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyB' && state === 'playing') {
    bombPressed = true;
    e.preventDefault();
  }
  if ((e.code === 'Enter' || e.code === 'Space') && (state === 'menu' || state === 'gameOver')) {
    startGame();
    e.preventDefault();
  }
  if (e.code === 'Space') e.preventDefault();
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Collision ───────────────────────────────────────────────────────────────
function circleOverlap(x1, y1, r1, x2, y2, r2) {
  const dx = x1 - x2, dy = y1 - y2;
  return dx * dx + dy * dy < (r1 + r2) * (r1 + r2);
}

function rectCircleOverlap(rx, ry, rw, rh, cx, cy, cr) {
  const nearX = Math.max(rx - rw / 2, Math.min(cx, rx + rw / 2));
  const nearY = Math.max(ry - rh / 2, Math.min(cy, ry + rh / 2));
  const dx = cx - nearX, dy = cy - nearY;
  return dx * dx + dy * dy < cr * cr;
}

// ─── Game Logic ──────────────────────────────────────────────────────────────
function startGame() {
  score = 0;
  wave = 0;
  state = 'playing';
  player = createPlayer();
  enemies = [];
  playerBullets = [];
  enemyBullets = [];
  powerups = [];
  particles = [];
  spawnQueue = [];
  bossPatternTimer = 0;
  noDamageWave = true;
  initStars();
  advanceWave();
}

function advanceWave() {
  wave++;
  enemies = [];
  playerBullets = [];
  enemyBullets = [];
  spawnQueue = [];
  bossPatternTimer = 0;
  spawnWave(wave);
  noDamageWave = true;
}

function isWaveComplete() {
  return spawnQueue.length === 0 && enemies.length === 0;
}

function useBomb() {
  if (!player || player.powerups.bomb <= 0) return;
  player.powerups.bomb--;
  // Damage all enemies
  for (const e of enemies) {
    e.hp -= 10;
    spawnParticles(e.x, e.y, '#ff8800', 8);
  }
  // Clear all enemy bullets
  for (const b of enemyBullets) {
    spawnParticles(b.x, b.y, '#ff8800', 3);
  }
  enemyBullets = [];
  // Screen flash
  spawnParticles(W / 2, H / 2, '#ff8800', 40);
}

function damagePlayer() {
  if (!player || player.invincible > 0) return;
  if (player.shield) {
    player.shield = false;
    player.invincible = 1;
    spawnParticles(player.x, player.y, '#ffe040', 12);
    return;
  }
  noDamageWave = false;
  player.lives--;
  player.invincible = INVINCIBILITY_TIME;
  spawnExplosion(player.x, player.y, '#7c5cfc', 2);
  if (player.lives <= 0) {
    endGame();
  }
}

function endGame() {
  state = 'gameOver';
  if (score > highScore) highScore = score;
  spawnExplosion(player.x, player.y, '#7c5cfc', 5);
  player = null;
  window.dispatchEvent(new CustomEvent('gameOver', {
    detail: { game: 'space-shooter', score }
  }));
}

// ─── Update ──────────────────────────────────────────────────────────────────
function update(dt) {
  if (state !== 'playing' && state !== 'waveClear') return;

  updateStars(dt);
  updateParticles(dt);

  if (state === 'waveClear') {
    waveClearTimer -= dt;
    if (waveClearTimer <= 0) {
      if (wave >= 10) {
        endGame();
      } else {
        state = 'playing';
        advanceWave();
      }
    }
    return;
  }

  // Player
  if (player) {
    const speed = PLAYER_SPEED * (player.powerups.speedBoost > 0 ? 1.5 : 1);
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= speed * dt;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += speed * dt;
    if (keys['ArrowUp'] || keys['KeyW']) player.y -= speed * dt;
    if (keys['ArrowDown'] || keys['KeyS']) player.y += speed * dt;

    player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
    player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, player.y));

    // Fire
    player.fireCooldown -= dt;
    const firing = keys['Space'] || player.autoFire;
    if (firing && player.fireCooldown <= 0) {
      player.fireCooldown = FIRE_RATE;
      firePlayerBullet();
    }

    // Invincibility / blink
    if (player.invincible > 0) {
      player.invincible -= dt;
      player.blinkOn = Math.floor(player.invincible * 8) % 2 === 0;
      if (player.invincible <= 0) player.blinkOn = true;
    }

    // Powerup timers
    if (player.powerups.doubleShot > 0) player.powerups.doubleShot -= dt;
    if (player.powerups.tripleShot > 0) player.powerups.tripleShot -= dt;
    if (player.powerups.speedBoost > 0) player.powerups.speedBoost -= dt;

    // Bomb
    if (bombPressed) {
      useBomb();
      bombPressed = false;
    }
  }

  // Player bullets
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    const b = playerBullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y < -20 || b.x < -20 || b.x > W + 20) {
      playerBullets.splice(i, 1);
    }
  }

  // Enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y > H + 20 || b.y < -100 || b.x < -100 || b.x > W + 100) {
      enemyBullets.splice(i, 1);
    }
  }

  // Spawn enemies
  updateSpawnQueue(dt);
  updateEnemies(dt);
  updatePowerups(dt);

  // Collision: player bullets vs enemies
  for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
    const b = playerBullets[bi];
    let hit = false;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (rectCircleOverlap(e.x, e.y, e.w, e.h, b.x, b.y, b.r)) {
        hit = true;
        e.hp--;
        spawnParticles(b.x, b.y, b.color || '#00d4ff', 4);
        if (e.hp <= 0) {
          score += e.score;
          spawnExplosion(e.x, e.y, e.color, e.w / 12);
          maybeSpawnPowerup(e.x, e.y);
          enemies.splice(ei, 1);
          enemiesDefeated++;
        }
        break;
      }
    }
    if (hit) playerBullets.splice(bi, 1);
  }

  // Collision: enemy bullets vs player
  if (player) {
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      if (circleOverlap(b.x, b.y, b.r, player.x, player.y, player.hitR)) {
        enemyBullets.splice(i, 1);
        spawnParticles(b.x, b.y, b.color || '#ff4422', 6);
        damagePlayer();
        if (!player) break;
      }
    }
  }

  // Collision: enemies vs player
  if (player) {
    for (const e of enemies) {
      if (rectCircleOverlap(e.x, e.y, e.w * 0.6, e.h * 0.6, player.x, player.y, player.hitR)) {
        damagePlayer();
        if (!player) break;
      }
    }
  }

  // Wave clear check
  if (isWaveComplete()) {
    score += 100; // survival bonus
    if (noDamageWave) score += 200; // no-damage bonus
    state = 'waveClear';
    waveClearTimer = 2.0;
    noDamageWave = true;
  }
}

// ─── Drawing ─────────────────────────────────────────────────────────────────
function drawUI() {
  // Score
  ctx.save();
  ctx.font = 'bold 16px monospace';
  ctx.fillStyle = '#e8e8f0';
  ctx.textAlign = 'left';
  ctx.shadowColor = '#7c5cfc';
  ctx.shadowBlur = 6;
  ctx.fillText(`SCORE: ${score}`, 10, 22);

  // Wave indicator
  ctx.textAlign = 'center';
  ctx.fillStyle = '#c8b0ff';
  ctx.fillText(`WAVE ${wave}/10`, W / 2, 22);

  // Lives (top-right)
  ctx.textAlign = 'right';
  ctx.font = '13px monospace';
  ctx.fillStyle = '#e8e8f0';
  const livesCount = player ? player.lives : 0;
  ctx.fillText('LIVES', W - 10, 14);
  for (let l = 0; l < livesCount; l++) {
    const lx = W - 14 - l * 18;
    const ly = 26;
    ctx.fillStyle = '#9070ff';
    ctx.shadowColor = '#7c5cfc';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(lx, ly - 6);
    ctx.lineTo(lx + 6, ly + 4);
    ctx.lineTo(lx - 6, ly + 4);
    ctx.closePath();
    ctx.fill();
  }

  // Power-up timer bars
  if (player) {
    const pu = player.powerups;
    let barY = 46;
    const drawBar = (label, time, max, color) => {
      if (time <= 0) return;
      ctx.font = '10px monospace';
      ctx.textAlign = 'right';
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 4;
      ctx.fillText(label, W - 10, barY + 8);
      ctx.fillStyle = '#333';
      ctx.shadowBlur = 0;
      ctx.fillRect(W - 68, barY, 54, 7);
      ctx.fillStyle = color;
      ctx.fillRect(W - 68, barY, 54 * (time / max), 7);
      barY += 12;
    };
    drawBar('2X', pu.doubleShot, POWERUP_DURATION_SHOOT, '#3399ff');
    drawBar('3X', pu.tripleShot, POWERUP_DURATION_SHOOT, '#aa44ff');
    drawBar('SPD', pu.speedBoost, POWERUP_DURATION_SPEED, '#44ee44');
    if (pu.bomb > 0) {
      ctx.font = '10px monospace';
      ctx.textAlign = 'right';
      ctx.fillStyle = '#ff6622';
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur = 4;
      ctx.fillText(`BOMB x${pu.bomb}`, W - 10, barY + 8);
    }

    // Shield indicator
    if (player.shield) {
      ctx.font = '10px monospace';
      ctx.textAlign = 'right';
      ctx.fillStyle = '#ffe040';
      ctx.shadowColor = '#ffe040';
      ctx.shadowBlur = 6;
      ctx.fillText('SHIELD', W - 10, barY + 20);
    }
  }

  // High score
  ctx.textAlign = 'left';
  ctx.font = '11px monospace';
  ctx.fillStyle = '#888899';
  ctx.shadowBlur = 0;
  ctx.fillText(`BEST: ${highScore}`, 10, 38);

  ctx.restore();
}

function drawWaveClearOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, H / 2 - 50, W, 100);
  ctx.textAlign = 'center';
  ctx.font = 'bold 28px monospace';
  ctx.shadowColor = '#7c5cfc';
  ctx.shadowBlur = 18;
  ctx.fillStyle = '#c8b0ff';
  ctx.fillText(`WAVE ${wave} COMPLETE!`, W / 2, H / 2 - 8);
  ctx.font = '15px monospace';
  ctx.fillStyle = '#e8e8f0';
  ctx.shadowBlur = 6;
  ctx.fillText(`+100 survival${noDamageWave ? '' : ''}`, W / 2, H / 2 + 18);
  if (noDamageWave) {
    ctx.fillStyle = '#ffdd22';
    ctx.fillText('+200 no-damage bonus!', W / 2, H / 2 + 36);
  }
  ctx.restore();
}

function drawMenu() {
  // Background gradient
  ctx.save();
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0f0f13');
  g.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // Title
  ctx.textAlign = 'center';
  ctx.font = 'bold 40px monospace';
  ctx.shadowColor = '#7c5cfc';
  ctx.shadowBlur = 28;
  ctx.fillStyle = '#c8b0ff';
  ctx.fillText('SPACE', W / 2, H / 2 - 60);
  ctx.fillStyle = '#ffffff';
  ctx.fillText('SHOOTER', W / 2, H / 2 - 18);

  ctx.font = '14px monospace';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#7c5cfc';
  ctx.fillText('─────────────────────', W / 2, H / 2 + 12);

  ctx.font = '13px monospace';
  ctx.fillStyle = '#888899';
  ctx.shadowBlur = 0;
  ctx.fillText('WASD / Arrows - Move', W / 2, H / 2 + 34);
  ctx.fillText('Space - Fire  |  B - Bomb', W / 2, H / 2 + 52);

  ctx.font = 'bold 16px monospace';
  const blink = Math.floor(frameTime * 2) % 2 === 0;
  ctx.fillStyle = blink ? '#7c5cfc' : '#c8b0ff';
  ctx.shadowColor = '#7c5cfc';
  ctx.shadowBlur = 12;
  ctx.fillText('PRESS ENTER TO START', W / 2, H / 2 + 90);

  if (highScore > 0) {
    ctx.font = '13px monospace';
    ctx.fillStyle = '#ffdd22';
    ctx.shadowColor = '#ffdd22';
    ctx.shadowBlur = 6;
    ctx.fillText(`HIGH SCORE: ${highScore}`, W / 2, H / 2 + 116);
  }

  ctx.restore();
}

function drawGameOver() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  drawParticles();

  ctx.textAlign = 'center';
  ctx.font = 'bold 38px monospace';
  ctx.shadowColor = '#ff2244';
  ctx.shadowBlur = 22;
  ctx.fillStyle = '#ff4466';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 60);

  ctx.font = 'bold 22px monospace';
  ctx.shadowColor = '#7c5cfc';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#e8e8f0';
  ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 - 14);

  ctx.font = '15px monospace';
  ctx.fillStyle = '#ffdd22';
  ctx.shadowColor = '#ffdd22';
  ctx.shadowBlur = 8;
  ctx.fillText(`BEST: ${highScore}`, W / 2, H / 2 + 12);

  ctx.font = '14px monospace';
  ctx.fillStyle = '#888899';
  ctx.shadowBlur = 0;
  ctx.fillText(`WAVE REACHED: ${wave}/10`, W / 2, H / 2 + 36);

  ctx.font = 'bold 16px monospace';
  const blink = Math.floor(frameTime * 2) % 2 === 0;
  ctx.fillStyle = blink ? '#7c5cfc' : '#c8b0ff';
  ctx.shadowColor = '#7c5cfc';
  ctx.shadowBlur = 10;
  ctx.fillText('PRESS ENTER TO RETRY', W / 2, H / 2 + 80);

  ctx.restore();
}

// ─── Main Loop ───────────────────────────────────────────────────────────────
function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  frameTime += dt;

  ctx.clearRect(0, 0, W, H);

  if (state === 'menu') {
    drawMenu();
  } else if (state === 'gameOver') {
    updateStars(dt);
    updateParticles(dt);
    // Dark starfield bg
    ctx.save();
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0f0f13');
    g.addColorStop(1, '#1a0a2e');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    drawStars();
    drawGameOver();
  } else {
    // Background
    ctx.save();
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#070710');
    bg.addColorStop(1, '#0a0518');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    update(dt);

    drawStars();
    drawParticles();
    drawPowerups();

    for (const e of enemies) drawEnemy(e);

    for (const b of enemyBullets) drawBullet(b, true);
    for (const b of playerBullets) drawBullet(b, false);

    if (player) drawPlayer(player);

    drawUI();

    if (state === 'waveClear') drawWaveClearOverlay();
  }

  requestAnimationFrame(gameLoop);
}

// ─── Boot ────────────────────────────────────────────────────────────────────
initStars();
requestAnimationFrame(ts => {
  lastTime = ts;
  requestAnimationFrame(gameLoop);
});

})();
</script>

</html>
