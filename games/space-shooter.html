<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Shooter — GameKingdom</title>
  <meta name="description" content="Vertical bullet-hell space shooter. Survive 10 waves of enemies!" />
  <script src="../sounds.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --accent: #7c5cfc;
      --text: #e8e8f0; --border: #2e2e3e;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    a { color: var(--accent); }
    .game-nav {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .back-link { font-size: .9rem; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .game-nav h1 { font-size: 1.1rem; font-weight: 700; }
    #gameContainer {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px; gap: 12px;
    }
    #canvasWrapper { width: 100%; max-width: 480px; }
    canvas {
      display: block; width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #000008;
    }
    #hint {
      font-size: .8rem; color: #888899; text-align: center; max-width: 480px;
    }
  </style>
</head>
<body>
<nav class="game-nav">
  <a href="../index.html" class="back-link">← GameKingdom</a>
  <h1>Space Shooter</h1>
</nav>
<div id="gameContainer">
  <div id="canvasWrapper">
    <canvas id="gameCanvas" width="480" height="600"></canvas>
  </div>
  <p id="hint">WASD / Arrow Keys to move · Auto-fires · X to use Bomb · Click canvas to start</p>
</div>

<script>
(() => {
'use strict';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 480, H = 600;

// ── State ──────────────────────────────────────────────────────────────────
let state = 'title'; // title | playing | waveEnd | gameOver | win
let score = 0;
let highScore = parseInt(localStorage.getItem('ss_highScore') || '0');
let waveNum = 1;
let lives = 3;
let bombs = 0;
let noDamageWave = true;
let waveEndTimer = 0;
let waveEndMsg = '';
let lastTime = 0;

// Power-up timers
let doubleShot = 0;
let tripleShot = 0;
let shieldActive = false;
let speedUp = 0;

// Input
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'x' || e.key === 'X') useBomb();
  if ((e.key === ' ' || e.key === 'Enter') && state === 'title') startGame();
  if ((e.key === ' ' || e.key === 'Enter') && (state === 'gameOver' || state === 'win')) startGame();
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('click', () => {
  if (state === 'title' || state === 'gameOver' || state === 'win') startGame();
});

// ── Stars ──────────────────────────────────────────────────────────────────
const stars = [];
function initStars() {
  stars.length = 0;
  for (let i = 0; i < 50; i++) {
    const fast = i < 20;
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: fast ? Math.random() * 1.5 + 0.5 : Math.random() * 0.8 + 0.2,
      speed: fast ? 80 + Math.random() * 40 : 25 + Math.random() * 20,
      alpha: fast ? 0.8 + Math.random() * 0.2 : 0.3 + Math.random() * 0.3
    });
  }
}

function updateStars(dt) {
  for (const s of stars) {
    s.y += s.speed * dt;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }
}

function drawStars() {
  for (const s of stars) {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Player ────────────────────────────────────────────────────────────────
const player = {
  x: W / 2, y: H - 80,
  speed: 200,
  fireTimer: 0,
  invTimer: 0,
  blinkTimer: 0,
  visible: true,
  hitR: 12,
  dead: false
};

function resetPlayer() {
  player.x = W / 2; player.y = H - 80;
  player.fireTimer = 0;
  player.invTimer = 0; player.blinkTimer = 0; player.visible = true;
  player.dead = false;
}

function drawShipShape(x, y, small, alpha) {
  ctx.globalAlpha = alpha != null ? alpha : 1;
  const w = small ? 14 : 30, h = small ? 18 : 40;
  // Engine glow
  ctx.fillStyle = '#ff8c00';
  ctx.beginPath();
  ctx.ellipse(x, y + h * 0.45, w * 0.22, h * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffdd00';
  ctx.beginPath();
  ctx.ellipse(x, y + h * 0.42, w * 0.12, h * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();
  // Body gradient triangle
  const grad = ctx.createLinearGradient(x - w/2, y, x + w/2, y);
  grad.addColorStop(0, '#9d7fff');
  grad.addColorStop(0.5, '#ffffff');
  grad.addColorStop(1, '#9d7fff');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(x, y - h/2);
  ctx.lineTo(x + w/2, y + h/2);
  ctx.lineTo(x - w/2, y + h/2);
  ctx.closePath();
  ctx.fill();
  // Wing accents
  ctx.strokeStyle = '#7c5cfc';
  ctx.lineWidth = small ? 1 : 1.5;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function updatePlayer(dt) {
  if (player.dead) return;
  const spd = player.speed * (speedUp > 0 ? 1.5 : 1);
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= spd * dt;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += spd * dt;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= spd * dt;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += spd * dt;
  player.x = Math.max(20, Math.min(W - 20, player.x));
  player.y = Math.max(20, Math.min(H - 20, player.y));

  // Auto fire
  player.fireTimer -= dt;
  if (player.fireTimer <= 0) {
    firePlayerBullets();
    player.fireTimer = 0.3;
  }

  // Invincibility blink
  if (player.invTimer > 0) {
    player.invTimer -= dt;
    player.blinkTimer -= dt;
    if (player.blinkTimer <= 0) {
      player.visible = !player.visible;
      player.blinkTimer = 0.1;
    }
    if (player.invTimer <= 0) player.visible = true;
  }

  // Power-up timers
  if (doubleShot > 0) doubleShot -= dt;
  if (tripleShot > 0) tripleShot -= dt;
  if (speedUp > 0) speedUp -= dt;
}

function drawPlayer() {
  if (player.dead || !player.visible) return;
  drawShipShape(player.x, player.y, false, 1);
  // Shield bubble
  if (shieldActive) {
    ctx.strokeStyle = 'rgba(0,255,255,0.7)';
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 12; ctx.shadowColor = '#00ffff';
    ctx.beginPath();
    ctx.arc(player.x, player.y, 22, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ── Player Bullets ─────────────────────────────────────────────────────────
const playerBullets = [];

function firePlayerBullets() {
  if (tripleShot > 0) {
    playerBullets.push({ x: player.x, y: player.y - 20, vx: -80, vy: -400, life: 2 });
    playerBullets.push({ x: player.x, y: player.y - 20, vx: 0,   vy: -400, life: 2 });
    playerBullets.push({ x: player.x, y: player.y - 20, vx:  80, vy: -400, life: 2 });
  } else if (doubleShot > 0) {
    playerBullets.push({ x: player.x - 8, y: player.y - 20, vx: 0, vy: -400, life: 2 });
    playerBullets.push({ x: player.x + 8, y: player.y - 20, vx: 0, vy: -400, life: 2 });
  } else {
    playerBullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: -400, life: 2 });
  }
}

function updatePlayerBullets(dt) {
  for (const b of playerBullets) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
  }
  let alive = [];
  for (const b of playerBullets) {
    if (b.life > 0 && b.y > -20 && b.x > -20 && b.x < W + 20) alive.push(b);
  }
  playerBullets.length = 0;
  for (const b of alive) playerBullets.push(b);
}

function drawPlayerBullets() {
  ctx.shadowBlur = 8; ctx.shadowColor = '#00ffff';
  ctx.fillStyle = '#00ffff';
  for (const b of playerBullets) {
    ctx.beginPath();
    ctx.rect(b.x - 2, b.y - 6, 4, 12);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

// ── Enemies ────────────────────────────────────────────────────────────────
const enemies = [];
let bossRef = null;

function spawnWave(wave) {
  enemies.length = 0;
  bossRef = null;
  const cfg = waveConfig(wave);
  let delay = 0;
  for (const spec of cfg) {
    for (let i = 0; i < spec.count; i++) {
      const e = makeEnemy(spec.type, delay + i * spec.gap);
      if (e) enemies.push(e);
    }
    delay += spec.count * spec.gap + 1.0;
  }
}

function waveConfig(w) {
  if (w === 1)  return [{ type:'scout',    count:5, gap:0.8 }];
  if (w === 2)  return [{ type:'scout',    count:8, gap:0.6 }];
  if (w === 3)  return [{ type:'scout',    count:4, gap:0.7 }, { type:'cruiser', count:3, gap:1.0 }];
  if (w === 4)  return [{ type:'scout',    count:5, gap:0.6 }, { type:'cruiser', count:4, gap:0.9 }];
  if (w === 5)  return [{ type:'boss',     count:1, gap:0 }];
  if (w === 6)  return [{ type:'cruiser',  count:3, gap:0.9 }, { type:'bomber',  count:2, gap:1.2 }, { type:'fighter', count:4, gap:0.7 }];
  if (w === 7)  return [{ type:'cruiser',  count:4, gap:0.8 }, { type:'bomber',  count:3, gap:1.1 }, { type:'fighter', count:5, gap:0.6 }];
  if (w === 8)  return [{ type:'scout',    count:4, gap:0.5 }, { type:'cruiser', count:3, gap:0.8 }, { type:'bomber', count:2, gap:1.0 }, { type:'fighter', count:4, gap:0.6 }];
  if (w === 9)  return [{ type:'scout',    count:6, gap:0.5 }, { type:'cruiser', count:4, gap:0.7 }, { type:'bomber', count:3, gap:0.9 }, { type:'fighter', count:6, gap:0.5 }];
  if (w === 10) return [{ type:'finalBoss',count:1, gap:0 }];
  return [{ type:'scout', count:5, gap:0.8 }];
}

function makeEnemy(type, spawnDelay) {
  const base = {
    type,
    hp: 1, maxHp: 1,
    x: 60 + Math.random() * (W - 120),
    y: -60, vy: 80, vx: 0,
    fireTimer: 1 + Math.random(),
    fireRate: 2,
    spawnDelay,
    active: false,
    age: 0,
    sineOffset: Math.random() * Math.PI * 2,
    worth: 10,
    phase: 1,
    spiralAngle: 0,
    bossFirePattern: 0,
    bossPatternTimer: 0
  };
  if (type === 'scout')   return { ...base, hp:1,  maxHp:1,  worth:10,  vy:80,  fireRate:2 };
  if (type === 'cruiser') return { ...base, hp:3,  maxHp:3,  worth:30,  vy:55,  fireRate:2.5 };
  if (type === 'bomber')  return { ...base, hp:5,  maxHp:5,  worth:50,  vy:50,  fireRate:3 };
  if (type === 'fighter') {
    const fromLeft = Math.random() < 0.5;
    return { ...base, hp:2, maxHp:2, worth:20, fireRate:99,
      x: fromLeft ? -30 : W + 30,
      vy: 0, vx: fromLeft ? 200 : -200,
      curvePhase: true, curveDir: fromLeft ? 1 : -1,
      targetX: W/2 + (Math.random()-0.5) * 100 };
  }
  if (type === 'boss') {
    const b = { ...base, hp:50, maxHp:50, worth:500,
      x: W/2, y:-100, vy:30, type:'boss', phase:1,
      spiralAngle:0, bossFirePattern:0, bossPatternTimer:0 };
    bossRef = b; return b;
  }
  if (type === 'finalBoss') {
    const b = { ...base, hp:100, maxHp:100, worth:500,
      x: W/2, y:-100, vy:30, type:'finalBoss', phase:1,
      spiralAngle:0, bossFirePattern:0, bossPatternTimer:0 };
    bossRef = b; return b;
  }
  return base;
}

function updateEnemies(dt) {
  for (const e of enemies) {
    if (!e.active) {
      e.spawnDelay -= dt;
      if (e.spawnDelay <= 0) e.active = true;
      else continue;
    }
    e.age += dt;

    if (e.type === 'scout') {
      e.y += e.vy * dt;
      e.fireTimer -= dt;
      if (e.fireTimer <= 0) {
        enemyBullets.push({ x:e.x, y:e.y, vx:0, vy:150, r:6, isBoss:false, isBomb:false, life:5 });
        e.fireTimer = e.fireRate + Math.random() * 0.5;
      }
    } else if (e.type === 'cruiser') {
      e.y += e.vy * dt;
      const dx = Math.cos(e.age * 1.5 + e.sineOffset) * 60 * dt * 1.5;
      e.x = Math.max(40, Math.min(W - 40, e.x + dx));
      e.fireTimer -= dt;
      if (e.fireTimer <= 0) {
        fireSpread(e, 3);
        e.fireTimer = e.fireRate + Math.random() * 0.5;
      }
    } else if (e.type === 'bomber') {
      e.y += e.vy * dt;
      e.fireTimer -= dt;
      if (e.fireTimer <= 0) {
        dropBombs(e, 3);
        e.fireTimer = e.fireRate + Math.random() * 0.5;
      }
    } else if (e.type === 'fighter') {
      if (e.curvePhase) {
        e.x += e.vx * dt;
        const dx2 = e.targetX - e.x;
        e.vx += dx2 * 3 * dt;
        e.vy += 60 * dt;
        e.vx *= 0.98;
        if (e.vy > 100) { e.curvePhase = false; }
      } else {
        e.y += 120 * dt;
      }
    } else if (e.type === 'boss' || e.type === 'finalBoss') {
      updateBoss(e, dt);
    }
  }

  // Remove off-screen non-boss
  let keep = [];
  for (const e of enemies) {
    if (!e.active) { keep.push(e); continue; }
    const isBossType = e.type === 'boss' || e.type === 'finalBoss';
    if (!isBossType && e.y > H + 100) continue;
    keep.push(e);
  }
  enemies.length = 0;
  for (const e of keep) enemies.push(e);
}

function updateBoss(b, dt) {
  if (b.y < 100) { b.y += b.vy * dt; return; }
  b.y = 100;

  if (b.type === 'finalBoss' && b.hp <= b.maxHp * 0.5 && b.phase === 1) {
    b.phase = 2;
  }

  b.spiralAngle += (b.phase === 2 ? 3.5 : 2.5) * dt;
  b.bossPatternTimer -= dt;

  if (b.bossPatternTimer <= 0) {
    b.bossPatternTimer = b.phase === 2 ? 1.2 : 1.8;
    const pattern = b.bossFirePattern;
    b.bossFirePattern = (b.bossFirePattern + 1) % (b.phase === 2 ? 3 : 2);

    if (pattern === 0) {
      // Spiral
      for (let i = 0; i < 8; i++) {
        const a = b.spiralAngle + (Math.PI * 2 / 8) * i;
        enemyBullets.push({ x:b.x, y:b.y, vx:Math.cos(a)*160, vy:Math.sin(a)*160+80, r:8, isBoss:true, isBomb:false, life:5 });
      }
    } else if (pattern === 1) {
      // Aimed at player
      if (!player.dead) {
        const dx = player.x - b.x, dy = player.y - b.y;
        const spd = 200;
        for (let i = -1; i <= 1; i++) {
          const a = Math.atan2(dy, dx) + i * 0.3;
          enemyBullets.push({ x:b.x, y:b.y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, r:8, isBoss:true, isBomb:false, life:5 });
        }
      }
    } else if (pattern === 2 && b.phase === 2) {
      // Rapid spread
      for (let i = 0; i < 12; i++) {
        const a = (Math.PI * 2 / 12) * i + b.spiralAngle * 0.5;
        enemyBullets.push({ x:b.x, y:b.y, vx:Math.cos(a)*130, vy:Math.sin(a)*130+60, r:6, isBoss:true, isBomb:false, life:5 });
      }
    }
  }
}

function fireSpread(e, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.PI / 2 + (i - (n - 1) / 2) * 0.4;
    enemyBullets.push({ x:e.x, y:e.y, vx:Math.cos(a)*150, vy:Math.sin(a)*150, r:6, isBoss:false, isBomb:false, life:5 });
  }
}

function dropBombs(e, n) {
  for (let i = 0; i < n; i++) {
    const ox = (i - (n - 1) / 2) * 20;
    enemyBullets.push({ x:e.x+ox, y:e.y+18, vx:0, vy:90, r:8, isBoss:false, isBomb:true, life:6 });
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.active) continue;
    drawEnemy(e);
  }
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  if (e.type === 'scout')      drawHexagon(0, 0, 16, '#3a7a44', '#55ee66');
  else if (e.type === 'cruiser')  drawCruiser(0, 0);
  else if (e.type === 'bomber')   drawBomber(0, 0);
  else if (e.type === 'fighter')  drawFighter(0, 0);
  else if (e.type === 'boss')     drawBoss(0, 0, e);
  else if (e.type === 'finalBoss') drawFinalBoss(0, 0, e);

  if (e.maxHp > 1 && e.type !== 'boss' && e.type !== 'finalBoss') {
    const bw = 40, bh = 4;
    ctx.fillStyle = '#300';
    ctx.fillRect(-bw/2, -32, bw, bh);
    ctx.fillStyle = '#f55';
    ctx.fillRect(-bw/2, -32, bw * Math.max(0, e.hp / e.maxHp), bh);
  }
  ctx.restore();
}

function drawHexagon(x, y, r, fill, stroke) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    if (i === 0) ctx.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
    else         ctx.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.arc(x, y, r*0.35, 0, Math.PI*2); ctx.fill();
}

function drawCruiser(x, y) {
  ctx.fillStyle = '#2255cc';
  ctx.beginPath();
  ctx.ellipse(x, y, 32, 16, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#1a3a88';
  ctx.beginPath(); ctx.moveTo(x-32,y); ctx.lineTo(x-50,y+16); ctx.lineTo(x-20,y+8); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+32,y); ctx.lineTo(x+50,y+16); ctx.lineTo(x+20,y+8); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#88aaff';
  ctx.beginPath(); ctx.ellipse(x, y-4, 8, 6, 0, 0, Math.PI*2); ctx.fill();
}

function drawBomber(x, y) {
  ctx.fillStyle = '#5a1010';
  ctx.fillRect(x-28, y-18, 56, 36);
  ctx.strokeStyle = '#aa2222'; ctx.lineWidth = 2;
  ctx.strokeRect(x-28, y-18, 56, 36);
  ctx.fillStyle = '#882222';
  ctx.fillRect(x-26, y+14, 14, 8);
  ctx.fillRect(x+12,  y+14, 14, 8);
  ctx.fillStyle = '#ff6655';
  ctx.fillRect(x-10, y-12, 20, 12);
  ctx.fillStyle = 'rgba(255,200,200,0.3)';
  ctx.fillRect(x-8, y-10, 16, 8);
  ctx.strokeStyle = '#aa4444'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, y-18); ctx.lineTo(x, y+18); ctx.stroke();
}

function drawFighter(x, y) {
  ctx.fillStyle = '#aa6600';
  ctx.beginPath();
  ctx.moveTo(x, y-12); ctx.lineTo(x+10, y+12); ctx.lineTo(x-10, y+12); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#884400';
  ctx.beginPath(); ctx.moveTo(x-10,y+4); ctx.lineTo(x-20,y+12); ctx.lineTo(x-6,y+12); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+10,y+4); ctx.lineTo(x+20,y+12); ctx.lineTo(x+6,y+12); ctx.closePath(); ctx.fill();
}

function drawBoss(x, y, e) {
  const t = Date.now() / 1000;
  const pulse = Math.sin(t * 3) * 3;
  const r = 40 + pulse;
  const grd = ctx.createRadialGradient(x, y, 10, x, y, r+20);
  grd.addColorStop(0, 'rgba(150,0,255,0.5)');
  grd.addColorStop(1, 'rgba(80,0,200,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(x, y, r+20, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#6600cc'; ctx.strokeStyle = '#aa44ff'; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < 16; i++) {
    const a = (Math.PI/8)*i + t*0.5;
    const rad = i%2===0 ? r : r*0.55;
    if (i===0) ctx.moveTo(x+Math.cos(a)*rad, y+Math.sin(a)*rad);
    else       ctx.lineTo(x+Math.cos(a)*rad, y+Math.sin(a)*rad);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#cc00ff';
  ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(x-4, y-4, 5, 0, Math.PI*2); ctx.fill();

  for (let i = 0; i < 4; i++) {
    const a = t * 1.2 + (Math.PI/2)*i;
    ctx.strokeStyle = '#ff44ff'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x+Math.cos(a)*14, y+Math.sin(a)*14);
    ctx.lineTo(x+Math.cos(a)*(r-5), y+Math.sin(a)*(r-5));
    ctx.stroke();
  }
}

function drawFinalBoss(x, y, e) {
  const t = Date.now() / 1000;
  const pulse = Math.sin(t * 4) * 4;
  const r = 44 + pulse;
  const p2 = e.phase === 2;

  const grd = ctx.createRadialGradient(x, y, 15, x, y, r+30);
  grd.addColorStop(0, p2 ? 'rgba(255,80,0,0.6)' : 'rgba(200,0,80,0.5)');
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(x, y, r+30, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = p2 ? '#880000' : '#440044';
  ctx.strokeStyle = p2 ? '#ff3300' : '#ff00aa';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let i = 0; i < 12; i++) {
    const a = (Math.PI/6)*i + t*0.3;
    const rad = i%2===0 ? r : r*0.6;
    if (i===0) ctx.moveTo(x+Math.cos(a)*rad, y+Math.sin(a)*rad);
    else       ctx.lineTo(x+Math.cos(a)*rad, y+Math.sin(a)*rad);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();

  ctx.strokeStyle = p2 ? '#ff6600' : '#cc0066';
  ctx.lineWidth = 2;
  ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.arc(x, y, r*0.7, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  for (let i = 0; i < 6; i++) {
    const a = t * (p2 ? -2 : -1.2) + (Math.PI/3)*i;
    ctx.fillStyle = p2 ? '#ff4400' : '#ff0066';
    ctx.beginPath(); ctx.arc(x+Math.cos(a)*r*0.78, y+Math.sin(a)*r*0.78, 5, 0, Math.PI*2); ctx.fill();
  }

  ctx.fillStyle = p2 ? '#ff0000' : '#ff00ff';
  ctx.beginPath(); ctx.arc(x, y, 16, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(x-5, y-5, 6, 0, Math.PI*2); ctx.fill();
}

// ── Enemy Bullets ──────────────────────────────────────────────────────────
const enemyBullets = [];

function updateEnemyBullets(dt) {
  for (const b of enemyBullets) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
  }
  let alive = [];
  for (const b of enemyBullets) {
    if (b.life > 0 && b.y > -30 && b.y < H+30 && b.x > -30 && b.x < W+30) alive.push(b);
  }
  enemyBullets.length = 0;
  for (const b of alive) enemyBullets.push(b);
}

function drawEnemyBullets() {
  for (const b of enemyBullets) {
    if (b.isBomb) {
      ctx.fillStyle = '#880000'; ctx.strokeStyle = '#ff2222'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = '#ffaaaa'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(b.x-4, b.y); ctx.lineTo(b.x+4, b.y);
      ctx.moveTo(b.x, b.y-4); ctx.lineTo(b.x, b.y+4);
      ctx.stroke();
    } else if (b.isBoss) {
      ctx.shadowBlur = 10; ctx.shadowColor = '#ff0000';
      ctx.fillStyle = '#ff3300';
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,180,0,0.6)';
      ctx.beginPath(); ctx.arc(b.x-2, b.y-2, b.r*0.4, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      ctx.shadowBlur = 6; ctx.shadowColor = '#ff6600';
      ctx.fillStyle = '#ff6622';
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,220,100,0.5)';
      ctx.beginPath(); ctx.arc(b.x-1.5, b.y-1.5, b.r*0.4, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

// ── Power-ups ──────────────────────────────────────────────────────────────
const powerups = [];
const POWERUP_TYPES   = ['double','triple','shield','bomb','speed'];
const POWERUP_COLORS  = { double:'#0088ff', triple:'#9900ff', shield:'#00ffcc', bomb:'#ffcc00', speed:'#00ff44' };
const POWERUP_LABELS  = { double:'2x', triple:'3x', shield:'SH', bomb:'BM', speed:'SP' };

function trySpawnPowerup(x, y) {
  if (Math.random() > 0.20) return;
  const t = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  powerups.push({ x, y, vy:60, type:t, life:8 });
}

function updatePowerups(dt) {
  for (const p of powerups) { p.y += p.vy * dt; p.life -= dt; }
  let alive = [];
  for (const p of powerups) { if (p.life > 0 && p.y < H+30) alive.push(p); }
  powerups.length = 0;
  for (const p of alive) powerups.push(p);
}

function drawPowerups() {
  for (const p of powerups) {
    const col = POWERUP_COLORS[p.type];
    ctx.shadowBlur = 12; ctx.shadowColor = col;
    ctx.strokeStyle = col; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = col + '33';
    ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = col;
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(POWERUP_LABELS[p.type], p.x, p.y);
  }
  ctx.textBaseline = 'alphabetic';
}

function collectPowerup(p) {
  switch (p.type) {
    case 'double': doubleShot = 15; tripleShot = 0; break;
    case 'triple': tripleShot = 15; doubleShot = 0; break;
    case 'shield': shieldActive = true; break;
    case 'bomb':   bombs = Math.min(bombs + 1, 5); break;
    case 'speed':  speedUp = 10; break;
  }
}

function useBomb() {
  if (state !== 'playing' || bombs <= 0) return;
  bombs--;
  enemyBullets.length = 0;
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.active) continue;
    e.hp -= 20;
    if (e.hp <= 0) killEnemy(e);
  }
  spawnExplosion(W/2, H/2, 40, '#ffff00', 30);
}

// ── Explosions ─────────────────────────────────────────────────────────────
const particles = [];

function spawnExplosion(x, y, count, color, spread) {
  const cnt = count || 12;
  const spd = spread || 80;
  for (let i = 0; i < cnt; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 20 + Math.random() * spd;
    const maxLife = 0.4 + Math.random() * 0.3;
    particles.push({
      x, y,
      vx: Math.cos(a) * v, vy: Math.sin(a) * v,
      r: 2 + Math.random() * 4,
      color, life: maxLife, maxLife
    });
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life -= dt;
    p.r = Math.max(0, p.r - dt * 4);
  }
  let alive = [];
  for (const p of particles) { if (p.life > 0 && p.r > 0) alive.push(p); }
  particles.length = 0;
  for (const p of alive) particles.push(p);
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life / p.maxLife);
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 4; ctx.shadowColor = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

// ── Collision ──────────────────────────────────────────────────────────────
function enemyRadius(e) {
  if (e.type === 'scout')     return 16;
  if (e.type === 'cruiser')   return 32;
  if (e.type === 'bomber')    return 28;
  if (e.type === 'fighter')   return 12;
  if (e.type === 'boss')      return 40;
  if (e.type === 'finalBoss') return 44;
  return 16;
}

function checkCollisions() {
  // Player bullets vs enemies
  outer:
  for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
    const b = playerBullets[bi];
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (!e.active) continue;
      if (Math.hypot(b.x - e.x, b.y - e.y) < enemyRadius(e) + 4) {
        playerBullets.splice(bi, 1);
        e.hp--;
        if (e.hp <= 0) killEnemy(e);
        continue outer;
      }
    }
  }

  if (player.dead || player.invTimer > 0) return;

  // Enemy bullets vs player
  for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
    const b = enemyBullets[bi];
    if (Math.hypot(b.x - player.x, b.y - player.y) < player.hitR + b.r) {
      enemyBullets.splice(bi, 1);
      hitPlayer();
      break;
    }
  }

  // Power-up collection
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    if (Math.hypot(p.x - player.x, p.y - player.y) < 22) {
      collectPowerup(p);
      spawnExplosion(p.x, p.y, 6, POWERUP_COLORS[p.type], 30);
      powerups.splice(i, 1);
    }
  }
}

function killEnemy(e) {
  e.hp = 0;
  score += e.worth;
  SFX.play('hit');
  SFX.play('score');
  const colMap = { scout:'#44ff88', cruiser:'#4488ff', bomber:'#ff4444', fighter:'#ffaa00', boss:'#cc44ff', finalBoss:'#ff0066' };
  const col = colMap[e.type] || '#ffffff';
  const cnt = (e.type === 'boss' || e.type === 'finalBoss') ? 30 : 10 + Math.floor(Math.random()*6);
  const spd = (e.type === 'boss' || e.type === 'finalBoss') ? 150 : 80;
  spawnExplosion(e.x, e.y, cnt, col, spd);
  trySpawnPowerup(e.x, e.y);
  const idx = enemies.indexOf(e);
  if (idx !== -1) enemies.splice(idx, 1);
  if (e === bossRef) bossRef = null;
}

function hitPlayer() {
  if (shieldActive) {
    shieldActive = false;
    spawnExplosion(player.x, player.y, 8, '#00ffcc', 40);
    player.invTimer = 1; player.blinkTimer = 0.1;
    return;
  }
  noDamageWave = false;
  lives--;
  SFX.play('lose');
  spawnExplosion(player.x, player.y, 14, '#ffffff', 70);
  if (lives <= 0) {
    player.dead = true;
    setTimeout(endGame, 900);
  } else {
    player.invTimer = 2; player.blinkTimer = 0.1;
  }
}

function endGame() {
  if (score > highScore) { highScore = score; localStorage.setItem('ss_highScore', highScore); }
  window.dispatchEvent(new CustomEvent('gameOver', { detail: { game: 'space-shooter', score } }));
  state = 'gameOver';
}

// ── HUD ────────────────────────────────────────────────────────────────────
function drawHUD() {
  // Score
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(String(score).padStart(7, '0'), 8, 8);

  // Wave
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaccff';
  ctx.font = '13px monospace';
  ctx.fillText('WAVE ' + waveNum + '/10', W/2, 8);

  // Lives
  for (let i = 0; i < lives; i++) {
    drawShipShape(W - 18 - i * 22, 18, true, 1);
  }

  // Bombs
  if (bombs > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('BOMB x' + bombs, 8, 28);
  }

  // Power-up timer bars
  let barY = H - 42;
  const bars = [
    { label: '2x SHOT', time: doubleShot, max: 15, col: '#0088ff' },
    { label: '3x SHOT', time: tripleShot, max: 15, col: '#aa00ff' },
    { label: 'SPD UP',  time: speedUp,    max: 10, col: '#00ff44' },
  ];
  for (const d of bars) {
    if (d.time > 0) {
      ctx.fillStyle = '#111';
      ctx.fillRect(8, barY, 90, 8);
      ctx.fillStyle = d.col;
      ctx.fillRect(8, barY, 90 * Math.max(0, d.time / d.max), 8);
      ctx.fillStyle = '#fff';
      ctx.font = '9px monospace';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(d.label, 102, barY + 4);
      barY -= 12;
    }
  }
  if (shieldActive) {
    ctx.fillStyle = '#00ffcc';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('SHIELD', 8, barY - 4);
  }

  // Boss HP bar at bottom
  if (bossRef && bossRef.active) {
    const bx = 20, by = H - 24, bw = W - 40, bh = 12;
    ctx.fillStyle = '#110000';
    ctx.fillRect(bx, by, bw, bh);
    const ratio = Math.max(0, bossRef.hp / bossRef.maxHp);
    ctx.fillStyle = ratio > 0.5 ? '#ff2222' : '#ff8800';
    ctx.fillRect(bx, by, bw * ratio, bh);
    ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, bh);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const lbl = bossRef.type === 'finalBoss'
      ? 'FINAL BOSS' + (bossRef.phase===2 ? ' [PHASE 2]' : '') + '  ' + bossRef.hp + '/' + bossRef.maxHp
      : 'BOSS  ' + bossRef.hp + '/' + bossRef.maxHp;
    ctx.fillText(lbl, W/2, by + 6);
  }
}

function drawWaveOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(0, H/2 - 55, W, 110);
  ctx.fillStyle = '#ffdd55';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(waveEndMsg, W/2, H/2 - 12);
  ctx.fillStyle = '#aaccff';
  ctx.font = '14px monospace';
  ctx.fillText('Get ready...', W/2, H/2 + 16);
}

function drawTitleScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  ctx.shadowBlur = 22; ctx.shadowColor = '#7c5cfc';
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 38px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('SPACE SHOOTER', W/2, H/2 - 90);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#aaccff';
  ctx.font = '14px monospace';
  ctx.fillText('10 Waves of Bullet Hell', W/2, H/2 - 48);

  ctx.fillStyle = '#88ff88';
  ctx.font = '13px monospace';
  ctx.fillText('WASD / Arrows — Move', W/2, H/2 + 6);
  ctx.fillText('Auto-Fire  ·  X — Use Bomb', W/2, H/2 + 26);

  const pulse = 0.65 + Math.sin(Date.now() / 420) * 0.35;
  ctx.fillStyle = 'rgba(124,92,252,' + pulse + ')';
  ctx.font = 'bold 17px monospace';
  ctx.fillText('Click or Press ENTER to Start', W/2, H/2 + 78);

  ctx.fillStyle = '#888899';
  ctx.font = '12px monospace';
  ctx.fillText('High Score: ' + highScore, W/2, H/2 + 108);
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);

  ctx.shadowBlur = 16; ctx.shadowColor = '#ff2222';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('GAME OVER', W/2, H/2 - 72);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('Score: ' + score, W/2, H/2 - 22);
  ctx.fillStyle = '#ffdd55';
  ctx.fillText('Best:  ' + highScore, W/2, H/2 + 8);

  const pulse = 0.65 + Math.sin(Date.now() / 420) * 0.35;
  ctx.fillStyle = 'rgba(124,92,252,' + pulse + ')';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('Click or ENTER to Retry', W/2, H/2 + 60);
}

function drawWinScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);

  ctx.shadowBlur = 20; ctx.shadowColor = '#ffdd55';
  ctx.fillStyle = '#ffdd55';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('YOU WIN!', W/2, H/2 - 85);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#aaffcc';
  ctx.font = '16px monospace';
  ctx.fillText('All 10 Waves Survived!', W/2, H/2 - 44);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('Final Score: ' + score, W/2, H/2 - 2);
  ctx.fillStyle = '#ffdd55';
  ctx.fillText('Best:  ' + highScore, W/2, H/2 + 28);

  const pulse = 0.65 + Math.sin(Date.now() / 420) * 0.35;
  ctx.fillStyle = 'rgba(124,92,252,' + pulse + ')';
  ctx.font = 'bold 15px monospace';
  ctx.fillText('Click or ENTER to Play Again', W/2, H/2 + 80);
}

// ── Game Flow ──────────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; bombs = 0;
  doubleShot = 0; tripleShot = 0; shieldActive = false; speedUp = 0;
  waveNum = 1; noDamageWave = true;
  enemies.length = 0; playerBullets.length = 0;
  enemyBullets.length = 0; powerups.length = 0; particles.length = 0;
  bossRef = null;
  resetPlayer();
  initStars();
  spawnWave(waveNum);
  state = 'playing';
}

function checkWaveComplete() {
  if (state !== 'playing') return;
  const alive = enemies.filter(e => e.active || e.spawnDelay > 0);
  if (alive.length === 0 && enemies.length === 0) {
    completeWave();
  }
}

function completeWave() {
  score += 100;
  let msg = 'Wave ' + waveNum + ' Complete!  +100pts';
  if (noDamageWave) { score += 200; msg += '  +200 No-Dmg!'; }
  noDamageWave = true;
  waveEndMsg = msg;
  waveEndTimer = 2.5;
  state = 'waveEnd';
}

function nextWave() {
  waveNum++;
  if (waveNum > 10) {
    if (score > highScore) { highScore = score; localStorage.setItem('ss_highScore', highScore); }
    window.dispatchEvent(new CustomEvent('gameOver', { detail: { game: 'space-shooter', score } }));
    state = 'win';
    return;
  }
  enemies.length = 0;
  playerBullets.length = 0;
  enemyBullets.length = 0;
  powerups.length = 0;
  bossRef = null;
  spawnWave(waveNum);
  state = 'playing';
}

// ── Main Loop ──────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0, 0, W, H);
  updateStars(dt);
  drawStars();

  if (state === 'title')    { drawTitleScreen();    requestAnimationFrame(loop); return; }
  if (state === 'gameOver') { drawGameOverScreen(); requestAnimationFrame(loop); return; }
  if (state === 'win')      { drawWinScreen();      requestAnimationFrame(loop); return; }

  if (state === 'waveEnd') {
    drawEnemyBullets();
    drawPlayerBullets();
    drawEnemies();
    drawPlayer();
    drawPowerups();
    drawParticles();
    drawHUD();
    drawWaveOverlay();
    waveEndTimer -= dt;
    if (waveEndTimer <= 0) nextWave();
    requestAnimationFrame(loop);
    return;
  }

  // state === 'playing'
  updatePlayer(dt);
  updatePlayerBullets(dt);
  updateEnemies(dt);
  updateEnemyBullets(dt);
  updatePowerups(dt);
  updateParticles(dt);
  checkCollisions();
  checkWaveComplete();

  drawEnemyBullets();
  drawPlayerBullets();
  drawEnemies();
  drawPlayer();
  drawPowerups();
  drawParticles();
  drawHUD();

  requestAnimationFrame(loop);
}

// Boot
initStars();
requestAnimationFrame(ts => { lastTime = ts; loop(ts); });

})();
</script>
