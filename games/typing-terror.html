<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Terror — GameKingdom</title>
  <meta name="description" content="Type falling words to defend your city from destruction!" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2e2e3e;
      --accent: #7c5cfc; --text: #e8e8f0; --text-dim: #888899;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    a { color: var(--accent); }

    .game-nav {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-link { font-size: .9rem; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .game-nav h1 { font-size: 1.1rem; font-weight: 700; }

    #gameContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 12px;
    }

    #hud {
      width: 600px;
      max-width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.85rem;
      gap: 8px;
      flex-wrap: wrap;
    }

    #hud .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    #hud .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
    #hud .stat-value { font-size: 1rem; font-weight: 700; }

    #comboDisplay {
      font-size: 1.1rem;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 10px #ffd700, 0 0 20px #ff8800;
      min-width: 90px;
      text-align: center;
    }

    #inputDisplay {
      width: 600px;
      max-width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
    }
    #inputDisplay .label { color: var(--text-dim); font-size: 0.75rem; }
    #inputDisplay .typed { color: #4ade80; font-family: monospace; font-weight: 700; font-size: 1rem; letter-spacing: 0.05em; }

    #canvasWrapper {
      position: relative;
      width: 600px;
      max-width: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15,15,19,0.93);
      border-radius: 8px;
      gap: 14px;
      z-index: 10;
    }
    #overlay.hidden { display: none; }

    #overlay h2 {
      font-size: 2rem; font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 24px var(--accent);
    }
    #overlay p { color: var(--text-dim); font-size: 0.9rem; text-align: center; max-width: 340px; }
    #overlay .big-score { font-size: 2.5rem; font-weight: 900; color: #ffd700; }

    #overlayStats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 28px;
      font-size: 0.85rem;
    }
    #overlayStats .s-label { color: var(--text-dim); }
    #overlayStats .s-value { color: var(--text); font-weight: 700; text-align: right; }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.85; transform: scale(1.03); }
    .btn:active { transform: scale(0.97); }

    .lives-display { font-size: 1rem; letter-spacing: 2px; }
  </style>
</head>
<body>

<nav class="game-nav">
  <a href="../index.html" class="back-link">← GameKingdom</a>
  <h1>Typing Terror</h1>
</nav>

<div id="gameContainer">
  <div id="hud">
    <div class="stat">
      <span class="stat-label">Score</span>
      <span class="stat-value" id="scoreDisplay">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Lives</span>
      <span class="stat-value lives-display" id="livesDisplay">❤️❤️❤️❤️❤️</span>
    </div>
    <div class="stat">
      <span class="stat-label">Wave</span>
      <span class="stat-value" id="waveDisplay">1</span>
    </div>
    <div class="stat">
      <span class="stat-label">WPM</span>
      <span class="stat-value" id="wpmDisplay">0</span>
    </div>
    <div id="comboDisplay"></div>
  </div>

  <div id="canvasWrapper">
    <canvas id="gameCanvas" width="600" height="480"></canvas>
    <div id="overlay">
      <h2 id="overlayTitle">Typing Terror</h2>
      <p id="overlaySubtitle">Type falling words to defend your city from destruction!</p>
      <div id="overlayStats"></div>
      <div class="big-score" id="overlayScore" style="display:none"></div>
      <button class="btn" id="overlayBtn">Start Game</button>
    </div>
  </div>

  <div id="inputDisplay">
    <span class="label">Typing:</span>
    <span class="typed" id="typedText"></span>
  </div>
</div>

<script>
'use strict';

// ================================================================
//  WORD LISTS
// ================================================================
const WORDS = {
  easy: [
    'cat','dog','run','jump','fire','blue','star','moon','rock','tree',
    'bird','fish','sand','wind','rain','snow','lake','hill','path','door',
    'lamp','bell','book','hand','foot','nose','ears','eyes','arms','legs',
    'neck','skin','hair','lips','chin','bone','wall','roof','cup','jar',
    'box','bag','hat','cap','shoe','sock','ring','key','pin','sun'
  ],
  medium: [
    'planet','rocket','castle','wizard','dragon','forest','pirate','zombie',
    'goblin','archer','hunter','knight','farmer','dancer','singer','runner',
    'jumper','winner','loser','battle','shield','sword','magic','potion',
    'chest','tower','bridge','river','ocean','cloud','storm','night','light',
    'flame','frost','stone','glass','metal','tiger','eagle','snake','horse',
    'whale','shark','crane','robin','swallow','falcon','heron','comet'
  ],
  hard: [
    'thunder','explore','village','harvest','crystal','lantern','fortress',
    'balance','triumph','dungeon','monster','warrior','treasure','diamond',
    'phantom','captain','soldier','emperor','kingdom','ancient','morning',
    'evening','twilight','sunrise','mansion','library','academy','hallway',
    'journey','mission','problem','success','failure','mystery','history',
    'biology','science','physics','engines','machine','factory','network',
    'shelter','volcano','compass','orbital','quantum','century','thunder'
  ],
  expert: [
    'adventure','butterfly','telescope','champion','expedition','laboratory',
    'parliament','understand','microphone','calculator','independent',
    'extraordinary','constellation','revolutionary','philosophical',
    'architecture','environment','civilization','perseverance','accomplishment',
    'magnificent','destination','examination','impossible','transformation'
  ]
};

const SPECIAL_POOL = [
  { text: 'BONUS',  color: '#ffd700', type: 'bonus'  },
  { text: 'SLOW',   color: '#60a5fa', type: 'slow'   },
  { text: 'SHIELD', color: '#c084fc', type: 'shield' },
  { text: 'BOMB',   color: '#f87171', type: 'bomb'   },
];

// ================================================================
//  WAVE CONFIG  (12 waves)
// ================================================================
const WAVE_CFG = [
  null,
  { pool: 'easy',   spawnMs: 3000, speed: 40 },
  { pool: 'easy',   spawnMs: 2800, speed: 45 },
  { pool: 'easy',   spawnMs: 2500, speed: 50 },
  { pool: 'medium', spawnMs: 2000, speed: 60 },
  { pool: 'medium', spawnMs: 1800, speed: 65 },
  { pool: 'medium', spawnMs: 1600, speed: 70 },
  { pool: 'hard',   spawnMs: 1500, speed: 80 },
  { pool: 'hard',   spawnMs: 1300, speed: 85 },
  { pool: 'hard',   spawnMs: 1200, speed: 90 },
  { pool: 'expert', spawnMs: 1000, speed: 100 },
  { pool: 'expert', spawnMs:  900, speed: 110 },
  { pool: 'expert', spawnMs:  800, speed: 120 },
];
const MAX_WAVE = 12;
const WORDS_PER_WAVE = 12;
const DANGER_Y = 350;
const MAX_WORDS = 8;

// ================================================================
//  CANVAS
// ================================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 600, H = 480;

// ================================================================
//  GAME STATE
// ================================================================
let STATE = 'menu';
let score = 0;
let lives = 5;
let wave = 1;
let combo = 0;
let maxCombo = 0;
let wordsCompleted = 0;
let wordsMissed = 0;
let gameStartTime = 0;
let lastSpawnTime = 0;
let wordsSpawnedThisWave = 0;
let slowActive = false;
let slowEnd = 0;
let shieldActive = false;
let shieldEnd = 0;
let redFlashEnd = 0;
let buildings = [];
let activeWords = [];
let particles = [];
let targetedWord = null;
let typedSoFar = '';
let lastFrameTime = 0;
let animFrame = null;
let gameSeed = 0;
// Wave pause state
let wavePauseUntil = 0;

// ================================================================
//  SEEDED PSEUDO-RANDOM (for consistent buildings per game)
// ================================================================
function makePrng(seed) {
  let s = seed | 0;
  return function () {
    s = (Math.imul(s, 1664525) + 1013904223) | 0;
    return ((s >>> 0) / 0x100000000);
  };
}

// ================================================================
//  BUILDING GENERATION
// ================================================================
function generateBuildings(seed) {
  const rng = makePrng(seed);
  const buildings = [];
  const count = 7;
  let x = 10;

  for (let i = 0; i < count; i++) {
    const bw = Math.floor(rng() * 30 + 55);   // 55-85
    const bh = Math.floor(rng() * 70 + 60);   // 60-130
    const bx = x;
    const by = H - bh - 30;

    // Windows grid
    const wins = [];
    const cols = Math.max(1, Math.floor((bw - 12) / 14));
    const rows = Math.max(1, Math.floor((bh - 12) / 18));
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        wins.push({
          x: bx + 6 + c * 14,
          y: by + 8 + r * 18,
          lit: rng() > 0.25,
        });
      }
    }
    buildings.push({ x: bx, y: by, w: bw, h: bh, windows: wins });
    x += bw + Math.floor(rng() * 12 + 4);
  }

  // Scale so they span the canvas width
  const totalUsed = x - 10;
  const scale = (W - 20) / totalUsed;
  for (const b of buildings) {
    b.x = 10 + (b.x - 10) * scale;
    b.w = b.w * scale;
    for (const w of b.windows) {
      w.x = 10 + (w.x - 10) * scale;
    }
  }
  return buildings;
}

// ================================================================
//  SPAWNING
// ================================================================
function pickWord(waveNum) {
  // 5% chance of special word
  if (Math.random() < 0.05) {
    const s = SPECIAL_POOL[Math.floor(Math.random() * SPECIAL_POOL.length)];
    return { text: s.text, special: s.type, baseColor: s.color };
  }
  const cfg = WAVE_CFG[waveNum];
  const pool = WORDS[cfg.pool];
  return { text: pool[Math.floor(Math.random() * pool.length)], special: null, baseColor: '#e8e8f0' };
}

function spawnWord() {
  if (activeWords.length >= MAX_WORDS) return;
  if (wordsSpawnedThisWave >= WORDS_PER_WAVE) return;

  const { text, special, baseColor } = pickWord(wave);
  ctx.font = 'bold 15px monospace';
  const tw = ctx.measureText(text).width;
  const x = Math.random() * (W - tw - 30) + tw / 2 + 10;

  const cfg = WAVE_CFG[wave];
  let speed = cfg.speed;
  if (slowActive) speed *= 0.5;

  activeWords.push({
    text, special, baseColor,
    x, y: 15,
    speed,
    typed: 0,
    flash: 0,
  });
  wordsSpawnedThisWave++;
  lastSpawnTime = performance.now();
}

// ================================================================
//  PARTICLES
// ================================================================
function burst(x, y, color) {
  const n = 6 + (Math.random() * 3 | 0);
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) + (Math.random() - 0.5) * 0.6;
    const v = 70 + Math.random() * 90;
    particles.push({
      x, y,
      vx: Math.cos(a) * v,
      vy: Math.sin(a) * v - 30,
      color,
      life: 0.45 + Math.random() * 0.25,
      maxLife: 0.45 + Math.random() * 0.25,
      r: 2.5 + Math.random() * 2.5,
    });
  }
}

// ================================================================
//  DRAWING
// ================================================================
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H - 30);
  grad.addColorStop(0, '#030307');
  grad.addColorStop(1, '#0d0d1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H - 30);
}

function drawStars() {
  const rng = makePrng(gameSeed + 777);
  ctx.fillStyle = 'rgba(232,232,240,0.7)';
  for (let i = 0; i < 45; i++) {
    const sx = rng() * W;
    const sy = rng() * (H * 0.55);
    const sr = rng() * 1.3 + 0.3;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGround() {
  ctx.fillStyle = '#1a1a24';
  ctx.fillRect(0, H - 30, W, 30);
  ctx.fillStyle = '#222233';
  ctx.fillRect(0, H - 30, W, 2);
}

function drawBuildings() {
  const livesLost = 5 - lives;
  for (let i = 0; i < buildings.length; i++) {
    const b = buildings[i];
    const isDark = i < livesLost;

    ctx.fillStyle = isDark ? '#161620' : '#252535';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = isDark ? '#1c1c2a' : '#303045';
    ctx.fillRect(b.x, b.y, b.w, 5);

    for (const w of b.windows) {
      if (isDark || !w.lit) {
        ctx.fillStyle = 'rgba(20,20,32,0.9)';
      } else {
        const flick = Math.random() > 0.998;
        ctx.fillStyle = flick ? 'rgba(180,130,30,0.5)' : 'rgba(255,215,80,0.88)';
      }
      ctx.fillRect(w.x, w.y, 8, 6);
    }
  }
}

function drawDangerLine() {
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = '#ff4444';
  ctx.setLineDash([8, 7]);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, DANGER_Y);
  ctx.lineTo(W, DANGER_Y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawWord(word) {
  const { text, typed, flash, x, y, baseColor, special } = word;
  const isTarget = word === targetedWord;
  const fontSize = 15;
  ctx.font = `bold ${fontSize}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const typedPart = text.slice(0, typed);
  const remainPart = text.slice(typed);
  const fullW = ctx.measureText(text).width;
  let cx = x - fullW / 2;

  ctx.save();

  if (flash > 0) {
    // Wrong-key flash: whole word red
    ctx.shadowColor = '#ff2222';
    ctx.shadowBlur = 22;
    ctx.fillStyle = '#ff5555';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x - fullW / 2, y);
  } else {
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';

    // Typed portion (bright green)
    if (typedPart.length > 0) {
      ctx.shadowColor = '#22c55e';
      ctx.shadowBlur = isTarget ? 14 : 8;
      ctx.fillStyle = '#4ade80';
      ctx.fillText(typedPart, cx, y);
      cx += ctx.measureText(typedPart).width;
    }

    // Remaining portion
    if (isTarget) {
      ctx.shadowColor = '#aaaaff';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#ffffff';
    } else {
      ctx.shadowColor = baseColor;
      ctx.shadowBlur = 8;
      ctx.fillStyle = baseColor;
    }
    ctx.fillText(remainPart, cx, y);
  }

  ctx.restore();

  // Red warning outline near danger line
  if (y > 270) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, (y - 270) / 80) * 0.55;
    ctx.strokeStyle = '#ff3333';
    ctx.lineWidth = 1.5;
    const pad = 5;
    ctx.strokeRect(x - fullW / 2 - pad, y - fontSize / 2 - pad, fullW + pad * 2, fontSize + pad * 2);
    ctx.restore();
  }
}

function drawParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 150 * dt;
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    const a = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * a + 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawShieldEffect() {
  if (!shieldActive) return;
  ctx.save();
  ctx.globalAlpha = 0.07;
  ctx.fillStyle = '#c084fc';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 0.45;
  ctx.strokeStyle = '#c084fc';
  ctx.lineWidth = 3;
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#c084fc';
  ctx.strokeRect(2, 2, W - 4, H - 4);
  ctx.restore();
}

function drawRedFlash(now) {
  if (now >= redFlashEnd) return;
  const t = (redFlashEnd - now) / 300;
  ctx.save();
  ctx.globalAlpha = t * 0.4;
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function drawWavePause(now) {
  if (STATE !== 'wavePause') return;

  ctx.save();
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#0f0f13';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  const prev = wave - 1;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 38px Segoe UI, system-ui, sans-serif';
  ctx.shadowBlur = 24;
  ctx.shadowColor = '#7c5cfc';
  ctx.fillStyle = '#7c5cfc';
  ctx.fillText(`Wave ${prev} Complete!`, W / 2, H / 2 - 24);
  ctx.font = '20px Segoe UI, system-ui, sans-serif';
  ctx.fillStyle = '#e8e8f0';
  ctx.shadowBlur = 0;
  const remaining = Math.ceil((wavePauseUntil - now) / 1000);
  ctx.fillText(`Wave ${wave} incoming in ${remaining}...`, W / 2, H / 2 + 22);
  ctx.restore();
}

// ================================================================
//  HUD
// ================================================================
function comboMult() {
  if (combo >= 10) return 5;
  if (combo >= 5)  return 3;
  if (combo >= 3)  return 2;
  return 1;
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score.toLocaleString();
  document.getElementById('waveDisplay').textContent = wave;
  document.getElementById('livesDisplay').textContent = '❤️'.repeat(Math.max(0, lives));

  const elapsed = (performance.now() - gameStartTime) / 60000;
  const wpm = elapsed > 0.02 ? Math.round(wordsCompleted / elapsed) : 0;
  document.getElementById('wpmDisplay').textContent = wpm;

  const comboEl = document.getElementById('comboDisplay');
  if (combo >= 3) {
    comboEl.textContent = `${combo}× (${comboMult()}x)`;
  } else {
    comboEl.textContent = '';
  }

  document.getElementById('typedText').textContent = typedSoFar;
}

// ================================================================
//  INPUT HANDLING  — keydown only, no focus required
// ================================================================
document.addEventListener('keydown', handleKey);

function handleKey(e) {
  if (STATE !== 'playing') return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  const key = e.key;

  if (key === 'Backspace') {
    targetedWord = null;
    typedSoFar = '';
    updateHUD();
    return;
  }

  // Only single printable characters
  if (key.length !== 1) return;
  const ch = key.toLowerCase();

  if (!targetedWord) {
    // Auto-target: first char match, pick most dangerous (largest y)
    let best = null;
    for (const w of activeWords) {
      if (w.text[0].toLowerCase() === ch) {
        if (!best || w.y > best.y) best = w;
      }
    }
    if (best) {
      targetedWord = best;
      targetedWord.typed = 1;
      typedSoFar = best.text[0];
    }
    updateHUD();
    return;
  }

  // Continue on targeted word
  const expected = targetedWord.text[targetedWord.typed];
  if (!expected) return; // shouldn't happen

  if (ch === expected.toLowerCase()) {
    targetedWord.typed++;
    typedSoFar += expected;

    if (targetedWord.typed >= targetedWord.text.length) {
      completeWord(targetedWord);
    }
  } else {
    targetedWord.flash = 0.22;
  }

  updateHUD();
}

// ================================================================
//  WORD COMPLETE / MISS
// ================================================================
function completeWord(word) {
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  wordsCompleted++;

  const mult = comboMult();
  const gained = Math.floor(word.text.length * wave * (1 + mult * 0.5));
  score += gained;

  if (word.special === 'bonus') {
    score += 50;
  } else if (word.special === 'slow') {
    slowActive = true;
    slowEnd = performance.now() + 5000;
    for (const w of activeWords) w.speed *= 0.5;
  } else if (word.special === 'shield') {
    shieldActive = true;
    shieldEnd = performance.now() + 5000;
  } else if (word.special === 'bomb') {
    // Destroy all other words
    const others = activeWords.filter(w => w !== word);
    for (const ow of others) {
      burst(ow.x, ow.y, ow.baseColor);
      score += Math.floor(ow.text.length * wave);
      wordsCompleted++;
    }
    activeWords = [];
  }

  burst(word.x, word.y, word.special ? word.baseColor : '#4ade80');
  removeWord(word);
  targetedWord = null;
  typedSoFar = '';
}

function missWord(word) {
  const impactY = DANGER_Y + 10;

  if (shieldActive) {
    burst(word.x, impactY, '#c084fc');
    wordsMissed++;
    removeWord(word);
    if (word === targetedWord) { targetedWord = null; typedSoFar = ''; }
    return;
  }

  lives = Math.max(0, lives - 1);
  wordsMissed++;
  combo = 0;
  redFlashEnd = performance.now() + 300;
  burst(word.x, impactY, '#ff4444');
  removeWord(word);
  if (word === targetedWord) { targetedWord = null; typedSoFar = ''; }
}

function removeWord(word) {
  const idx = activeWords.indexOf(word);
  if (idx !== -1) activeWords.splice(idx, 1);
}

// ================================================================
//  WAVE MANAGEMENT
// ================================================================
function checkWaveComplete() {
  if (wordsSpawnedThisWave >= WORDS_PER_WAVE && activeWords.length === 0) {
    if (wave >= MAX_WAVE) {
      endGame(true);
    } else {
      STATE = 'wavePause';
      wave++;
      wordsSpawnedThisWave = 0;
      wavePauseUntil = performance.now() + 3000;
      updateHUD();
    }
  }
}

// ================================================================
//  MAIN GAME LOOP
// ================================================================
function gameLoop(now) {
  const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
  lastFrameTime = now;

  // Timer expirations
  if (slowActive && now >= slowEnd) {
    slowActive = false;
    // Restore base speed for active words
    for (const w of activeWords) w.speed = WAVE_CFG[wave].speed;
  }
  if (shieldActive && now >= shieldEnd) shieldActive = false;

  // --- DRAW ---
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawStars();
  drawGround();
  drawBuildings();
  drawDangerLine();

  if (STATE === 'playing') {
    // Spawn
    const cfg = WAVE_CFG[wave];
    if (wordsSpawnedThisWave < WORDS_PER_WAVE && now - lastSpawnTime >= cfg.spawnMs) {
      spawnWord();
    }

    // Move and draw words
    for (let i = activeWords.length - 1; i >= 0; i--) {
      const w = activeWords[i];
      w.y += w.speed * dt;
      if (w.flash > 0) w.flash -= dt;

      if (w.y >= DANGER_Y) {
        missWord(w);
        continue;
      }
      drawWord(w);
    }

    // Draw remaining (in case any survived)
    // (already drawn above in loop, this is fine)

    checkWaveComplete();

  } else if (STATE === 'wavePause') {
    // Draw frozen words (don't move them)
    for (const w of activeWords) drawWord(w);
    drawWavePause(now);

    if (now >= wavePauseUntil) {
      STATE = 'playing';
      lastSpawnTime = performance.now();
      updateHUD();
    }
  }

  drawParticles(dt);
  drawShieldEffect();
  drawRedFlash(now);

  if (STATE === 'playing' || STATE === 'wavePause') updateHUD();

  if (lives <= 0 && STATE === 'playing') {
    endGame(false);
    return;
  }

  animFrame = requestAnimationFrame(gameLoop);
}

// ================================================================
//  GAME START / END
// ================================================================
function startGame() {
  // Reset
  score = 0; lives = 5; wave = 1;
  combo = 0; maxCombo = 0;
  wordsCompleted = 0; wordsMissed = 0;
  gameStartTime = performance.now();
  lastSpawnTime = performance.now() - 9999; // spawn immediately
  wordsSpawnedThisWave = 0;
  slowActive = false; shieldActive = false;
  redFlashEnd = 0;
  activeWords = []; particles = [];
  targetedWord = null; typedSoFar = '';
  gameSeed = (Math.random() * 1e9) | 0;
  buildings = generateBuildings(gameSeed);

  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('typedText').textContent = '';

  STATE = 'playing';
  lastFrameTime = performance.now();
  updateHUD();

  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(gameLoop);
}

function endGame(won) {
  STATE = won ? 'win' : 'gameOver';
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }

  // Draw one last frame
  ctx.clearRect(0, 0, W, H);
  drawBackground(); drawStars(); drawGround(); drawBuildings();

  const elapsed = (performance.now() - gameStartTime) / 60000;
  const finalWPM = elapsed > 0.02 ? Math.round(wordsCompleted / elapsed) : 0;
  const total = wordsCompleted + wordsMissed;
  const acc = total > 0 ? Math.round((wordsCompleted / total) * 100) : 100;

  window.dispatchEvent(new CustomEvent('gameOver', {
    detail: { game: 'typing-terror', score }
  }));

  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');

  document.getElementById('overlayTitle').textContent = won ? 'City Defended!' : 'City Destroyed!';
  document.getElementById('overlaySubtitle').textContent = won
    ? 'All 12 waves defeated — your city stands tall!'
    : `You reached Wave ${wave}. Practice makes perfect!`;

  const scoreEl = document.getElementById('overlayScore');
  scoreEl.style.display = '';
  scoreEl.textContent = score.toLocaleString() + ' pts';

  const statsEl = document.getElementById('overlayStats');
  statsEl.innerHTML = `
    <span class="s-label">WPM</span><span class="s-value">${finalWPM}</span>
    <span class="s-label">Accuracy</span><span class="s-value">${acc}%</span>
    <span class="s-label">Words Typed</span><span class="s-value">${wordsCompleted}</span>
    <span class="s-label">Best Combo</span><span class="s-value">${maxCombo}x</span>
    <span class="s-label">Wave Reached</span><span class="s-value">${wave} / ${MAX_WAVE}</span>
  `;

  document.getElementById('overlayBtn').textContent = 'Play Again';
}

document.getElementById('overlayBtn').addEventListener('click', startGame);

// ================================================================
//  INITIAL DRAW (menu state)
// ================================================================
(function init() {
  gameSeed = (Math.random() * 1e9) | 0;
  buildings = generateBuildings(gameSeed);
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawStars();
  drawGround();
  drawBuildings();
})();
</script>
</body>
