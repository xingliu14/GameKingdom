# GameKingdom static game hub
# Drop this file into /etc/nginx/conf.d/ on the VPS and reload nginx.
# Games will be accessible at http://<your-domain-or-ip>/play/
#
# If you already have a server block for your domain, copy just the
# location blocks below into your existing server block instead.

server {
    listen 80;
    server_name 89.167.72.63 _;  # Replace with your domain name if you have one

    # Redirect /play to /play/ so relative paths in HTML resolve correctly
    location = /play {
        return 301 /play/;
    }

    # GameKingdom game hub — served at /play/
    location /play/ {
        alias /var/www/gamekingdom/;
        index index.html;
        try_files $uri $uri/ =404;
        auth_basic off;

        # Short cache for HTML, long cache for CSS/JS
        expires -1;
        add_header Cache-Control "no-store";
    }
}
