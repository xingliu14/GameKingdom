# GameKingdom — add this location block inside your existing server{} block.
#
# If you manage nginx with a single config file (e.g. /etc/nginx/sites-enabled/default
# or /etc/nginx/conf.d/main.conf), paste the location block below into that file.
#
# If nginx includes conf.d/*.conf automatically (common on Ubuntu/Debian),
# the deploy.sh script uploads this file to /etc/nginx/conf.d/gamekingdom.conf
# and wraps it in a server block targeting your domain. Adjust as needed.

# Option A — standalone server block (use if GameKingdom is the only site)
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;           # e.g. games.example.com

    # Redirect HTTP → HTTPS (remove this block if you don't have SSL yet)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Option B — sub-path on an existing domain (paste inside your server{} block)
    # Serves the site at https://yourdomain.com/play/
    location /play/ {
        alias /var/www/gamekingdom/;
        index index.html;
        try_files $uri $uri/ =404;

        # No auth — games are public
        auth_basic off;

        # Cache static assets aggressively; bust by filename change
        location ~* \.(css|js|html|ico|png|jpg|svg|webp|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
